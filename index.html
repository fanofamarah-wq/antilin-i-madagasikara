<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIZY - Persistance Cloud</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        [x-cloak] { display: none !important; }
        .card-scout { transition: all 0.3s ease; }
        .card-scout:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .tab-active { @apply bg-amber-600 text-white shadow-lg shadow-amber-900/20; }
    </style>
</head>
<body x-data="scoutApp()" x-init="initApp()" x-cloak class="text-stone-900">

    <script>
        window.scoutApp = function() {
            return {
                tab: 'home',
                isConfigured: false,
                showForm: false,
                currentUser: {
                    uid: null,
                    pseudo: localStorage.getItem('valizy_pseudo') || 'Mpanazava_' + Math.floor(Math.random() * 1000)
                },
                
                settings: {
                    groupName: "Antilin'i Madagasikara",
                    fivondronana: "Fivondronana faha-17",
                    sampana: "Mpamakilay",
                    dina: "Tsy misaraka mandrakizay",
                    aboutText: "Mpanabe ny tanora mba ho vanona sy mahay mandray andraikitra.",
                    logo: null
                },

                news: [],
                events: [],
                scouts: [],
                messages: [],

                formEvent: { title: '', date: '' },
                formScout: { name: '', firstname: '', address: '', phone: '', facebook: '', image: null },
                formNews: { title: '', desc: '' },
                chatInput: '',

                db: null,
                appId: typeof __app_id !== 'undefined' ? __app_id : 'default-app-id',

                async initApp() {
                    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                    if (!firebaseConfig) return;

                    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
                    const auth = firebase.auth();
                    this.db = firebase.firestore();

                    // RÈGLE 3 : Authentification d'abord
                    try {
                        let userCred;
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            userCred = await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            userCred = await auth.signInAnonymously();
                        }
                        this.currentUser.uid = userCred.user.uid;
                        this.isConfigured = true;
                        
                        // Une fois authentifié, on lance la synchro
                        this.setupRealtimeSync();
                    } catch (e) {
                        console.error("Erreur Auth:", e);
                    }
                },

                setupRealtimeSync() {
                    if (!this.db || !this.currentUser.uid) return;
                    
                    // RÈGLE 1 : Chemins stricts
                    const publicPath = `artifacts/${this.appId}/public/data`;

                    // Synchronisation des Paramètres
                    this.db.doc(`${publicPath}/settings/global`).onSnapshot(doc => {
                        if (doc.exists) {
                            this.settings = { ...this.settings, ...doc.data() };
                        }
                    }, err => console.error("Sync Settings:", err));

                    // Synchronisation des Collections
                    const sync = (coll, target) => {
                        this.db.collection(`${publicPath}/${coll}`).onSnapshot(snap => {
                            this[target] = snap.docs.map(d => ({...d.data(), id: d.id}));
                        }, err => console.error(`Sync ${coll}:`, err));
                    };

                    sync('scouts', 'scouts');
                    sync('events', 'events');
                    sync('news', 'news');

                    // Synchronisation du Chat
                    this.db.collection(`${publicPath}/chat`).onSnapshot(snap => {
                        this.messages = snap.docs
                            .map(d => ({...d.data(), id: d.id}))
                            .sort((a,b) => a.timestamp - b.timestamp);
                        this.$nextTick(() => this.scrollToBottom());
                    }, err => console.error("Sync Chat:", err));
                },

                async updateSettings() {
                    if (!this.isConfigured || !this.db) return;
                    try {
                        const path = `artifacts/${this.appId}/public/data/settings/global`;
                        await this.db.doc(path).set(this.settings, { merge: true });
                    } catch (e) { console.error("Erreur save settings:", e); }
                },

                async addData(collectionName, data) {
                    if (!this.isConfigured || !this.db) return;
                    try {
                        const path = `artifacts/${this.appId}/public/data/${collectionName}`;
                        await this.db.collection(path).add({
                            ...data,
                            timestamp: Date.now(),
                            author: this.currentUser.pseudo,
                            authorId: this.currentUser.uid
                        });
                    } catch (e) { console.error("Erreur save data:", e); }
                },

                async sendMessage() {
                    if(!this.chatInput.trim() || !this.isConfigured) return;
                    const msg = {
                        user: this.currentUser.pseudo,
                        text: this.chatInput,
                        time: new Date().toLocaleTimeString('mg-MG', {hour: '2-digit', minute:'2-digit'})
                    };
                    await this.addData('chat', msg);
                    this.chatInput = '';
                },

                handleImage(e, type) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        if(type === 'logo') {
                            this.settings.logo = f.target.result;
                            this.updateSettings();
                        } else if(type === 'scout') {
                            this.formScout.image = f.target.result;
                        }
                    };
                    reader.readAsDataURL(file);
                },

                scrollToBottom() {
                    const el = document.getElementById('chat-box');
                    if (el) el.scrollTop = el.scrollHeight;
                },

                updatePseudo() {
                    localStorage.setItem('valizy_pseudo', this.currentUser.pseudo);
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-[#141414] text-white flex-shrink-0 hidden lg:flex flex-col border-r border-white/5">
            <div class="p-8 h-full flex flex-col">
                <div class="flex items-center gap-3 mb-12">
                    <div class="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg shadow-amber-600/20 rotate-3">V</div>
                    <div>
                        <h2 class="font-black text-xl leading-none tracking-tighter uppercase">Valizy</h2>
                        <p class="text-[9px] text-amber-500 font-bold uppercase tracking-widest mt-1">Antilin'i Madagasikara</p>
                    </div>
                </div>

                <nav class="space-y-2 flex-1">
                    <button @click="tab = 'home'" :class="tab === 'home' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>🏠</span> Tongasoa
                    </button>
                    <button @click="tab = 'calendar'" :class="tab === 'calendar' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>📅</span> Programa
                    </button>
                    <button @click="tab = 'members'" :class="tab === 'members' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>👥</span> Zatovo
                    </button>
                    <button @click="tab = 'chat'" :class="tab === 'chat' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>💬</span> Dinika
                    </button>
                    <button @click="tab = 'settings'" :class="tab === 'settings' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>⚙️</span> Paramètre
                    </button>
                </nav>

                <div class="mt-auto p-5 bg-white/5 rounded-3xl border border-white/10">
                    <div class="flex items-center gap-2 mb-3">
                        <div :class="isConfigured ? 'bg-green-500' : 'bg-red-500'" class="w-2 h-2 rounded-full animate-pulse"></div>
                        <span class="text-[9px] font-black uppercase tracking-widest" x-text="isConfigured ? 'Online' : 'Offline'"></span>
                    </div>
                    <label class="text-[8px] uppercase font-black text-amber-500 mb-1 block">Anaranao</label>
                    <input type="text" x-model="currentUser.pseudo" @blur="updatePseudo" class="bg-transparent text-xs font-bold w-full outline-none focus:text-amber-400 border-b border-white/10 pb-1">
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto bg-[#fafafa]">
            <div class="max-w-5xl mx-auto p-6 lg:p-12">

                <!-- TAB: HOME -->
                <div x-show="tab === 'home'" class="space-y-10">
                    <div class="bg-white p-10 rounded-[3rem] border border-stone-200 shadow-sm flex flex-col md:flex-row items-center gap-10">
                        <div class="w-44 h-44 bg-stone-900 rounded-[2.8rem] flex items-center justify-center text-amber-500 shadow-2xl overflow-hidden border-8 border-white">
                            <template x-if="settings.logo">
                                <img :src="settings.logo" class="w-full h-full object-cover">
                            </template>
                            <template x-if="!settings.logo">
                                <span class="text-7xl font-black">V</span>
                            </template>
                        </div>
                        <div class="text-center md:text-left flex-1">
                            <h1 class="text-5xl font-black text-stone-900 uppercase tracking-tighter mb-4" x-text="settings.groupName"></h1>
                            <div class="inline-flex bg-amber-100 text-amber-900 px-6 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest mb-6" x-text="settings.fivondronana"></div>
                            <p class="text-stone-500 text-lg font-medium italic" x-text="settings.aboutText"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-white p-10 rounded-[2.5rem] border border-stone-200">
                            <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-stone-400 mb-8 flex items-center gap-2">VAOVAO FARANY</h3>
                            <div class="space-y-8">
                                <template x-for="n in news">
                                    <div class="group">
                                        <h4 class="font-black text-stone-800 text-xl" x-text="n.title"></h4>
                                        <p class="text-sm text-stone-500 mt-2" x-text="n.desc"></p>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="bg-stone-900 p-10 rounded-[2.5rem] text-white">
                            <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-amber-500 mb-8">NY DINA</h3>
                            <p class="text-3xl font-bold italic" x-text="'« ' + settings.dina + ' »'"></p>
                        </div>
                    </div>
                </div>

                <!-- TAB: ZATOVO -->
                <div x-show="tab === 'members'" class="space-y-8">
                    <div class="flex justify-between items-end">
                        <h2 class="text-4xl font-black uppercase tracking-tighter">Zatovo</h2>
                        <button @click="showForm = !showForm" class="bg-stone-900 text-white px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest">
                            <span x-text="showForm ? 'Hakatona' : '+ Zatovo'"></span>
                        </button>
                    </div>

                    <div x-show="showForm" class="bg-white p-10 rounded-[3rem] border-2 border-amber-100 space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <input type="text" x-model="formScout.name" placeholder="Anarana" class="p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold">
                            <input type="text" x-model="formScout.firstname" placeholder="Fanampiny" class="p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold">
                        </div>
                        <input type="text" x-model="formScout.address" placeholder="Adiresy" class="w-full p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold">
                        <button @click="addData('scouts', formScout); formScout={name:'', firstname:'', address:''}; showForm=false" class="w-full bg-amber-600 text-white py-5 rounded-2xl font-black uppercase text-xs">Tahiry</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <template x-for="s in scouts">
                            <div class="bg-white p-8 rounded-[2.5rem] border border-stone-200 text-center card-scout">
                                <div class="w-20 h-20 bg-stone-100 rounded-full mx-auto mb-4 flex items-center justify-center font-black text-2xl text-stone-400" x-text="s.name[0]"></div>
                                <h4 class="font-black text-stone-800" x-text="s.name + ' ' + s.firstname"></h4>
                                <p class="text-[10px] uppercase text-stone-400 font-bold mt-2" x-text="s.address"></p>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- TAB: PROGRAMA -->
                <div x-show="tab === 'calendar'" class="space-y-8">
                    <div class="flex justify-between items-end">
                        <h2 class="text-4xl font-black uppercase tracking-tighter">Programa</h2>
                        <button @click="showForm = !showForm" class="bg-stone-900 text-white px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest">
                            <span x-text="showForm ? 'Hakatona' : '+ Programa'"></span>
                        </button>
                    </div>

                    <div x-show="showForm" class="bg-white p-8 rounded-3xl border border-stone-200 grid grid-cols-2 gap-6">
                        <input type="text" x-model="formEvent.title" placeholder="Inona no hatao?" class="p-4 rounded-2xl bg-stone-50 outline-none font-bold ring-1 ring-stone-200">
                        <input type="date" x-model="formEvent.date" class="p-4 rounded-2xl bg-stone-50 outline-none font-bold ring-1 ring-stone-200">
                        <button @click="addData('events', formEvent); formEvent={title:'', date:''}; showForm=false" class="col-span-2 bg-amber-600 text-white py-4 rounded-2xl font-black uppercase text-xs">Ampiana</button>
                    </div>

                    <div class="space-y-4">
                        <template x-for="e in events">
                            <div class="bg-white p-6 rounded-[2rem] border border-stone-200 flex items-center gap-6">
                                <div class="bg-stone-900 text-white p-4 rounded-2xl text-center min-w-[80px]">
                                    <p class="text-xl font-black" x-text="new Date(e.date).getDate()"></p>
                                    <p class="text-[9px] uppercase font-bold" x-text="new Date(e.date).toLocaleString('mg', {month:'short'})"></p>
                                </div>
                                <h4 class="font-black text-xl text-stone-800 flex-1" x-text="e.title"></h4>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- TAB: CHAT -->
                <div x-show="tab === 'chat'" class="h-[70vh] flex flex-col space-y-4">
                    <h2 class="text-4xl font-black uppercase tracking-tighter">Dinika</h2>
                    <div class="flex-1 bg-white rounded-[3rem] border border-stone-200 overflow-hidden flex flex-col">
                        <div id="chat-box" class="flex-1 overflow-y-auto p-8 space-y-6 bg-stone-50/30">
                            <template x-for="m in messages">
                                <div :class="m.authorId === currentUser.uid ? 'items-end' : 'items-start'" class="flex flex-col">
                                    <span class="text-[9px] font-black text-stone-400 uppercase px-2 mb-1" x-text="m.user + ' • ' + m.time"></span>
                                    <div :class="m.authorId === currentUser.uid ? 'bg-amber-600 text-white rounded-tr-none' : 'bg-white text-stone-800 border border-stone-200 rounded-tl-none'" 
                                         class="px-5 py-3 rounded-2xl max-w-[80%] text-sm font-semibold" x-text="m.text"></div>
                                </div>
                            </template>
                        </div>
                        <div class="p-6 bg-white border-t flex gap-4">
                            <input type="text" x-model="chatInput" @keyup.enter="sendMessage" placeholder="Soraty ny hevitrao..." class="flex-1 bg-stone-50 px-6 py-4 rounded-2xl outline-none font-bold text-sm">
                            <button @click="sendMessage" class="bg-stone-900 text-white px-8 rounded-2xl font-black uppercase text-[10px]">Handefa</button>
                        </div>
                    </div>
                </div>

                <!-- TAB: SETTINGS -->
                <div x-show="tab === 'settings'" class="space-y-10">
                    <h2 class="text-4xl font-black uppercase tracking-tighter">Paramètre</h2>
                    <div class="bg-white p-10 rounded-[3rem] border border-stone-200 space-y-6">
                        <div class="grid grid-cols-2 gap-6">
                            <input type="text" x-model="settings.groupName" @blur="updateSettings" placeholder="Anaran'ny Vondrona" class="p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold">
                            <input type="text" x-model="settings.fivondronana" @blur="updateSettings" placeholder="Fivondronana" class="p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold">
                            <input type="text" x-model="settings.sampana" @blur="updateSettings" placeholder="Sampana" class="p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold">
                            <input type="text" x-model="settings.dina" @blur="updateSettings" placeholder="Dina" class="p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold">
                        </div>
                        <textarea x-model="settings.aboutText" @blur="updateSettings" class="w-full p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold h-24"></textarea>
                        <input type="file" @change="handleImage($event, 'logo')" class="text-xs font-bold">
                        
                        <div class="pt-10 border-t">
                            <h3 class="font-black text-xs uppercase text-amber-600 mb-6">Hampiditra Vaovao</h3>
                            <div class="space-y-4">
                                <input type="text" x-model="formNews.title" placeholder="Lohahevitra" class="w-full p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold">
                                <textarea x-model="formNews.desc" placeholder="Antsipiriany" class="w-full p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold h-24"></textarea>
                                <button @click="addData('news', formNews); formNews={title:'', desc:''}" class="bg-amber-600 text-white px-8 py-3 rounded-xl font-black uppercase text-[10px]">Hamoaka</button>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
