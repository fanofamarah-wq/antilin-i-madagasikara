<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIZY - Synchronisation Temps Réel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK Compat (Nécessaire pour l'intégration stable) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        [x-cloak] { display: none !important; }
        .card-scout { transition: all 0.3s ease; }
        .card-scout:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        
        .tab-active { @apply bg-amber-600 text-white shadow-lg shadow-amber-900/20; }
    </style>
</head>
<body x-data="scoutApp()" x-init="initApp()" x-cloak class="text-stone-900">

    <script>
        window.scoutApp = function() {
            return {
                tab: 'home',
                isConfigured: false,
                showForm: false,
                currentUser: {
                    uid: null,
                    pseudo: localStorage.getItem('valizy_pseudo') || 'Mpanazava_' + Math.floor(Math.random() * 1000)
                },
                
                // État de l'application
                settings: {
                    groupName: "Antilin'i Madagasikara",
                    fivondronana: "Fivondronana faha-17",
                    sampana: "Mpamakilay",
                    dina: "Tsy misaraka mandrakizay",
                    aboutText: "Mpanabe ny tanora mba ho vanona sy mahay mandray andraikitra.",
                    logo: null
                },

                // Listes synchronisées
                news: [],
                events: [],
                scouts: [],
                messages: [],

                // Formulaires locaux
                formEvent: { title: '', date: '' },
                formScout: { name: '', firstname: '', address: '', phone: '', facebook: '', image: null },
                formNews: { title: '', desc: '' },
                chatInput: '',

                db: null,
                appId: typeof __app_id !== 'undefined' ? __app_id : 'default-app-id',

                async initApp() {
                    const setupFirebase = async (retryCount = 0) => {
                        let config;
                        try {
                            config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                        } catch(e) { config = null; }

                        if (config && config.apiKey && config.apiKey !== "preview") {
                            if (!firebase.apps.length) firebase.initializeApp(config);
                            const auth = firebase.auth();
                            this.db = firebase.firestore();

                            try {
                                // Authentification requise pour Firestore
                                let userCred;
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    userCred = await auth.signInWithCustomToken(__initial_auth_token);
                                } else {
                                    userCred = await auth.signInAnonymously();
                                }
                                
                                this.currentUser.uid = userCred.user.uid;
                                this.isConfigured = true;
                                this.setupRealtimeSync();
                            } catch (e) {
                                console.error("Erreur Auth:", e);
                            }
                        } else if (retryCount < 5) {
                            // On réessaie car parfois les variables d'environnement arrivent avec un léger retard
                            setTimeout(() => setupFirebase(retryCount + 1), 1000);
                        }
                    };

                    await setupFirebase();
                },

                setupRealtimeSync() {
                    if (!this.db || !this.currentUser.uid) return;
                    
                    // Chemin racine selon les règles strictes
                    const publicPath = `artifacts/${this.appId}/public/data`;

                    // 1. Synchronisation des Paramètres
                    this.db.doc(`${publicPath}/settings/global`).onSnapshot(doc => {
                        if (doc.exists) {
                            this.settings = { ...this.settings, ...doc.data() };
                        }
                    }, err => console.error("Sync Settings Error:", err));

                    // 2. Synchronisation des Collections (Membres, Events, News)
                    const syncCollection = (name, target) => {
                        this.db.collection(`${publicPath}/${name}`).onSnapshot(snapshot => {
                            this[target] = snapshot.docs.map(d => ({...d.data(), id: d.id}));
                        }, err => console.error(`Sync ${name} Error:`, err));
                    };

                    syncCollection('scouts', 'scouts');
                    syncCollection('events', 'events');
                    syncCollection('news', 'news');

                    // 3. Synchronisation du Chat (Tri par temps)
                    this.db.collection(`${publicPath}/chat`).onSnapshot(snapshot => {
                        this.messages = snapshot.docs
                            .map(d => ({...d.data(), id: d.id}))
                            .sort((a,b) => a.timestamp - b.timestamp);
                        this.$nextTick(() => this.scrollToBottom());
                    }, err => console.error("Sync Chat Error:", err));
                },

                // Fonctions de sauvegarde
                async addData(collectionName, data) {
                    if(!this.isConfigured) return;
                    try {
                        const path = `artifacts/${this.appId}/public/data/${collectionName}`;
                        await this.db.collection(path).add({
                            ...data,
                            timestamp: Date.now(),
                            author: this.currentUser.pseudo,
                            authorId: this.currentUser.uid
                        });
                    } catch (e) { console.error("Erreur ajout:", e); }
                },

                async updateSettings() {
                    if(!this.isConfigured) return;
                    try {
                        const path = `artifacts/${this.appId}/public/data/settings/global`;
                        await this.db.doc(path).set(this.settings, { merge: true });
                    } catch (e) { console.error("Erreur settings:", e); }
                },

                async sendMessage() {
                    if(!this.chatInput.trim() || !this.isConfigured) return;
                    const msg = {
                        user: this.currentUser.pseudo,
                        text: this.chatInput,
                        time: new Date().toLocaleTimeString('mg-MG', {hour: '2-digit', minute:'2-digit'})
                    };
                    await this.addData('chat', msg);
                    this.chatInput = '';
                },

                handleImage(e, type) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        if(type === 'logo') {
                            this.settings.logo = f.target.result;
                            this.updateSettings();
                        } else if(type === 'scout') {
                            this.formScout.image = f.target.result;
                        }
                    };
                    reader.readAsDataURL(file);
                },

                scrollToBottom() {
                    const el = document.getElementById('chat-box');
                    if (el) el.scrollTop = el.scrollHeight;
                },

                updatePseudo() {
                    localStorage.setItem('valizy_pseudo', this.currentUser.pseudo);
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-[#141414] text-white flex-shrink-0 hidden lg:flex flex-col border-r border-white/5">
            <div class="p-8 h-full flex flex-col">
                <div class="flex items-center gap-3 mb-12">
                    <div class="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg shadow-amber-600/20 rotate-3">V</div>
                    <div>
                        <h2 class="font-black text-xl leading-none tracking-tighter">VALIZY</h2>
                        <p class="text-[9px] text-amber-500 font-bold uppercase tracking-widest mt-1">Antilin'i Madagasikara</p>
                    </div>
                </div>

                <nav class="space-y-2 flex-1">
                    <button @click="tab = 'home'" :class="tab === 'home' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>🏠</span> Tongasoa
                    </button>
                    <button @click="tab = 'calendar'" :class="tab === 'calendar' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>📅</span> Programme
                    </button>
                    <button @click="tab = 'members'" :class="tab === 'members' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>👥</span> Zatovo
                    </button>
                    <button @click="tab = 'chat'" :class="tab === 'chat' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>💬</span> Dinika
                    </button>
                    <button @click="tab = 'settings'" :class="tab === 'settings' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>⚙️</span> Paramètre
                    </button>
                </nav>

                <!-- STATUS & PROFILE -->
                <div class="mt-auto p-5 bg-white/5 rounded-3xl border border-white/10">
                    <div class="flex items-center gap-2 mb-3">
                        <div :class="isConfigured ? 'bg-green-500' : 'bg-red-500'" class="w-2 h-2 rounded-full animate-pulse"></div>
                        <span class="text-[9px] font-black uppercase tracking-widest" x-text="isConfigured ? 'Mifandray' : 'Miantona'"></span>
                    </div>
                    <label class="text-[8px] uppercase font-black text-amber-500 mb-1 block">Ny anaranao</label>
                    <input type="text" x-model="currentUser.pseudo" @blur="updatePseudo" class="bg-transparent text-xs font-bold w-full outline-none focus:text-amber-400 border-b border-white/10 pb-1">
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto bg-[#fafafa]">
            <div class="max-w-5xl mx-auto p-6 lg:p-12">

                <!-- HOME -->
                <div x-show="tab === 'home'" class="space-y-10">
                    <div class="bg-white p-10 rounded-[3rem] border border-stone-200 shadow-sm flex flex-col md:flex-row items-center gap-10">
                        <div class="relative group">
                            <div class="w-44 h-44 bg-stone-900 rounded-[2.8rem] flex items-center justify-center text-amber-500 shadow-2xl shadow-amber-900/20 overflow-hidden border-8 border-white">
                                <template x-if="settings.logo">
                                    <img :src="settings.logo" class="w-full h-full object-cover">
                                </template>
                                <template x-if="!settings.logo">
                                    <span class="text-7xl font-black">V</span>
                                </template>
                            </div>
                        </div>
                        <div class="text-center md:text-left flex-1">
                            <h1 class="text-5xl lg:text-6xl font-black text-stone-900 uppercase tracking-tighter mb-4" x-text="settings.groupName"></h1>
                            <div class="inline-flex bg-amber-100 text-amber-900 px-6 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest mb-6" x-text="settings.fivondronana"></div>
                            <p class="text-stone-500 text-lg font-medium leading-relaxed italic" x-text="settings.aboutText"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-white p-10 rounded-[2.5rem] border border-stone-200">
                            <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-stone-400 mb-8 flex items-center gap-2">
                                <span class="w-2 h-2 bg-amber-500 rounded-full"></span> VAOVAO FARANY
                            </h3>
                            <div class="space-y-8">
                                <template x-for="n in news">
                                    <div class="group cursor-default">
                                        <h4 class="font-black text-stone-800 text-xl group-hover:text-amber-600 transition-colors" x-text="n.title"></h4>
                                        <p class="text-sm text-stone-500 mt-2 leading-relaxed" x-text="n.desc"></p>
                                        <div class="mt-3 flex items-center gap-2">
                                            <span class="text-[9px] font-black text-amber-600 uppercase" x-text="n.author"></span>
                                        </div>
                                    </div>
                                </template>
                                <template x-if="news.length === 0">
                                    <p class="text-xs text-stone-400 italic">Tsy misy vaovao aloha...</p>
                                </template>
                            </div>
                        </div>

                        <div class="bg-stone-900 p-10 rounded-[2.5rem] text-white shadow-2xl shadow-stone-900/40 relative overflow-hidden">
                            <div class="absolute -right-10 -top-10 w-40 h-40 bg-amber-600/10 rounded-full blur-3xl"></div>
                            <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-amber-500 mb-8">NY DINA</h3>
                            <p class="text-3xl font-bold italic leading-tight relative z-10" x-text="'« ' + settings.dina + ' »'"></p>
                            <div class="mt-12 pt-8 border-t border-white/10 flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] uppercase text-stone-500 font-bold tracking-widest mb-1">Sampana</p>
                                    <p class="text-2xl font-black text-amber-500" x-text="settings.sampana"></p>
                                </div>
                                <div class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center text-2xl">⚜️</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- ZATOVO (MEMBERS) -->
                <div x-show="tab === 'members'" class="space-y-8">
                    <div class="flex justify-between items-end">
                        <div>
                            <h2 class="text-4xl font-black uppercase tracking-tighter">Ireo Zatovo</h2>
                            <p class="text-stone-400 text-sm font-bold mt-1" x-text="scouts.length + ' no isan\'izy ireo'"></p>
                        </div>
                        <button @click="showForm = !showForm" class="bg-stone-900 text-white px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl shadow-stone-900/20 active:scale-95 transition-all">
                            <span x-text="showForm ? 'Hakatona' : '+ Zatovo Vaovao'"></span>
                        </button>
                    </div>

                    <div x-show="showForm" class="bg-white p-10 rounded-[3rem] border-2 border-amber-100 shadow-2xl space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Anarana</label>
                                <input type="text" x-model="formScout.name" class="w-full p-4 rounded-2xl bg-stone-50 border-none ring-1 ring-stone-200 outline-none font-bold focus:ring-2 focus:ring-amber-500 transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Fanampiny</label>
                                <input type="text" x-model="formScout.firstname" class="w-full p-4 rounded-2xl bg-stone-50 border-none ring-1 ring-stone-200 outline-none font-bold focus:ring-2 focus:ring-amber-500 transition-all">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Adiresy fonenana</label>
                            <input type="text" x-model="formScout.address" class="w-full p-4 rounded-2xl bg-stone-50 border-none ring-1 ring-stone-200 outline-none font-bold focus:ring-2 focus:ring-amber-500 transition-all">
                        </div>
                        <button @click="addData('scouts', formScout); formScout={name:'', firstname:'', address:''}; showForm=false" class="w-full bg-amber-600 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg shadow-amber-600/30">Tahaka ny any amin'ny bokin'ny vondrona</button>
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                        <template x-for="s in scouts">
                            <div class="bg-white p-8 rounded-[2.5rem] border border-stone-200 card-scout text-center group">
                                <div class="w-24 h-24 bg-stone-100 rounded-[2rem] mx-auto mb-6 flex items-center justify-center text-4xl font-black text-stone-300 group-hover:bg-amber-50 group-hover:text-amber-200 transition-colors">
                                    <span x-text="s.name[0]"></span>
                                </div>
                                <h4 class="font-black text-stone-800 text-xl uppercase tracking-tight" x-text="s.name + ' ' + s.firstname"></h4>
                                <div class="mt-4 pt-4 border-t border-stone-50">
                                    <p class="text-[10px] font-black text-stone-400 uppercase tracking-[0.2em]" x-text="s.address"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- CALENDAR -->
                <div x-show="tab === 'calendar'" class="space-y-8">
                    <div class="flex justify-between items-end">
                        <h2 class="text-4xl font-black uppercase tracking-tighter">Programa</h2>
                        <button @click="showForm = !showForm" class="bg-stone-900 text-white px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-xl">
                            <span x-text="showForm ? 'Hakatona' : '+ Programa'"></span>
                        </button>
                    </div>

                    <div x-show="showForm" class="bg-white p-8 rounded-3xl border border-stone-200 grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" x-model="formEvent.title" placeholder="Inona no hatao?" class="p-4 rounded-2xl bg-stone-50 outline-none font-bold ring-1 ring-stone-200">
                        <input type="date" x-model="formEvent.date" class="p-4 rounded-2xl bg-stone-50 outline-none font-bold ring-1 ring-stone-200">
                        <button @click="addData('events', formEvent); formEvent={title:'', date:''}; showForm=false" class="md:col-span-2 bg-amber-600 text-white py-4 rounded-2xl font-black uppercase text-xs">Ampiana amin'ny tetiandro</button>
                    </div>

                    <div class="space-y-4">
                        <template x-for="e in events">
                            <div class="bg-white p-6 rounded-[2rem] border border-stone-200 flex items-center gap-8 card-scout">
                                <div class="text-center w-20 py-3 bg-stone-900 rounded-2xl text-white">
                                    <p class="text-[10px] font-black uppercase text-amber-500" x-text="new Date(e.date).toLocaleString('mg', {month:'short'})"></p>
                                    <p class="text-2xl font-black" x-text="new Date(e.date).getDate()"></p>
                                </div>
                                <div class="flex-1">
                                    <h4 class="font-black text-xl text-stone-800" x-text="e.title"></h4>
                                    <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mt-1">Nampidirin'i <span x-text="e.author"></span></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- CHAT (DINIKA) -->
                <div x-show="tab === 'chat'" class="h-[calc(100vh-12rem)] flex flex-col space-y-6">
                    <h2 class="text-4xl font-black uppercase tracking-tighter">Tapatapa-pira</h2>
                    <div class="flex-1 bg-white rounded-[3rem] border border-stone-200 flex flex-col overflow-hidden shadow-2xl shadow-stone-200/50">
                        <div id="chat-box" class="flex-1 overflow-y-auto p-10 space-y-8 bg-stone-50/20">
                            <template x-for="m in messages">
                                <div :class="m.authorId === currentUser.uid ? 'items-end' : 'items-start'" class="flex flex-col">
                                    <div class="flex items-center gap-3 mb-2 px-3">
                                        <span class="text-[10px] font-black uppercase tracking-widest text-stone-400" x-text="m.user"></span>
                                        <span class="text-[9px] text-stone-300 font-bold" x-text="m.time"></span>
                                    </div>
                                    <div :class="m.authorId === currentUser.uid ? 'bg-amber-600 text-white rounded-tr-none shadow-lg shadow-amber-600/20' : 'bg-white text-stone-800 rounded-tl-none border border-stone-200 shadow-sm'" 
                                         class="px-6 py-4 rounded-[1.8rem] max-w-[70%] text-sm font-semibold leading-relaxed" x-text="m.text"></div>
                                </div>
                            </template>
                        </div>
                        <div class="p-8 bg-white border-t border-stone-100 flex gap-4">
                            <input type="text" x-model="chatInput" @keyup.enter="sendMessage" placeholder="Soraty eto ny hevitrao..." class="flex-1 bg-stone-50 px-6 py-4 rounded-2xl outline-none font-bold text-sm ring-1 ring-stone-200 focus:ring-2 focus:ring-amber-500 transition-all">
                            <button @click="sendMessage" class="bg-stone-900 text-white px-10 rounded-2xl font-black uppercase text-[11px] tracking-widest hover:bg-amber-600 transition-colors shadow-lg shadow-stone-900/10">Handefa</button>
                        </div>
                    </div>
                </div>

                <!-- SETTINGS -->
                <div x-show="tab === 'settings'" class="space-y-10">
                    <h2 class="text-4xl font-black uppercase tracking-tighter">Paramètres</h2>
                    
                    <div class="bg-white p-10 rounded-[3rem] border border-stone-200 space-y-8">
                        <h3 class="font-black text-xs uppercase tracking-[0.2em] text-amber-600">Mombamomba ny Vondrona</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Anaran'ny Vondrona</label>
                                <input type="text" x-model="settings.groupName" @blur="updateSettings" class="w-full p-4 rounded-2xl bg-stone-50 border-none ring-1 ring-stone-200 font-bold focus:ring-2 focus:ring-amber-500 outline-none">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Fivondronana</label>
                                <input type="text" x-model="settings.fivondronana" @blur="updateSettings" class="w-full p-4 rounded-2xl bg-stone-50 border-none ring-1 ring-stone-200 font-bold focus:ring-2 focus:ring-amber-500 outline-none">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Sampana</label>
                                <input type="text" x-model="settings.sampana" @blur="updateSettings" class="w-full p-4 rounded-2xl bg-stone-50 border-none ring-1 ring-stone-200 font-bold focus:ring-2 focus:ring-amber-500 outline-none">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Filamatra (Dina)</label>
                                <input type="text" x-model="settings.dina" @blur="updateSettings" class="w-full p-4 rounded-2xl bg-stone-50 border-none ring-1 ring-stone-200 font-bold focus:ring-2 focus:ring-amber-500 outline-none italic text-amber-600">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest">Famaritana fohy</label>
                            <textarea x-model="settings.aboutText" @blur="updateSettings" class="w-full p-4 rounded-2xl bg-stone-50 border-none ring-1 ring-stone-200 font-bold focus:ring-2 focus:ring-amber-500 outline-none h-24"></textarea>
                        </div>
                        <div>
                            <label class="text-[10px] font-black uppercase text-stone-400 ml-2 tracking-widest block mb-2">Logo ny Vondrona</label>
                            <input type="file" @change="handleImage($event, 'logo')" class="text-xs font-bold text-stone-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-stone-100 file:text-stone-600 hover:file:bg-amber-100">
                        </div>
                    </div>

                    <div class="bg-stone-900 p-10 rounded-[3rem] text-white shadow-2xl">
                        <h3 class="font-black text-xs uppercase tracking-[0.2em] text-amber-500 mb-8">Hampiditra Vaovao</h3>
                        <div class="space-y-6">
                            <input type="text" x-model="formNews.title" placeholder="Lohahevitry ny vaovao" class="w-full p-5 rounded-2xl bg-white/5 border-none ring-1 ring-white/10 font-bold focus:ring-2 focus:ring-amber-500 outline-none">
                            <textarea x-model="formNews.desc" placeholder="Inona ny antsipiriany..." class="w-full p-5 rounded-2xl bg-white/5 border-none ring-1 ring-white/10 font-bold h-32 focus:ring-2 focus:ring-amber-500 outline-none"></textarea>
                            <button @click="addData('news', formNews); formNews={title:'', desc:''}" class="bg-amber-600 text-white px-10 py-4 rounded-2xl font-black uppercase text-[11px] shadow-lg shadow-amber-600/20 active:scale-95 transition-all">Hamoaka ny vaovao</button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

</body>
</html>
