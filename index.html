<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Scoutisme - Antilin'i Madagasikara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Utilisation de la version minifiée de Babel pour plus de stabilité -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .chat-bubble-me { border-radius: 18px 18px 2px 18px; }
        .chat-bubble-them { border-radius: 18px 18px 18px 2px; }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #d97706;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">
    <div id="root">
        <div class="flex flex-col items-center justify-center h-screen gap-4">
            <div class="loader"></div>
            <p class="text-amber-800 font-medium animate-pulse">Fanalana ny base de donnée...</p>
        </div>
    </div>

    <!-- Firebase SDKs Compat (Plus robustes pour le déploiement direct) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Récupération sécurisée de la config
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch(e) {
            console.error("Erreur de configuration Firebase");
        }
        
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'antilin-i-madagasikara';

        // Initialisation
        if (!firebase.apps.length && firebaseConfig) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- Composants de base ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { width: size, height: size, class: className },
                        nameAttr: 'data-lucide', icons: window.lucide.icons
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const Button = ({ children, onClick, variant = "primary", className = "" }) => {
            const variants = {
                primary: "bg-amber-600 text-white hover:bg-amber-700 shadow-sm",
                outline: "border-2 border-amber-600 text-amber-600 hover:bg-amber-50",
                secondary: "bg-stone-800 text-white hover:bg-stone-900",
                ghost: "text-stone-700 hover:bg-stone-100"
            };
            return (
                <button onClick={onClick} className={`px-4 py-2 rounded-xl font-bold transition-all flex items-center justify-center gap-2 active:scale-95 ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const InputField = ({ label, value, onChange, placeholder }) => (
            <div className="w-full">
                <label className="block text-[10px] font-black text-amber-800 mb-1 uppercase tracking-widest">{label}</label>
                <input 
                    type="text" 
                    value={value || ''} 
                    onChange={onChange} 
                    placeholder={placeholder} 
                    className="w-full p-3 rounded-xl border border-stone-200 focus:ring-2 focus:ring-amber-500 outline-none text-sm"
                />
            </div>
        );

        // --- App ---
        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('accueil');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [pseudo, setPseudo] = useState(localStorage.getItem('scout_pseudo') || "Chef Scout");
            const [settings, setSettings] = useState({ groupName: "Antilin'i Madagasikara", fivondronana: "Fivondronana faha-17" });
            const [messages, setMessages] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Auth error", e); }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                // Application stricte de la Règle 1 pour les chemins
                const baseDoc = db.collection('artifacts').doc(appId);
                const settingsCol = baseDoc.collection('public').doc('data').collection('settings');
                const messagesCol = baseDoc.collection('public').doc('data').collection('messages');

                const unsubSettings = settingsCol.doc('main').onSnapshot(doc => {
                    if (doc.exists) setSettings(doc.data());
                }, err => console.warn("Attente des permissions..."));

                const unsubMessages = messagesCol.onSnapshot(snap => {
                    const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMessages(msgs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)));
                }, err => console.warn("Attente des messages..."));

                return () => { unsubSettings(); unsubMessages(); };
            }, [user]);

            const sendMessage = async (txt) => {
                if (!user || !txt.trim()) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('messages').add({
                    sender: pseudo,
                    text: txt,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
            };

            const updateSettings = async (data) => {
                if (!user) return;
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('settings').doc('main').set(data, { merge: true });
            };

            if (loading) return (
                <div className="flex flex-col items-center justify-center h-screen gap-4">
                    <div className="loader"></div>
                    <p className="text-amber-800 font-bold uppercase text-xs">Fampidirana...</p>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col bg-stone-50">
                    <header className="bg-white border-b border-stone-200 p-4 flex justify-between items-center sticky top-0 z-30">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center text-white font-black shadow-lg">A</div>
                            <div>
                                <h1 className="font-black text-stone-900 text-sm uppercase leading-none">{settings.groupName}</h1>
                                <p className="text-[9px] text-amber-600 font-bold uppercase tracking-widest">{settings.fivondronana}</p>
                            </div>
                        </div>
                        <button onClick={() => setIsMenuOpen(true)} className="p-2 hover:bg-stone-100 rounded-lg">
                            <Icon name="menu" size={24} />
                        </button>
                    </header>

                    <main className="flex-1 max-w-4xl w-full mx-auto p-4">
                        {activeTab === 'accueil' && (
                            <div className="text-center py-20">
                                <div className="w-40 h-40 bg-stone-800 rounded-full mx-auto mb-6 border-8 border-white shadow-2xl flex items-center justify-center">
                                    <Icon name="users" size={60} className="text-white" />
                                </div>
                                <h2 className="text-3xl font-black text-stone-900 mb-2 uppercase italic">{settings.groupName}</h2>
                                <span className="bg-amber-100 text-amber-800 px-4 py-1 rounded-full font-black text-xs uppercase">{settings.fivondronana}</span>
                            </div>
                        )}

                        {activeTab === 'chat' && (
                            <div className="h-[70vh] flex flex-col gap-4">
                                <div className="flex-1 overflow-y-auto bg-white rounded-3xl border p-4 space-y-4 custom-scrollbar">
                                    {messages.map(m => (
                                        <div key={m.id} className={`flex flex-col ${m.sender === pseudo ? 'items-end' : 'items-start'}`}>
                                            <span className="text-[9px] font-black text-stone-400 mb-1 px-1 uppercase">{m.sender}</span>
                                            <div className={`p-3 max-w-[80%] ${m.sender === pseudo ? 'bg-amber-600 text-white chat-bubble-me shadow-md' : 'bg-stone-100 text-stone-800 chat-bubble-them'}`}>
                                                <p className="text-sm">{m.text}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-2 p-2 bg-white rounded-2xl border shadow-sm">
                                    <input 
                                        type="text" 
                                        className="flex-1 outline-none px-4 text-sm" 
                                        placeholder="Hanoratra..." 
                                        onKeyPress={e => e.key === 'Enter' && (sendMessage(e.target.value), e.target.value = '')}
                                    />
                                    <Button className="w-10 h-10 p-0" onClick={() => {
                                        const i = document.querySelector('input[placeholder="Hanoratra..."]');
                                        sendMessage(i.value); i.value = '';
                                    }}><Icon name="send" size={18} /></Button>
                                </div>
                            </div>
                        )}

                        {activeTab === 'settings' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-black uppercase italic">Paramètres</h2>
                                <div className="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                                    <InputField label="Anaran'ny Vondrona" value={settings.groupName} onChange={e => updateSettings({groupName: e.target.value})} />
                                    <InputField label="Fivondronana" value={settings.fivondronana} onChange={e => updateSettings({fivondronana: e.target.value})} />
                                    <InputField label="Pseudo-nao" value={pseudo} onChange={e => {setPseudo(e.target.value); localStorage.setItem('scout_pseudo', e.target.value);}} />
                                </div>
                            </div>
                        )}
                    </main>

                    {isMenuOpen && (
                        <div className="fixed inset-0 z-50 flex justify-end">
                            <div className="absolute inset-0 bg-stone-900/40 backdrop-blur-sm" onClick={() => setIsMenuOpen(false)}></div>
                            <div className="relative w-72 bg-[#3d241c] h-full shadow-2xl p-6 flex flex-col">
                                <div className="flex justify-between items-center mb-10">
                                    <h2 className="text-2xl font-black text-amber-400 italic">VALIZY</h2>
                                    <button onClick={() => setIsMenuOpen(false)} className="text-white"><Icon name="x" size={24} /></button>
                                </div>
                                <nav className="space-y-2">
                                    <NavItem active={activeTab === 'accueil'} label="Tongasoa" icon="home" onClick={() => {setActiveTab('accueil'); setIsMenuOpen(false);}} />
                                    <NavItem active={activeTab === 'chat'} label="Resaka (Chat)" icon="message-circle" onClick={() => {setActiveTab('chat'); setIsMenuOpen(false);}} />
                                    <div className="border-t border-white/10 my-4"></div>
                                    <NavItem active={activeTab === 'settings'} label="Paramètres" icon="settings" onClick={() => {setActiveTab('settings'); setIsMenuOpen(false);}} />
                                </nav>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function NavItem({ active, label, icon, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all ${active ? 'bg-amber-500 text-stone-900 font-black' : 'text-stone-300 hover:bg-white/5'}`}>
                    <Icon name={icon} />
                    <span className="text-sm uppercase tracking-tight">{label}</span>
                </button>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
