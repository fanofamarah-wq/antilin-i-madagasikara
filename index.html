<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIZY - Connexion Forcée</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK v10 (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, addDoc, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        window.scoutApp = function() {
            return {
                tab: 'home',
                isConfigured: false,
                authStatus: 'Mampifandray...',
                db: null,
                auth: null,
                user: null,
                appId: typeof __app_id !== 'undefined' ? __app_id : 'valizy-default',
                
                settings: {
                    groupName: "Antilin'i Madagasikara",
                    fivondronana: "Fivondronana faha-17",
                    sampana: "Mpamakilay",
                    dina: "Tsy misaraka mandrakizay",
                    aboutText: "Mpanabe ny tanora mba ho vanona sy mahay mandray andraikitra."
                },

                scouts: [],
                messages: [],
                chatInput: '',
                currentUser: {
                    pseudo: localStorage.getItem('valizy_pseudo') || 'Mpanazava_' + Math.floor(Math.random() * 1000)
                },

                async init() {
                    const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                    if (!configStr) {
                        this.authStatus = "Config tsy hita";
                        return;
                    }

                    const app = initializeApp(JSON.parse(configStr));
                    this.auth = getAuth(app);
                    this.db = getFirestore(app);

                    // Login
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(this.auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(this.auth);
                        }
                    } catch (e) {
                        console.error("Auth Error", e);
                        this.authStatus = "Fahadisoana fidirana";
                    }

                    onAuthStateChanged(this.auth, (user) => {
                        if (user) {
                            this.user = user;
                            this.isConfigured = true;
                            this.authStatus = "Mandeha tsara";
                            this.syncData();
                        }
                    });
                },

                syncData() {
                    if (!this.user) return;

                    // Sync Settings
                    onSnapshot(doc(this.db, 'artifacts', this.appId, 'public', 'data', 'settings', 'global'), (d) => {
                        if (d.exists()) this.settings = { ...this.settings, ...d.data() };
                    });

                    // Sync Scouts
                    onSnapshot(collection(this.db, 'artifacts', this.appId, 'public', 'data', 'scouts'), (snap) => {
                        this.scouts = snap.docs.map(d => ({id: d.id, ...d.data()}));
                    });

                    // Sync Chat
                    onSnapshot(collection(this.db, 'artifacts', this.appId, 'public', 'data', 'chat'), (snap) => {
                        this.messages = snap.docs.map(d => d.data()).sort((a,b) => a.timestamp - b.timestamp);
                        this.$nextTick(() => {
                            const el = document.getElementById('chat-box');
                            if(el) el.scrollTop = el.scrollHeight;
                        });
                    });
                },

                async saveSettings() {
                    if (!this.user) return;
                    await setDoc(doc(this.db, 'artifacts', this.appId, 'public', 'data', 'settings', 'global'), this.settings, { merge: true });
                },

                async addScout() {
                    if (!this.user) return;
                    const name = prompt("Anaran'ny mpikambana:");
                    if (name) {
                        await addDoc(collection(this.db, 'artifacts', this.appId, 'public', 'data', 'scouts'), {
                            name: name,
                            timestamp: Date.now()
                        });
                    }
                },

                async sendMessage() {
                    if (!this.user || !this.chatInput.trim()) return;
                    await addDoc(collection(this.db, 'artifacts', this.appId, 'public', 'data', 'chat'), {
                        text: this.chatInput,
                        user: this.currentUser.pseudo,
                        uid: this.user.uid,
                        timestamp: Date.now()
                    });
                    this.chatInput = '';
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        [x-cloak] { display: none !important; }
        .tab-active { @apply bg-amber-600 text-white shadow-lg shadow-amber-900/20; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body x-data="scoutApp()" x-init="init()" x-cloak class="text-stone-900">

    <div class="flex h-screen overflow-hidden">
        <!-- BARRE LATERALE -->
        <aside class="w-64 bg-[#141414] text-white flex-shrink-0 hidden lg:flex flex-col border-r border-white/5 p-8">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center font-black rotate-3">V</div>
                <h2 class="font-black text-xl uppercase tracking-tighter">Valizy</h2>
            </div>

            <nav class="space-y-2 flex-1">
                <button @click="tab = 'home'" :class="tab === 'home' ? 'tab-active' : 'text-stone-400'" class="w-full text-left px-5 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">🏠 Tongasoa</button>
                <button @click="tab = 'members'" :class="tab === 'members' ? 'tab-active' : 'text-stone-400'" class="w-full text-left px-5 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">👥 Zatovo</button>
                <button @click="tab = 'chat'" :class="tab === 'chat' ? 'tab-active' : 'text-stone-400'" class="w-full text-left px-5 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">💬 Dinika</button>
                <button @click="tab = 'settings'" :class="tab === 'settings' ? 'tab-active' : 'text-stone-400'" class="w-full text-left px-5 py-3.5 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all">⚙️ Paramètre</button>
            </nav>

            <div class="mt-auto p-4 bg-white/5 rounded-2xl border border-white/10">
                <div class="flex items-center gap-2 mb-2">
                    <div :class="isConfigured ? 'bg-green-500' : 'bg-red-500'" class="w-2 h-2 rounded-full"></div>
                    <span class="text-[9px] font-black uppercase tracking-widest" x-text="authStatus"></span>
                </div>
                <input type="text" x-model="currentUser.pseudo" class="bg-transparent text-xs font-bold w-full outline-none border-b border-white/10 pb-1">
            </div>
        </aside>

        <!-- CONTENU -->
        <main class="flex-1 overflow-y-auto p-6 lg:p-12">
            
            <!-- HOME -->
            <div x-show="tab === 'home'" class="max-w-4xl mx-auto space-y-10">
                <div class="bg-white p-10 rounded-[3rem] border border-stone-200 shadow-sm flex items-center gap-10">
                    <div class="w-32 h-32 bg-stone-900 rounded-[2rem] flex items-center justify-center text-amber-500 text-5xl font-black">V</div>
                    <div>
                        <h1 class="text-5xl font-black text-stone-900 uppercase tracking-tighter" x-text="settings.groupName"></h1>
                        <p class="text-stone-400 font-bold uppercase tracking-widest text-sm" x-text="settings.fivondronana"></p>
                    </div>
                </div>
                <div class="bg-stone-900 p-10 rounded-[2.5rem] text-white">
                    <h3 class="text-amber-500 font-black text-[10px] uppercase tracking-widest mb-4">NY DINA</h3>
                    <p class="text-3xl font-bold italic" x-text="'« ' + settings.dina + ' »'"></p>
                </div>
            </div>

            <!-- MEMBERS -->
            <div x-show="tab === 'members'" class="max-w-4xl mx-auto space-y-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-4xl font-black uppercase tracking-tighter">Zatovo</h2>
                    <button @click="addScout()" class="bg-stone-900 text-white px-8 py-3 rounded-xl font-black text-xs uppercase">+ Zatovo</button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <template x-for="s in scouts">
                        <div class="bg-white p-6 rounded-3xl border border-stone-200 text-center">
                            <div class="w-16 h-16 bg-stone-100 rounded-full mx-auto mb-3 flex items-center justify-center font-black text-xl text-stone-400" x-text="s.name[0]"></div>
                            <h4 class="font-black text-stone-800" x-text="s.name"></h4>
                        </div>
                    </template>
                </div>
            </div>

            <!-- CHAT -->
            <div x-show="tab === 'chat'" class="max-w-4xl mx-auto h-[80vh] flex flex-col gap-4">
                <div id="chat-box" class="flex-1 bg-white rounded-[2rem] border border-stone-200 p-6 overflow-y-auto">
                    <template x-for="m in messages">
                        <div :class="m.uid === user?.uid ? 'text-right' : 'text-left'" class="mb-4">
                            <p class="text-[9px] font-black text-stone-400 uppercase mb-1" x-text="m.user"></p>
                            <div :class="m.uid === user?.uid ? 'bg-amber-600 text-white' : 'bg-stone-100'" class="px-5 py-2 rounded-2xl inline-block text-sm font-bold" x-text="m.text"></div>
                        </div>
                    </template>
                </div>
                <div class="flex gap-2">
                    <input type="text" x-model="chatInput" @keyup.enter="sendMessage()" placeholder="Hafatra..." class="flex-1 p-4 rounded-2xl border border-stone-200 outline-none focus:ring-2 focus:ring-amber-500/20 font-bold">
                    <button @click="sendMessage()" class="bg-stone-900 text-white px-8 rounded-2xl font-black">ALFA</button>
                </div>
            </div>

            <!-- SETTINGS -->
            <div x-show="tab === 'settings'" class="max-w-4xl mx-auto space-y-6">
                <h2 class="text-4xl font-black uppercase tracking-tighter">Paramètre</h2>
                <div class="bg-white p-8 rounded-[2rem] border border-stone-200 space-y-6">
                    <div>
                        <label class="text-[10px] font-black uppercase text-stone-400">Anaran'ny Vondrona</label>
                        <input type="text" x-model="settings.groupName" @blur="saveSettings()" class="w-full p-4 mt-1 bg-stone-50 rounded-xl border-none outline-none font-bold focus:ring-2 focus:ring-amber-500">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-stone-400">Dina</label>
                        <input type="text" x-model="settings.dina" @blur="saveSettings()" class="w-full p-4 mt-1 bg-stone-50 rounded-xl border-none outline-none font-bold focus:ring-2 focus:ring-amber-500">
                    </div>
                    <button @click="saveSettings()" class="w-full bg-amber-600 text-white py-4 rounded-xl font-black uppercase text-xs">Tehirizina ny fanovana</button>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
