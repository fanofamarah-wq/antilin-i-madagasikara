<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Scoutisme - Antilin'i Madagasikara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        .chat-bubble-me { border-radius: 18px 18px 2px 18px; }
        .chat-bubble-them { border-radius: 18px 18px 18px 2px; }
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid #d97706;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print {
            .no-print { display: none !important; }
            .print-section { display: block !important; }
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-900">
    <div id="root"></div>

    <!-- Firebase SDK Scripts -->
    <script type="importmap">
        {
          "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
            "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
            "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
          }
        }
    </script>

    <script type="text/babel" data-type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "firebase/auth";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, updateDoc } from "firebase/firestore";

        const { useState, useEffect, useRef } = React;
        const apiKey = ""; // Gemini API Key

        // Configuration Firebase
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'antilin-i-madagasikara';

        // --- Helpers API Gemini ---
        const callGemini = async (prompt, systemInstruction = "") => {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: systemInstruction ? { parts: [{ text: systemInstruction }] } : undefined
                    })
                });
                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text;
            } catch (error) { return "Erreur AI"; }
        };

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { width: size, height: size, class: className },
                        nameAttr: 'data-lucide', icons: window.lucide.icons
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center pointer-events-none ${className}`} style={{ width: size, height: size }}></span>;
        };

        const Button = ({ children, onClick, variant = "primary", className = "", type = "button", disabled = false }) => {
            const variants = {
                primary: "bg-amber-600 text-white hover:bg-amber-700",
                outline: "border-2 border-amber-600 text-amber-600 hover:bg-amber-50",
                secondary: "bg-stone-800 text-white hover:bg-stone-900",
                danger: "bg-red-500 text-white hover:bg-red-600",
                ghost: "text-stone-700 hover:bg-stone-100",
                ai: "bg-gradient-to-r from-purple-600 to-amber-600 text-white"
            };
            return (
                <button disabled={disabled} type={type} onClick={onClick} className={`px-4 py-2 rounded-lg font-medium transition-all flex items-center justify-center gap-2 ${disabled ? 'opacity-50' : ''} ${variants[variant]} ${className}`}>
                    {children}
                </button>
            );
        };

        const InputField = ({ label, value, onChange, placeholder, type = "text" }) => (
            <div>
                <label className="block text-[10px] font-black text-amber-800 mb-1 uppercase tracking-widest">{label}</label>
                <input type={type} value={value} onChange={onChange} placeholder={placeholder} className="w-full p-2.5 rounded-lg border border-stone-200 focus:ring-2 focus:ring-amber-500 outline-none text-sm"/>
            </div>
        );

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('accueil');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [pseudo, setPseudo] = useState(localStorage.getItem('scout_pseudo') || "Chef Scout");
            
            const [settings, setSettings] = useState({ groupName: "Antilin'i Madagasikara", fivondronana: "Fivondronana faha-17", logoUrl: null });
            const [scouts, setScouts] = useState([]);
            const [events, setEvents] = useState([]);
            const [fiches, setFiches] = useState([]);
            const [songs, setSongs] = useState([]);
            const [messages, setMessages] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;

                const publicPath = (col) => collection(db, 'artifacts', appId, 'public', 'data', col);

                const unsubSettings = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main'), (docSnap) => {
                    if (docSnap.exists()) setSettings(docSnap.data());
                }, (err) => console.error("Settings error:", err));

                const unsubScouts = onSnapshot(publicPath('scouts'), (s) => setScouts(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubEvents = onSnapshot(publicPath('events'), (s) => setEvents(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubFiches = onSnapshot(publicPath('fiches'), (s) => setFiches(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubSongs = onSnapshot(publicPath('songs'), (s) => setSongs(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubMessages = onSnapshot(publicPath('messages'), (s) => {
                    const msgList = s.docs.map(d => ({id: d.id, ...d.data()}));
                    setMessages(msgList.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)));
                });

                return () => {
                    unsubSettings(); unsubScouts(); unsubEvents(); unsubFiches(); unsubSongs(); unsubMessages();
                };
            }, [user]);

            const saveSettings = async (newSettings) => {
                if (!user) return;
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'main'), newSettings);
            };

            const addData = async (col, data) => {
                if (!user) return;
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', col), { ...data, timestamp: Date.now() });
            };

            const deleteData = async (col, id) => {
                if (!user) return;
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', col, id));
            };

            const renderContent = () => {
                if (!user) return <div className="flex items-center justify-center h-64"><div className="loader"></div></div>;
                switch (activeTab) {
                    case 'accueil': return <HomeView settings={settings} />;
                    case 'programme': return <ProgrammeView events={events} onAdd={(d) => addData('events', d)} onDelete={(id) => deleteData('events', id)} />;
                    case 'fanabeazana': return <FanabeazanaView fiches={fiches} onAdd={(d) => addData('fiches', d)} />;
                    case 'lisitra': return <LisitraView scouts={scouts} onAdd={(d) => addData('scouts', d)} />;
                    case 'hira': return <HiraLalaoView songs={songs} onAdd={(d) => addData('songs', d)} />;
                    case 'chat': return <ChatView messages={messages} onAdd={(d) => addData('messages', d)} pseudo={pseudo} setPseudo={(p) => {setPseudo(p); localStorage.setItem('scout_pseudo', p);}} />;
                    case 'settings': return <SettingsView settings={settings} onSave={saveSettings} />;
                    default: return <HomeView settings={settings} />;
                }
            };

            return (
                <div className="min-h-screen flex overflow-hidden">
                    {isMenuOpen && <div className="fixed inset-0 bg-stone-900/60 z-40 lg:hidden" onClick={() => setIsMenuOpen(false)} />}
                    <main className="flex-1 h-screen overflow-y-auto pb-10">
                        <header className="sticky top-0 bg-white/90 backdrop-blur-md border-b border-orange-100 p-4 flex justify-between items-center z-30 no-print">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-amber-600 rounded-full flex items-center justify-center text-white font-bold shadow-md overflow-hidden">
                                    {settings.logoUrl ? <img src={settings.logoUrl} className="w-full h-full object-cover" /> : "A"}
                                </div>
                                <div>
                                    <h1 className="font-black text-amber-900 text-lg leading-none">{settings.groupName}</h1>
                                    <p className="text-[10px] text-stone-500 font-bold uppercase tracking-tighter">{settings.fivondronana}</p>
                                </div>
                            </div>
                            <button onClick={() => setIsMenuOpen(true)} className="p-2 hover:bg-orange-50 rounded-full text-amber-900"><Icon name="menu" size={28} /></button>
                        </header>
                        <div className="max-w-6xl mx-auto p-4 lg:p-8">{renderContent()}</div>
                    </main>

                    <aside className={`fixed top-0 right-0 h-full w-80 bg-[#4b2c20] text-stone-100 z-50 transform transition-transform duration-300 ease-in-out shadow-2xl no-print ${isMenuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                        <div className="p-6 h-full flex flex-col">
                            <div className="flex justify-between items-center mb-6">
                                <h2 className="text-xl font-black uppercase tracking-widest text-amber-400">Valizy</h2>
                                <button onClick={() => setIsMenuOpen(false)} className="p-1 hover:bg-white/10 rounded-full"><Icon name="x" size={24} /></button>
                            </div>
                            <nav className="space-y-1 flex-1 overflow-y-auto custom-scrollbar">
                                <MenuButton icon="home" label="Tongasoa" active={activeTab === 'accueil'} onClick={() => {setActiveTab('accueil'); setIsMenuOpen(false);}} />
                                <MenuButton icon="calendar" label="Programme" active={activeTab === 'programme'} onClick={() => {setActiveTab('programme'); setIsMenuOpen(false);}} />
                                <MenuButton icon="book-open" label="Fanabeazana" active={activeTab === 'fanabeazana'} onClick={() => {setActiveTab('fanabeazana'); setIsMenuOpen(false);}} />
                                <MenuButton icon="users" label="Lisitry ny zatovo" active={activeTab === 'lisitra'} onClick={() => {setActiveTab('lisitra'); setIsMenuOpen(false);}} />
                                <MenuButton icon="music" label="Hira sy Lalao" active={activeTab === 'hira'} onClick={() => {setActiveTab('hira'); setIsMenuOpen(false);}} />
                                <MenuButton icon="message-circle" label="Resaka (Chat)" active={activeTab === 'chat'} onClick={() => {setActiveTab('chat'); setIsMenuOpen(false);}} />
                                <div className="pt-4 border-t border-white/10 mt-4"><MenuButton icon="settings" label="Paramètres" active={activeTab === 'settings'} onClick={() => {setActiveTab('settings'); setIsMenuOpen(false);}} /></div>
                            </nav>
                        </div>
                    </aside>
                </div>
            );
        }

        function MenuButton({ icon, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-4 px-4 py-3 rounded-xl transition-all ${active ? 'bg-amber-500 text-stone-900 shadow-lg' : 'hover:bg-white/5 text-stone-200'}`}>
                    <Icon name={icon} size={18} />
                    <span className="font-bold text-sm">{label}</span>
                </button>
            );
        }

        function HomeView({ settings }) {
            return (
                <div className="text-center py-12 flex flex-col items-center">
                    <div className="relative mb-6">
                        <div className="absolute -inset-10 bg-amber-500/20 rounded-full blur-3xl"></div>
                        <div className="relative w-48 h-48 bg-stone-800 rounded-full border-8 border-white shadow-2xl flex items-center justify-center overflow-hidden">
                            {settings.logoUrl ? <img src={settings.logoUrl} className="w-full h-full object-cover" /> : <Icon name="users" size={80} className="text-amber-50" />}
                        </div>
                    </div>
                    <h2 className="text-4xl font-black text-stone-900 mb-2 uppercase">{settings.groupName}</h2>
                    <div className="bg-amber-100 px-4 py-1 rounded-full text-amber-800 font-black text-sm uppercase">{settings.fivondronana}</div>
                </div>
            );
        }

        function ChatView({ messages, onAdd, pseudo, setPseudo }) {
            const [input, setInput] = useState("");
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const sendMessage = (type = "text", duration = null) => {
                if (type === "text" && !input.trim()) return;
                onAdd({
                    sender: pseudo,
                    text: type === "text" ? input : `Hafatra feo (${duration})`,
                    type: type,
                    duration: duration,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                if (type === "text") setInput("");
            };

            return (
                <div className="h-[70vh] flex flex-col space-y-4">
                    <div className="flex justify-between items-center bg-amber-50 p-3 rounded-xl border border-amber-100">
                        <div className="flex items-center gap-3">
                            <Icon name="message-circle" className="text-amber-600" />
                            <h3 className="font-black text-amber-900 text-sm uppercase">Resaka (Temps Réel)</h3>
                        </div>
                        <input value={pseudo} onChange={e => setPseudo(e.target.value)} className="bg-white border text-xs p-1 rounded font-bold w-32 outline-none focus:ring-1 focus:ring-amber-500" />
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 bg-white rounded-2xl border border-stone-100 custom-scrollbar">
                        {messages.map((m) => (
                            <div key={m.id} className={`flex flex-col ${m.sender === pseudo ? 'items-end' : 'items-start'}`}>
                                <span className="text-[9px] font-black text-stone-400 mb-1 px-2 uppercase">{m.sender}</span>
                                <div className={`max-w-[80%] p-3 shadow-sm ${m.sender === pseudo ? 'bg-amber-600 text-white chat-bubble-me' : 'bg-stone-100 text-stone-800 chat-bubble-them'}`}>
                                    {m.type === 'vocal' ? (
                                        <div className="flex items-center gap-3"><Icon name="play-circle" size={24} /> <span className="text-[10px]">{m.duration}</span></div>
                                    ) : <p className="text-sm">{m.text}</p>}
                                </div>
                                <span className="text-[8px] text-stone-400 mt-1">{m.time}</span>
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>
                    <div className="flex gap-2 items-center bg-stone-100 p-2 rounded-2xl">
                        <Button variant="ghost" onClick={() => sendMessage("vocal", "0:12")} className="rounded-full"><Icon name="mic" /></Button>
                        <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && sendMessage()} placeholder="Hafatra..." className="flex-1 bg-transparent border-none outline-none text-sm px-2" />
                        <Button onClick={() => sendMessage()} className="rounded-full w-10 h-10 p-0"><Icon name="send" /></Button>
                    </div>
                </div>
            );
        }

        function ProgrammeView({ events, onAdd, onDelete }) {
            const [form, setForm] = useState({ title: '', date: '', description: '' });
            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-black uppercase">Programme</h2>
                    <div className="bg-amber-50 p-4 rounded-xl space-y-4">
                        <InputField label="Titre" value={form.title} onChange={e => setForm({...form, title: e.target.value})} />
                        <InputField label="Daty" type="date" value={form.date} onChange={e => setForm({...form, date: e.target.value})} />
                        <Button onClick={() => {onAdd(form); setForm({title:'', date:'', description:''});}}>Hanampy Programme</Button>
                    </div>
                    <div className="space-y-2">
                        {events.map(e => (
                            <div key={e.id} className="bg-white p-4 rounded-xl border flex justify-between items-center">
                                <div><h4 className="font-bold">{e.title}</h4><p className="text-xs text-stone-500">{e.date}</p></div>
                                <Button variant="danger" onClick={() => onDelete(e.id)} className="p-2"><Icon name="trash-2" size={16}/></Button>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function LisitraView({ scouts, onAdd }) {
            const [form, setForm] = useState({ name: '', fname: '' });
            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-black uppercase">Zatovo</h2>
                    <div className="bg-amber-50 p-4 rounded-xl flex gap-4 items-end">
                        <InputField label="Anarana" value={form.name} onChange={e => setForm({...form, name: e.target.value})} />
                        <InputField label="Fanampiny" value={form.fname} onChange={e => setForm({...form, fname: e.target.value})} />
                        <Button onClick={() => {onAdd(form); setForm({name:'', fname:''});}}>Hanampy</Button>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        {scouts.map(s => (
                            <div key={s.id} className="bg-white p-4 rounded-xl border text-center">
                                <div className="w-12 h-12 bg-stone-100 rounded-full mx-auto mb-2 flex items-center justify-center"><Icon name="user" /></div>
                                <h4 className="font-bold text-sm">{s.name}</h4>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function FanabeazanaView({ fiches, onAdd }) {
            const [title, setTitle] = useState("");
            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-black uppercase">Fanabeazana</h2>
                    <div className="flex gap-2">
                        <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Lohahevitra..." className="flex-1 p-2 border rounded-lg" />
                        <Button onClick={() => {onAdd({title, content: 'Fiche générée'}); setTitle("");}}>Hanampy Fiche</Button>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {fiches.map(f => (
                            <div key={f.id} className="bg-white p-4 rounded-xl border-l-4 border-amber-600 font-bold">{f.title}</div>
                        ))}
                    </div>
                </div>
            );
        }

        function HiraLalaoView({ songs, onAdd }) {
            const [title, setTitle] = useState("");
            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-black uppercase">Hira sy Lalao</h2>
                    <div className="flex gap-2">
                        <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Titre..." className="flex-1 p-2 border rounded-lg" />
                        <Button onClick={() => {onAdd({title}); setTitle("");}}>Hanampy</Button>
                    </div>
                    <div className="space-y-2">
                        {songs.map(s => (
                            <div key={s.id} className="bg-white p-3 rounded-xl border">{s.title}</div>
                        ))}
                    </div>
                </div>
            );
        }

        function SettingsView({ settings, onSave }) {
            return (
                <div className="space-y-6">
                    <h2 className="text-3xl font-black uppercase">Paramètres</h2>
                    <div className="bg-white p-6 rounded-xl border space-y-4">
                        <InputField label="Anaran'ny Vondrona" value={settings.groupName || ''} onChange={e => onSave({...settings, groupName: e.target.value})} />
                        <InputField label="Fivondronana" value={settings.fivondronana || ''} onChange={e => onSave({...settings, fivondronana: e.target.value})} />
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
