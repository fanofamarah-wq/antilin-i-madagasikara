<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIZY - Firestore Opérationnel</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        [x-cloak] { display: none !important; }
        .card-scout { transition: all 0.3s ease; }
        .card-scout:hover { transform: translateY(-3px); box-shadow: 0 10px 20px -5px rgba(0, 0, 0, 0.1); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .tab-active { @apply bg-amber-600 text-white shadow-lg shadow-amber-900/20; }
    </style>

    <script>
        window.scoutApp = function() {
            return {
                tab: 'home',
                isConfigured: false,
                showForm: false,
                authStatus: 'Mampifandray...',
                currentUser: {
                    uid: null,
                    pseudo: localStorage.getItem('valizy_pseudo') || 'Mpanazava_' + Math.floor(Math.random() * 1000)
                },
                
                settings: {
                    groupName: "Antilin'i Madagasikara",
                    fivondronana: "Fivondronana faha-17",
                    sampana: "Mpamakilay",
                    dina: "Tsy misaraka mandrakizay",
                    aboutText: "Mpanabe ny tanora mba ho vanona sy mahay mandray andraikitra.",
                    logo: null
                },

                news: [],
                events: [],
                scouts: [],
                messages: [],

                formEvent: { title: '', date: '' },
                formScout: { name: '', firstname: '', address: '', phone: '', facebook: '', image: null },
                formNews: { title: '', desc: '' },
                chatInput: '',

                db: null,
                appId: typeof __app_id !== 'undefined' ? __app_id : 'antilin-i-madagasikara',

                async initApp() {
                    try {
                        const configStr = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
                        if (!configStr) {
                            this.authStatus = "Tsy hita ny config";
                            return;
                        }
                        const firebaseConfig = JSON.parse(configStr);

                        if (!firebase.apps.length) {
                            firebase.initializeApp(firebaseConfig);
                        }
                        
                        this.db = firebase.firestore();
                        const auth = firebase.auth();

                        // Procédure d'authentification robuste
                        const startAuth = async () => {
                            try {
                                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                    await auth.signInWithCustomToken(__initial_auth_token);
                                } else {
                                    await auth.signInAnonymously();
                                }
                            } catch (err) {
                                console.error("Auth error, retrying...", err);
                                setTimeout(startAuth, 2000);
                            }
                        };

                        auth.onAuthStateChanged((user) => {
                            if (user) {
                                this.currentUser.uid = user.uid;
                                this.isConfigured = true;
                                this.authStatus = "Mandeha tsara";
                                this.setupRealtimeSync();
                            } else {
                                startAuth();
                            }
                        });

                    } catch (e) {
                        console.error("Init Error:", e);
                        this.authStatus = "Fahadisoana teknika";
                    }
                },

                getCollectionPath(collectionName) {
                    // RÈGLE CRITIQUE : Toujours utiliser ce préfixe de chemin
                    return `artifacts/${this.appId}/public/data/${collectionName}`;
                },

                setupRealtimeSync() {
                    if (!this.db || !this.currentUser.uid) return;

                    // Sync Settings
                    const settingsRef = this.db.doc(`artifacts/${this.appId}/public/data/settings/global`);
                    settingsRef.onSnapshot(doc => {
                        if (doc.exists) {
                            this.settings = { ...this.settings, ...doc.data() };
                        }
                    }, err => console.error("Settings Sync Error:", err));

                    // Sync Collections
                    const collections = ['scouts', 'events', 'news', 'chat'];
                    collections.forEach(coll => {
                        this.db.collection(this.getCollectionPath(coll))
                            .onSnapshot(snap => {
                                const data = snap.docs.map(d => ({...d.data(), id: d.id}));
                                if (coll === 'chat') {
                                    this.messages = data.sort((a,b) => (a.timestamp || 0) - (b.timestamp || 0));
                                    this.$nextTick(() => this.scrollToBottom());
                                } else {
                                    this[coll] = data;
                                }
                            }, err => console.error(`Sync ${coll} Error:`, err));
                    });
                },

                async updateSettings() {
                    if (!this.isConfigured || !this.db || !this.currentUser.uid) return;
                    try {
                        const path = `artifacts/${this.appId}/public/data/settings/global`;
                        await this.db.doc(path).set(this.settings, { merge: true });
                    } catch (e) { console.error("Error saving settings:", e); }
                },

                async addData(collectionName, data) {
                    if (!this.isConfigured || !this.db || !this.currentUser.uid) return;
                    try {
                        const path = this.getCollectionPath(collectionName);
                        // Cette commande crée automatiquement la collection si elle n'existe pas
                        await this.db.collection(path).add({
                            ...data,
                            timestamp: Date.now(),
                            author: this.currentUser.pseudo,
                            authorId: this.currentUser.uid
                        });
                    } catch (e) { 
                        console.error(`Add ${collectionName} Error:`, e); 
                    }
                },

                async sendMessage() {
                    if(!this.chatInput.trim() || !this.isConfigured) return;
                    await this.addData('chat', {
                        user: this.currentUser.pseudo,
                        text: this.chatInput,
                        time: new Date().toLocaleTimeString('mg-MG', {hour: '2-digit', minute:'2-digit'})
                    });
                    this.chatInput = '';
                },

                scrollToBottom() {
                    const el = document.getElementById('chat-box');
                    if (el) el.scrollTop = el.scrollHeight;
                },

                updatePseudo() {
                    localStorage.setItem('valizy_pseudo', this.currentUser.pseudo);
                }
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body x-data="scoutApp()" x-init="initApp()" x-cloak class="text-stone-900">

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="w-64 bg-[#141414] text-white flex-shrink-0 hidden lg:flex flex-col border-r border-white/5">
            <div class="p-8 h-full flex flex-col">
                <div class="flex items-center gap-3 mb-12">
                    <div class="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg shadow-amber-600/20 rotate-3">V</div>
                    <div>
                        <h2 class="font-black text-xl leading-none tracking-tighter uppercase">Valizy</h2>
                        <p class="text-[9px] text-amber-500 font-bold uppercase tracking-widest mt-1">Antilin'i Madagasikara</p>
                    </div>
                </div>

                <nav class="space-y-2 flex-1">
                    <button @click="tab = 'home'" :class="tab === 'home' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>🏠</span> Tongasoa
                    </button>
                    <button @click="tab = 'calendar'" :class="tab === 'calendar' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>📅</span> Programa
                    </button>
                    <button @click="tab = 'members'" :class="tab === 'members' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>👥</span> Zatovo
                    </button>
                    <button @click="tab = 'chat'" :class="tab === 'chat' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>💬</span> Dinika
                    </button>
                    <button @click="tab = 'settings'" :class="tab === 'settings' ? 'tab-active' : 'text-stone-400 hover:bg-white/5'" class="w-full flex items-center gap-4 px-5 py-3.5 rounded-2xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                        <span>⚙️</span> Paramètre
                    </button>
                </nav>

                <div class="mt-auto p-5 bg-white/5 rounded-3xl border border-white/10">
                    <div class="flex items-center gap-2 mb-3">
                        <div :class="isConfigured ? 'bg-green-500 shadow-green-500/50' : 'bg-red-500 shadow-red-500/50'" class="w-2 h-2 rounded-full shadow-[0_0_8px]"></div>
                        <span class="text-[9px] font-black uppercase tracking-widest" x-text="authStatus"></span>
                    </div>
                    <label class="text-[8px] uppercase font-black text-amber-500 mb-1 block">Anaranao</label>
                    <input type="text" x-model="currentUser.pseudo" @blur="updatePseudo" class="bg-transparent text-xs font-bold w-full outline-none focus:text-amber-400 border-b border-white/10 pb-1">
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto bg-[#fafafa]">
            <div class="max-w-5xl mx-auto p-6 lg:p-12">

                <!-- TAB: HOME -->
                <div x-show="tab === 'home'" class="space-y-10">
                    <div class="bg-white p-10 rounded-[3rem] border border-stone-200 shadow-sm flex flex-col md:flex-row items-center gap-10">
                        <div class="w-44 h-44 bg-stone-900 rounded-[2.8rem] flex items-center justify-center text-amber-500 shadow-2xl overflow-hidden border-8 border-white">
                            <template x-if="settings.logo"><img :src="settings.logo" class="w-full h-full object-cover"></template>
                            <template x-if="!settings.logo"><span class="text-7xl font-black">V</span></template>
                        </div>
                        <div class="text-center md:text-left flex-1">
                            <h1 class="text-5xl font-black text-stone-900 uppercase tracking-tighter mb-4" x-text="settings.groupName"></h1>
                            <div class="inline-flex bg-amber-100 text-amber-900 px-6 py-1.5 rounded-full text-[11px] font-black uppercase tracking-widest mb-6" x-text="settings.fivondronana"></div>
                            <p class="text-stone-500 text-lg font-medium italic" x-text="settings.aboutText"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-white p-10 rounded-[2.5rem] border border-stone-200">
                            <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-stone-400 mb-8 flex items-center gap-2">VAOVAO FARANY</h3>
                            <div class="space-y-8">
                                <template x-for="n in news">
                                    <div class="border-b border-stone-100 pb-4">
                                        <h4 class="font-black text-stone-800 text-xl" x-text="n.title"></h4>
                                        <p class="text-sm text-stone-500 mt-2" x-text="n.desc"></p>
                                    </div>
                                </template>
                                <template x-if="news.length === 0">
                                    <p class="text-stone-300 italic text-sm">Tsy misy vaovao.</p>
                                </template>
                            </div>
                        </div>
                        <div class="bg-stone-900 p-10 rounded-[2.5rem] text-white">
                            <h3 class="font-black text-[10px] uppercase tracking-[0.2em] text-amber-500 mb-8">NY DINA</h3>
                            <p class="text-3xl font-bold italic" x-text="'« ' + settings.dina + ' »'"></p>
                        </div>
                    </div>
                </div>

                <!-- TAB: ZATOVO -->
                <div x-show="tab === 'members'" class="space-y-8">
                    <div class="flex justify-between items-end">
                        <h2 class="text-4xl font-black uppercase tracking-tighter">Zatovo</h2>
                        <button @click="showForm = !showForm" class="bg-stone-900 text-white px-8 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest">
                            <span x-text="showForm ? 'Hakatona' : '+ Zatovo'"></span>
                        </button>
                    </div>

                    <div x-show="showForm" class="bg-white p-10 rounded-[3rem] border-2 border-amber-100 space-y-6 shadow-xl">
                        <div class="grid grid-cols-2 gap-6">
                            <input type="text" x-model="formScout.name" placeholder="Anarana" class="p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold focus:ring-amber-500">
                            <input type="text" x-model="formScout.firstname" placeholder="Fanampiny" class="p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-200 font-bold focus:ring-amber-500">
                        </div>
                        <button @click="addData('scouts', formScout); formScout={name:'', firstname:''}; showForm=false" class="w-full bg-amber-600 text-white py-5 rounded-2xl font-black uppercase text-xs hover:bg-amber-700 transition-colors shadow-lg shadow-amber-600/20">Tahiry</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <template x-for="s in scouts">
                            <div class="bg-white p-8 rounded-[2.5rem] border border-stone-200 text-center card-scout">
                                <div class="w-20 h-20 bg-stone-100 rounded-full mx-auto mb-4 flex items-center justify-center font-black text-2xl text-stone-400" x-text="s.name ? s.name[0] : 'S'"></div>
                                <h4 class="font-black text-stone-800" x-text="s.name + ' ' + (s.firstname || '')"></h4>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- TAB: CHAT -->
                <div x-show="tab === 'chat'" class="h-[70vh] flex flex-col gap-4">
                    <h2 class="text-4xl font-black uppercase tracking-tighter">Dinika</h2>
                    <div id="chat-box" class="flex-1 bg-white rounded-[3rem] border border-stone-200 p-8 overflow-y-auto shadow-inner">
                        <template x-for="m in messages">
                            <div :class="m.authorId === currentUser.uid ? 'text-right' : 'text-left'" class="mb-6">
                                <p class="text-[9px] font-black text-stone-400 uppercase mb-1 px-2" x-text="m.user"></p>
                                <div :class="m.authorId === currentUser.uid ? 'bg-amber-600 text-white' : 'bg-stone-100 text-stone-800'" class="px-6 py-3 rounded-[2rem] inline-block font-semibold text-sm shadow-sm max-w-[80%]" x-text="m.text"></div>
                                <p class="text-[8px] text-stone-300 mt-1 px-2" x-text="m.time"></p>
                            </div>
                        </template>
                    </div>
                    <div class="flex gap-3 bg-white p-2 rounded-[2.5rem] border border-stone-200 shadow-lg">
                        <input type="text" x-model="chatInput" @keyup.enter="sendMessage" placeholder=" Manorata hafatra..." class="flex-1 p-4 rounded-full bg-transparent outline-none font-bold text-stone-700">
                        <button @click="sendMessage" class="bg-stone-900 text-white w-14 h-14 rounded-full flex items-center justify-center hover:bg-amber-600 transition-all shadow-lg">
                            <svg class="w-6 h-6 rotate-45" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- TAB: SETTINGS -->
                <div x-show="tab === 'settings'" class="space-y-8">
                     <h2 class="text-4xl font-black uppercase tracking-tighter">Paramètre</h2>
                     <div class="bg-white p-10 rounded-[3rem] border border-stone-200 space-y-8 shadow-sm">
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase tracking-widest text-stone-400">Anaran'ny Vondrona</label>
                            <input type="text" x-model="settings.groupName" @blur="updateSettings" class="w-full p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-100 font-bold focus:ring-amber-500">
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase tracking-widest text-stone-400">Momba ny vondrona</label>
                            <textarea x-model="settings.aboutText" @blur="updateSettings" class="w-full p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-100 font-bold h-32 focus:ring-amber-500"></textarea>
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] font-black uppercase tracking-widest text-stone-400">Dina</label>
                            <input type="text" x-model="settings.dina" @blur="updateSettings" class="w-full p-4 rounded-2xl bg-stone-50 outline-none ring-1 ring-stone-100 font-bold focus:ring-amber-500">
                        </div>
                     </div>
                </div>

            </div>
        </main>
    </div>
</body>
</html>
