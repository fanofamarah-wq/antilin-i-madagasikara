<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valizy Scoutisme - Gestion de Groupe</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Logic Application -->
    <script>
        const apiKey = ""; 

        const __firebase_config_user = {
            apiKey: "AIzaSyCWHPT2XDbpEA0Jw-t6IE0w6o6K5MkJz4Q",
            authDomain: "antilin-i-madagasikara.firebaseapp.com",
            projectId: "antilin-i-madagasikara",
            storageBucket: "antilin-i-madagasikara.firebasestorage.app",
            messagingSenderId: "881813118154",
            appId: "1:881813118154:web:1e4284b18f9440f004e833"
        };

        function scoutApp() {
            return {
                isMenuOpen: false,
                activeTab: 'accueil',
                showAddModal: false,
                user: null,
                appId: typeof __app_id !== 'undefined' ? __app_id : 'valizy-scout-v2-final',
                isGeneratingAI: false,
                archiveFilter: 'all',

                // --- CHAT STATE ---
                chatUser: null, // Utilisateur du chat (pseudo + pass)
                chatLogin: { pseudo: '', password: '' },
                chatMessages: [],
                newMessage: '',
                isChangingPass: false,
                newPassValue: '',

                settings: {
                    groupName: "Antilin'i Madagasikara",
                    fivondronana: "Fivondronana faha-17",
                    dina: "Tsy misaraka mandrakizay",
                    logo: null,
                    news: "",
                    tetiandroTitle: "SEHA-PIBEAZANA ANTILY"
                },
                
                events: [],
                scouts: [],
                fiches: [],
                archives: [],
                plans: [
                    { trim: 1, label: 'Trimestre 1', content: '' },
                    { trim: 2, label: 'Trimestre 2', content: '' },
                    { trim: 3, label: 'Trimestre 3', content: '' }
                ],
                
                forms: {
                    event: { title: '', date: '', location: '' },
                    scout: { name: '', fname: '', phone: '', birth: '', address: '', facebook: '', note: '', photo: null },
                    fiche: { title: '', category: '', content: '', theme: '', goals: '', duration: '', participants: '', note: '' },
                    archive: { title: '', category: 'Ho an\'ny rehetra', fileData: null, fileName: '' }
                },

                menuItems: [
                    { id: 'accueil', label: 'Tongasoa', icon: 'home' },
                    { id: 'programme', label: 'Programme', icon: 'calendar' },
                    { id: 'lisitra', label: 'Zatovo', icon: 'users' },
                    { id: 'fanabeazana', label: 'Fanabeazana', icon: 'book-open' },
                    { id: 'tetiandro', label: 'Tetiandro', icon: 'layout' },
                    { id: 'tahiry', label: 'Tahiry', icon: 'folder-open' },
                    { id: 'chat', label: 'Tafasiry', icon: 'message-circle' }, // Nouvel onglet
                    { id: 'settings', label: 'Paramètre', icon: 'settings' }
                ],

                // --- GEMINI LOGIC ---
                async callGemini(prompt, systemInstruction = "") {
                    this.isGeneratingAI = true;
                    let retries = 0;
                    const maxRetries = 5;
                    const payload = {
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: systemInstruction ? { parts: [{ text: systemInstruction }] } : undefined
                    };
                    while (retries < maxRetries) {
                        try {
                            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            if (!response.ok) throw new Error("API Error");
                            const result = await response.json();
                            this.isGeneratingAI = false;
                            return result.candidates?.[0]?.content?.parts?.[0]?.text;
                        } catch (e) {
                            retries++;
                            await new Promise(r => setTimeout(r, Math.pow(2, retries) * 1000));
                        }
                    }
                    this.isGeneratingAI = false;
                    return null;
                },

                async generateFicheWithAI() {
                    if (!this.forms.fiche.title) return this.showNotification("Ampidiro ny lohateny!");
                    const prompt = `Mamorona fiche technique scout amin'ny teny malagasy ho an'ny: "${this.forms.fiche.title}". Omeo JSON: content, goals, duration, participants.`;
                    const res = await this.callGemini(prompt, "Mpitarika skoto matihanina ianao.");
                    if (res) {
                        try {
                            const data = JSON.parse(res.replace(/```json|```/g, ""));
                            this.forms.fiche = { ...this.forms.fiche, ...data };
                        } catch(e) { this.forms.fiche.content = res; }
                    }
                },

                async analyzeProgressWithAI() {
                    const data = this.plans.map(p => `T${p.trim}: ${p.content}`).join("\n");
                    const res = await this.callGemini(`Diniho ireto tombana ireto: \n${data}`, "Commissaire pédagogique ianao.");
                    if (res) {
                        const modal = document.createElement('div');
                        modal.className = "fixed inset-0 bg-black/80 flex items-center justify-center z-[200] p-4";
                        modal.innerHTML = `<div class="bg-white p-8 rounded-[2.5rem] max-w-2xl w-full shadow-2xl overflow-y-auto max-h-[80vh]"><h3 class="text-2xl font-black mb-4 text-amber-600">✨ IA ANALYSIS</h3><p class="text-sm leading-relaxed">${res}</p><button onclick="this.parentElement.parentElement.remove()" class="mt-8 w-full bg-stone-900 text-white py-4 rounded-2xl font-bold">HIKATONA</button></div>`;
                        document.body.appendChild(modal);
                    }
                },

                // --- CHAT LOGIC ---
                async enterChat() {
                    if (!this.chatLogin.pseudo || !this.chatLogin.password) return this.showNotification("Fenoy ny pseudo sy password");
                    const db = firebase.firestore();
                    const userRef = db.collection('artifacts').doc(this.appId).collection('public').doc('data').collection('chat_users').doc(this.chatLogin.pseudo);
                    
                    const doc = await userRef.get();
                    if (doc.exists) {
                        if (doc.data().password === this.chatLogin.password) {
                            this.chatUser = { pseudo: this.chatLogin.pseudo, password: this.chatLogin.password };
                            this.showNotification("Tafiditra ianao!");
                        } else {
                            this.showNotification("Diso ny teny miafina!");
                        }
                    } else {
                        // Création automatique si premier accès avec 1234
                        if (this.chatLogin.password === '1234') {
                            await userRef.set({ pseudo: this.chatLogin.pseudo, password: '1234' });
                            this.chatUser = { pseudo: this.chatLogin.pseudo, password: '1234' };
                            this.showNotification("Kaonty vaovao voaforona!");
                        } else {
                            this.showNotification("Ny teny miafina voalohany dia 1234");
                        }
                    }
                },

                async changeChatPassword() {
                    if (!this.newPassValue) return;
                    const db = firebase.firestore();
                    await db.collection('artifacts').doc(this.appId).collection('public').doc('data').collection('chat_users').doc(this.chatUser.pseudo).update({
                        password: this.newPassValue
                    });
                    this.chatUser.password = this.newPassValue;
                    this.isChangingPass = false;
                    this.newPassValue = '';
                    this.showNotification("Voasolo ny teny miafina!");
                },

                async sendMessage() {
                    if (!this.newMessage.trim() || !this.chatUser) return;
                    const db = firebase.firestore();
                    await db.collection('artifacts').doc(this.appId).collection('public').doc('data').collection('chat_messages').add({
                        sender: this.chatUser.pseudo,
                        text: this.newMessage,
                        timestamp: Date.now()
                    });
                    this.newMessage = '';
                    this.scrollChat();
                },

                scrollChat() {
                    setTimeout(() => {
                        const container = document.getElementById('chat-container');
                        if(container) container.scrollTop = container.scrollHeight;
                    }, 100);
                },

                // --- CORE FIREBASE ---
                async initFirebase() {
                    try {
                        const config = (__firebase_config_user.apiKey !== "VOTRE_API_KEY") ? __firebase_config_user : JSON.parse(__firebase_config);
                        if (!firebase.apps.length) firebase.initializeApp(config);
                        const auth = firebase.auth();
                        const db = firebase.firestore();

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }

                        auth.onAuthStateChanged((user) => {
                            this.user = user;
                            if (user) this.syncData(db);
                        });
                    } catch (e) { console.error(e); }
                    this.$nextTick(() => lucide.createIcons());
                },

                syncData(db) {
                    const base = db.collection('artifacts').doc(this.appId).collection('public').doc('data');

                    base.collection('settings').doc('global').onSnapshot(doc => { if (doc.exists) this.settings = { ...this.settings, ...doc.data() }; });
                    base.collection('events').onSnapshot(snap => { this.events = snap.docs.map(d => ({ id: d.id, ...d.data() })); this.$nextTick(() => lucide.createIcons()); });
                    base.collection('scouts').onSnapshot(snap => { this.scouts = snap.docs.map(d => ({ id: d.id, ...d.data() })); this.$nextTick(() => lucide.createIcons()); });
                    base.collection('fiches').onSnapshot(snap => { this.fiches = snap.docs.map(d => ({ id: d.id, ...d.data() })); this.$nextTick(() => lucide.createIcons()); });
                    base.collection('archives').onSnapshot(snap => { this.archives = snap.docs.map(d => ({ id: d.id, ...d.data() })); this.$nextTick(() => lucide.createIcons()); });
                    base.collection('plans').onSnapshot(snap => {
                        if (!snap.empty) {
                            const cloud = snap.docs.map(d => d.data());
                            this.plans = this.plans.map(p => cloud.find(c => c.trim === p.trim) || p);
                        }
                    });
                    
                    // Sync Chat
                    base.collection('chat_messages').onSnapshot(snap => {
                        this.chatMessages = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b) => a.timestamp - b.timestamp);
                        this.scrollChat();
                    });
                },

                handleFileUpload(event, target, key) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        if (target === 'settings') this.settings[key] = e.target.result;
                        else if (target === 'archive') { this.forms.archive.fileData = e.target.result; this.forms.archive.fileName = file.name; }
                        else this.forms[target][key] = e.target.result;
                    };
                    reader.readAsDataURL(file);
                },

                async saveItem(col, key) {
                    if (!this.user) return;
                    const db = firebase.firestore();
                    await db.collection('artifacts').doc(this.appId).collection('public').doc('data').collection(col).add({ ...this.forms[key], createdAt: Date.now() });
                    this.showAddModal = false;
                    // Reset Logic omitted for brevity but maintained in function
                },

                async deleteItem(col, id) {
                    if (!this.user) return;
                    await firebase.firestore().collection('artifacts').doc(this.appId).collection('public').doc('data').collection(col).doc(id).delete();
                },

                async saveSettings() {
                    await firebase.firestore().collection('artifacts').doc(this.appId).collection('public').doc('data').collection('settings').doc('global').set(this.settings);
                    this.showNotification("Vita tehirizina!");
                },

                async savePlan(trim) {
                    const plan = this.plans.find(p => p.trim === trim);
                    await firebase.firestore().collection('artifacts').doc(this.appId).collection('public').doc('data').collection('plans').doc(`trim-${trim}`).set(plan);
                    this.showNotification(`Vita T${trim}`);
                },

                downloadFile(data, name) {
                    const link = document.createElement('a');
                    link.href = data; link.download = name || 'file'; link.click();
                },

                showNotification(text) {
                    const n = document.createElement('div');
                    n.className = "fixed bottom-4 right-4 bg-stone-900 text-white px-6 py-3 rounded-xl shadow-2xl z-[500]";
                    n.innerText = text; document.body.appendChild(n);
                    setTimeout(() => n.remove(), 3000);
                },

                get filteredArchives() {
                    return this.archiveFilter === 'all' ? this.archives : this.archives.filter(a => a.category === this.archiveFilter);
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        [x-cloak] { display: none !important; }
        .tab-content { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ai-pulse { animation: ai-glow 2s infinite; }
        @keyframes ai-glow { 0%, 100% { box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(245, 158, 11, 0); } }
    </style>
</head>
<body class="bg-[#fdfcfb] text-stone-900 font-sans" x-data="scoutApp()" x-init="initFirebase()" x-cloak>

    <!-- Loader AI -->
    <div x-show="isGeneratingAI" class="fixed inset-0 bg-white/80 backdrop-blur-md z-[600] flex flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-amber-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-black text-xs uppercase tracking-widest">Mandinika ny ✨ AI...</p>
    </div>

    <div class="min-h-screen flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Sidebar -->
        <aside :class="isMenuOpen ? 'translate-x-0' : '-translate-x-full'" 
               class="fixed inset-y-0 left-0 bg-[#1e130f] text-white w-64 transform transition-transform duration-300 ease-in-out z-50 lg:relative lg:translate-x-0 shadow-2xl">
            <div class="p-6 h-full flex flex-col">
                <div class="flex items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center font-black">V</div>
                    <div>
                        <h2 class="font-black text-sm tracking-tighter">VALIZY</h2>
                        <p class="text-[8px] text-amber-500 font-bold uppercase tracking-widest">Scoutisme</p>
                    </div>
                </div>
                <nav class="space-y-1 flex-1 overflow-y-auto">
                    <template x-for="item in menuItems" :key="item.id">
                        <button @click="activeTab = item.id; isMenuOpen = false; if(item.id === 'chat') scrollChat();" 
                                :class="activeTab === item.id ? 'bg-amber-600 text-white' : 'hover:bg-white/5 text-stone-400'"
                                class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl transition-all font-bold uppercase text-[10px] tracking-wider text-left">
                            <i :data-lucide="item.icon" class="w-4 h-4"></i>
                            <span x-text="item.label"></span>
                        </button>
                    </template>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 h-screen overflow-y-auto p-6 lg:p-10 w-full max-w-6xl mx-auto">
            
            <header class="lg:hidden mb-6 flex justify-between items-center">
                <span class="font-black text-[10px] uppercase tracking-widest text-stone-400" x-text="settings.groupName"></span>
                <button @click="isMenuOpen = true" class="p-2 bg-white rounded-lg shadow-sm border border-stone-200">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
            </header>

            <div class="tab-content">
                
                <!-- ACCUEIL, PROGRAMME, ZATOVO, FANABEAZANA, TETIANDRO, TAHIRY, SETTINGS -->
                <!-- [Structure existante maintenue intégralement] -->

                <div x-show="activeTab === 'accueil'">
                    <div class="flex flex-col items-center lg:items-start lg:flex-row gap-8 py-8">
                        <div class="w-48 h-48 bg-stone-900 rounded-[2.5rem] border-8 border-white shadow-2xl flex items-center justify-center overflow-hidden rotate-2">
                             <template x-if="settings.logo"><img :src="settings.logo" class="w-full h-full object-cover"></template>
                             <template x-if="!settings.logo"><i data-lucide="shield" class="w-16 h-16 text-amber-600"></i></template>
                        </div>
                        <div class="flex-1 text-center lg:text-left">
                            <h1 class="text-5xl font-black uppercase tracking-tighter" x-text="settings.groupName"></h1>
                            <p class="text-amber-600 font-bold uppercase tracking-widest text-xs mt-2" x-text="settings.fivondronana"></p>
                            <p class="text-stone-400 italic text-xl mt-6" x-text="'&quot;' + settings.dina + '&quot;'"></p>
                        </div>
                    </div>
                </div>

                <!-- ONGLET CHAT (TAFASIRY) -->
                <div x-show="activeTab === 'chat'" class="h-[calc(100vh-100px)] flex flex-col">
                    <div class="flex justify-between items-end border-b-4 border-stone-900 pb-4 mb-6">
                        <h2 class="text-5xl font-black text-stone-900 uppercase tracking-tighter">Tafasiry</h2>
                        <template x-if="chatUser">
                            <button @click="isChangingPass = !isChangingPass" class="text-[10px] font-black uppercase text-amber-600 border border-amber-600 px-3 py-1 rounded-lg">Hanova Password</button>
                        </template>
                    </div>

                    <!-- LOGIN CHAT -->
                    <div x-show="!chatUser" class="flex-1 flex items-center justify-center">
                        <div class="bg-white p-10 rounded-[2.5rem] shadow-xl border border-stone-100 w-full max-w-md text-center">
                            <i data-lucide="lock" class="w-12 h-12 text-amber-600 mx-auto mb-4"></i>
                            <h3 class="font-black uppercase mb-6">Fidirana amin'ny Tafasiry</h3>
                            <div class="space-y-4">
                                <input type="text" x-model="chatLogin.pseudo" placeholder="Pseudonyme" class="w-full p-4 bg-stone-50 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500">
                                <input type="password" x-model="chatLogin.password" placeholder="Mot de passe (1234)" class="w-full p-4 bg-stone-50 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500">
                                <button @click="enterChat()" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest">Hiditra</button>
                            </div>
                        </div>
                    </div>

                    <!-- INTERFACE CHAT -->
                    <div x-show="chatUser" class="flex-1 flex flex-col bg-white rounded-[2.5rem] shadow-sm border border-stone-100 overflow-hidden">
                        <!-- Header Chat -->
                        <div class="bg-stone-50 p-4 border-b border-stone-100 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 bg-green-500 rounded-full"></div>
                                <span class="font-black text-xs uppercase" x-text="chatUser?.pseudo"></span>
                            </div>
                            <button @click="chatUser = null" class="text-stone-400 hover:text-red-500 text-[10px] font-bold uppercase">Hivoaka</button>
                        </div>

                        <!-- Change Pass Modal (Inline) -->
                        <div x-show="isChangingPass" class="p-4 bg-amber-50 border-b border-amber-100 flex gap-2">
                            <input type="text" x-model="newPassValue" placeholder="Password vaovao" class="flex-1 p-2 rounded-lg border border-amber-200 outline-none text-sm">
                            <button @click="changeChatPassword()" class="bg-amber-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold">OK</button>
                        </div>

                        <!-- Messages -->
                        <div id="chat-container" class="flex-1 overflow-y-auto p-6 space-y-4">
                            <template x-for="msg in chatMessages" :key="msg.id">
                                <div :class="msg.sender === chatUser.pseudo ? 'items-end' : 'items-start'" class="flex flex-col">
                                    <div class="flex items-center gap-2 mb-1">
                                        <span class="text-[9px] font-black uppercase text-stone-400" x-text="msg.sender"></span>
                                        <span class="text-[8px] text-stone-300" x-text="new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})"></span>
                                    </div>
                                    <div :class="msg.sender === chatUser.pseudo ? 'bg-amber-600 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-stone-100 text-stone-800 rounded-r-2xl rounded-tl-2xl'" 
                                         class="px-4 py-3 max-w-[80%] text-sm font-medium shadow-sm" x-text="msg.text"></div>
                                </div>
                            </template>
                        </div>

                        <!-- Input -->
                        <div class="p-4 bg-white border-t border-stone-100">
                            <div class="flex gap-2">
                                <input type="text" x-model="newMessage" @keyup.enter="sendMessage()" placeholder="Hanatra hafatra..." 
                                       class="flex-1 p-4 bg-stone-50 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500">
                                <button @click="sendMessage()" class="bg-stone-900 text-white p-4 rounded-2xl shadow-lg">
                                    <i data-lucide="send" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- AUTRES ONGLETS (Contenu identique au précédent) -->
                <div x-show="activeTab === 'programme'">
                    <div class="flex justify-between items-end border-b-4 border-stone-900 pb-4 mb-6">
                        <h2 class="text-5xl font-black text-stone-900 uppercase tracking-tighter">Programme</h2>
                        <button @click="showAddModal = !showAddModal" class="bg-stone-900 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase">Hampiditra</button>
                    </div>
                    <div x-show="showAddModal" class="bg-amber-50 p-6 rounded-3xl mb-8 space-y-4">
                        <input type="text" x-model="forms.event.title" placeholder="Lohateny" class="w-full p-4 rounded-xl border border-stone-200 outline-none">
                        <button @click="saveItem('events', 'event')" class="w-full bg-stone-900 text-white py-4 rounded-xl font-bold">TEHIRIZINA</button>
                    </div>
                    <div class="grid gap-4">
                        <template x-for="event in events" :key="event.id">
                            <div class="bg-white p-5 rounded-2xl shadow-sm border border-stone-100 flex justify-between items-center">
                                <h4 class="font-black uppercase" x-text="event.title"></h4>
                                <button @click="deleteItem('events', event.id)" class="text-stone-200 hover:text-red-500"><i data-lucide="trash-2"></i></button>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="activeTab === 'fanabeazana'">
                     <div class="flex justify-between items-end border-b-4 border-stone-900 pb-4 mb-6">
                        <h2 class="text-5xl font-black text-stone-900 uppercase tracking-tighter">Fanabeazana</h2>
                        <button @click="showAddModal = !showAddModal" class="bg-amber-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase">Fiche vaovao</button>
                    </div>
                    <div x-show="showAddModal" class="bg-stone-900 text-white p-8 rounded-3xl mb-8 space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-black uppercase text-amber-500">Famoronana Fiche</span>
                            <button @click="generateFicheWithAI()" class="bg-amber-600 px-4 py-2 rounded-xl text-[10px] font-black uppercase ai-pulse">✨ AI Generate</button>
                        </div>
                        <input type="text" x-model="forms.fiche.title" placeholder="Lohateny" class="w-full p-4 bg-white/10 rounded-xl outline-none">
                        <textarea x-model="forms.fiche.content" placeholder="Andinindininy" class="w-full p-4 bg-white/10 rounded-xl outline-none"></textarea>
                        <button @click="saveItem('fiches', 'fiche')" class="w-full bg-amber-600 text-white py-4 rounded-xl font-bold">TEHIRIZINA</button>
                    </div>
                    <div class="grid md:grid-cols-2 gap-6">
                        <template x-for="f in fiches" :key="f.id">
                            <div class="bg-white p-6 rounded-3xl border border-stone-100 shadow-sm">
