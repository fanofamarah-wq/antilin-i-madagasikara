<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIZY - Gestion Scoutisme</title>
    
    <!-- Bibliothèques directes -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <script>
        function scoutApp() {
            return {
                tab: 'home',
                showForm: false,
                currentFiche: null,
                currentUser: {
                    pseudo: localStorage.getItem('valizy_pseudo') || 'Skoto_' + Math.floor(Math.random() * 1000)
                },
                
                // Paramètres modifiables
                settings: JSON.parse(localStorage.getItem('valizy_settings')) || {
                    groupName: "Antilin'i Madagasikara",
                    fivondronana: "Fivondronana faha-17",
                    sampana: "Mpamakilay",
                    dina: "Tsy misaraka mandrakizay",
                    aboutText: "Mpanabe ny tanora mba ho vanona sy mahay mandray andraikitra.",
                    logo: null // Sary personnalisé ho an'ny tongasoa
                },

                menu: [
                    { id: 'home', label: 'Tongasoa', icon: '🏠' },
                    { id: 'calendar', label: 'Programme', icon: '📅' },
                    { id: 'members', label: 'Zatovo', icon: '👥' },
                    { id: 'edu', label: 'Fiches', icon: '📚' },
                    { id: 'chat', label: 'Tapatapa-pira', icon: '💬' },
                    { id: 'settings', label: 'Paramètre', icon: '⚙️' }
                ],

                news: JSON.parse(localStorage.getItem('valizy_news')) || [
                    { title: "Lasy 2024", desc: "Fanomanana ny lasy lehibe.", date: "15 Mey", id: 1 }
                ],

                events: JSON.parse(localStorage.getItem('valizy_events')) || [
                    { id: 1, title: "Fivoriana voalohany", date: "2024-05-10" }
                ],

                scouts: JSON.parse(localStorage.getItem('valizy_scouts')) || [],

                fiches: JSON.parse(localStorage.getItem('valizy_fiches')) || [],

                messages: JSON.parse(localStorage.getItem('valizy_chat')) || [],

                // Forms
                formEvent: { title: '', date: '' },
                formScout: { name: '', firstname: '', address: '', phone: '', facebook: '', image: null },
                formFiche: { title: '', category: '', participants: '', objective: '', content: '', remark: '' },
                formNews: { title: '', desc: '', date: '' },
                chatInput: '',

                init() {
                    this.$watch('settings', (val) => localStorage.setItem('valizy_settings', JSON.stringify(val)));
                    this.$watch('news', (val) => localStorage.setItem('valizy_news', JSON.stringify(val)));
                    this.$watch('events', (val) => localStorage.setItem('valizy_events', JSON.stringify(val)));
                    this.$watch('scouts', (val) => localStorage.setItem('valizy_scouts', JSON.stringify(val)));
                    this.$watch('fiches', (val) => localStorage.setItem('valizy_fiches', JSON.stringify(val)));
                    this.$watch('messages', (val) => localStorage.setItem('valizy_chat', JSON.stringify(val)));
                },

                // Handlers
                updatePseudo() {
                    localStorage.setItem('valizy_pseudo', this.currentUser.pseudo);
                },

                handleImage(e, target) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        if(target === 'scout') this.formScout.image = f.target.result;
                        if(target === 'logo') this.settings.logo = f.target.result;
                    };
                    reader.readAsDataURL(file);
                },

                sendMessage() {
                    if(!this.chatInput.trim()) return;
                    this.messages.push({
                        id: Date.now(),
                        user: this.currentUser.pseudo,
                        text: this.chatInput,
                        time: new Date().toLocaleTimeString('mg-MG', {hour: '2-digit', minute:'2-digit'})
                    });
                    this.chatInput = '';
                    // Scroll to bottom
                    setTimeout(() => {
                        const el = document.getElementById('chat-box');
                        el.scrollTop = el.scrollHeight;
                    }, 100);
                },

                addNews() {
                    if(!this.formNews.title) return;
                    this.news.unshift({ ...this.formNews, id: Date.now() });
                    this.formNews = { title: '', desc: '', date: '' };
                },

                addEvent() {
                    if(!this.formEvent.title) return;
                    this.events.unshift({ ...this.formEvent, id: Date.now() });
                    this.formEvent = { title: '', date: '' };
                    this.showForm = false;
                },

                addScout() {
                    if(!this.formScout.name) return;
                    this.scouts.unshift({ ...this.formScout, id: Date.now() });
                    this.formScout = { name: '', firstname: '', address: '', phone: '', facebook: '', image: null };
                    this.showForm = false;
                },

                addFiche() {
                    if(!this.formFiche.title) return;
                    this.fiches.unshift({ ...this.formFiche, id: Date.now() });
                    this.formFiche = { title: '', category: '', participants: '', objective: '', content: '', remark: '' };
                    this.showForm = false;
                },

                printFiche(f) {
                    this.currentFiche = f;
                    setTimeout(() => { window.print(); }, 200);
                }
            }
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        [x-cloak] { display: none !important; }
        .card-scout { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-scout:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }

        @media print {
            .no-print { display: none !important; }
            #print-section { display: block !important; }
        }
    </style>
</head>
<body x-data="scoutApp()" x-cloak class="text-stone-900">

    <div class="flex h-screen overflow-hidden no-print">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-[#2d1b15] text-white flex-shrink-0 hidden lg:flex flex-col border-r border-white/5">
            <div class="p-6 h-full flex flex-col">
                <div class="flex items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg rotate-3 text-lg">V</div>
                    <div>
                        <h2 class="font-black text-lg leading-none tracking-tighter">VALIZY</h2>
                        <p class="text-[9px] text-amber-500 font-bold uppercase tracking-widest" x-text="settings.groupName"></p>
                    </div>
                </div>

                <nav class="space-y-1 flex-1">
                    <template x-for="item in menu">
                        <button @click="tab = item.id; showForm = false" 
                            :class="tab === item.id ? 'bg-amber-600 text-white shadow-lg' : 'text-stone-400 hover:bg-white/5'"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                            <span x-text="item.icon"></span>
                            <span x-text="item.label"></span>
                        </button>
                    </template>
                </nav>

                <!-- Pseudo Display -->
                <div class="mt-auto p-4 bg-white/5 rounded-2xl border border-white/10">
                    <p class="text-[8px] uppercase font-black text-amber-500 mb-1">Mombamomba anao</p>
                    <p class="text-xs font-bold truncate" x-text="currentUser.pseudo"></p>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="flex-1 overflow-y-auto bg-stone-50">
            
            <div class="max-w-4xl mx-auto p-6 lg:p-12">

                <!-- ACCUEIL (TONGASOA) -->
                <div x-show="tab === 'home'" class="space-y-10">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-stone-200 shadow-sm flex flex-col md:flex-row items-center gap-8">
                        <div class="w-48 h-48 bg-stone-900 rounded-[2.5rem] flex items-center justify-center text-amber-500 shadow-xl rotate-3 shrink-0 overflow-hidden border-4 border-white">
                            <template x-if="settings.logo">
                                <img :src="settings.logo" class="w-full h-full object-cover">
                            </template>
                            <template x-if="!settings.logo">
                                <span class="text-7xl font-black">V</span>
                            </template>
                        </div>
                        <div class="text-center md:text-left">
                            <h1 class="text-4xl lg:text-6xl font-black text-stone-900 uppercase tracking-tighter leading-none mb-4" x-text="settings.groupName"></h1>
                            <div class="inline-flex bg-amber-100 text-amber-900 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-4" x-text="settings.fivondronana"></div>
                            <p class="text-stone-400 font-bold uppercase tracking-widest text-[9px] block" x-text="settings.sampana + ' • ' + settings.dina"></p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <!-- News Section -->
                        <div class="bg-white p-8 rounded-[2.5rem] border border-stone-200">
                            <h3 class="font-black text-[9px] uppercase tracking-[0.2em] text-stone-400 mb-6">Vaovao sy ny ho avy</h3>
                            <div class="space-y-6">
                                <template x-for="n in news">
                                    <div class="border-b border-stone-50 pb-4 last:border-none">
                                        <p class="text-[9px] font-black text-amber-600 mb-1" x-text="n.date"></p>
                                        <h4 class="font-black text-stone-800 text-lg leading-tight" x-text="n.title"></h4>
                                        <p class="text-xs text-stone-500 mt-2 font-medium" x-text="n.desc"></p>
                                    </div>
                                </template>
                            </div>
                        </div>

                        <!-- Info Section -->
                        <div class="bg-stone-900 p-8 rounded-[2.5rem] text-white flex flex-col justify-between">
                            <div>
                                <h3 class="font-black text-[9px] uppercase tracking-[0.2em] text-amber-500 mb-6">Tanjona</h3>
                                <p class="text-2xl font-medium leading-relaxed italic text-stone-300" x-text="settings.aboutText"></p>
                            </div>
                            <div class="mt-12 pt-6 border-t border-white/10">
                                <p class="text-[10px] font-black uppercase tracking-widest text-amber-500">Filamatra</p>
                                <p class="text-sm font-bold italic" x-text="'« ' + settings.dina + ' »'"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PROGRAMME -->
                <div x-show="tab === 'calendar'" class="space-y-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Programme</h2>
                        <button @click="showForm = !showForm" class="bg-stone-900 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest" x-text="showForm ? '✕' : '+ Programa'"></button>
                    </div>

                    <div x-show="showForm" class="bg-white p-6 rounded-2xl border border-stone-200 mb-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" x-model="formEvent.title" placeholder="Inona ny atao?" class="w-full p-3 rounded-xl ring-1 ring-stone-200 outline-none font-bold text-sm">
                            <input type="date" x-model="formEvent.date" class="w-full p-3 rounded-xl ring-1 ring-stone-200 outline-none font-bold text-sm">
                        </div>
                        <button @click="addEvent()" class="mt-4 w-full bg-amber-700 text-white py-3 rounded-xl font-black uppercase text-[10px]">Tehirizina</button>
                    </div>

                    <div class="space-y-3">
                        <template x-for="e in events">
                            <div class="bg-white p-4 rounded-2xl border border-stone-200 flex items-center justify-between card-scout">
                                <div class="flex items-center gap-4">
                                    <div class="w-14 h-14 bg-stone-100 rounded-xl flex flex-col items-center justify-center font-black">
                                        <span class="text-[8px] text-amber-600 uppercase" x-text="new Date(e.date).toLocaleString('mg', {month:'short'})"></span>
                                        <span class="text-xl text-stone-800" x-text="new Date(e.date).getDate() || '??'"></span>
                                    </div>
                                    <h4 class="font-black text-lg text-stone-800" x-text="e.title"></h4>
                                </div>
                                <button @click="events = events.filter(i => i.id !== e.id)" class="text-stone-300 hover:text-red-500 px-4">✕</button>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- CHAT (TAPATAPA-PIRA) -->
                <div x-show="tab === 'chat'" class="h-[calc(100vh-12rem)] flex flex-col">
                    <div class="mb-6 flex justify-between items-center">
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Tapatapa-pira</h2>
                        <div class="flex items-center gap-3">
                            <input type="text" x-model="currentUser.pseudo" @blur="updatePseudo" class="bg-white border px-3 py-1.5 rounded-lg text-xs font-bold w-32 focus:ring-2 focus:ring-amber-500 outline-none" title="Hanova pseudo">
                            <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                        </div>
                    </div>

                    <div class="flex-1 bg-white rounded-[2rem] border border-stone-200 flex flex-col overflow-hidden shadow-sm">
                        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
                            <template x-for="m in messages">
                                <div :class="m.user === currentUser.pseudo ? 'items-end' : 'items-start'" class="flex flex-col">
                                    <div class="flex items-baseline gap-2 mb-1">
                                        <span class="text-[9px] font-black uppercase text-stone-400" x-text="m.user"></span>
                                        <span class="text-[8px] text-stone-300" x-text="m.time"></span>
                                    </div>
                                    <div :class="m.user === currentUser.pseudo ? 'bg-amber-600 text-white rounded-tr-none' : 'bg-stone-100 text-stone-800 rounded-tl-none'" 
                                         class="px-4 py-2 rounded-2xl max-w-[80%] text-sm font-medium shadow-sm" x-text="m.text">
                                    </div>
                                </div>
                            </template>
                            <template x-if="messages.length === 0">
                                <div class="h-full flex flex-col items-center justify-center text-stone-300 space-y-2">
                                    <span class="text-4xl">💬</span>
                                    <p class="text-xs font-bold uppercase tracking-widest">Atombohy ny resaka...</p>
                                </div>
                            </template>
                        </div>
                        <div class="p-4 bg-stone-50 border-t flex gap-2">
                            <input type="text" x-model="chatInput" @keyup.enter="sendMessage" placeholder="Soraty eto ny hafatra..." class="flex-1 bg-white p-3 rounded-xl ring-1 ring-stone-200 outline-none focus:ring-2 focus:ring-amber-600 font-medium text-sm">
                            <button @click="sendMessage" class="bg-amber-600 text-white px-6 rounded-xl font-black uppercase text-[10px] tracking-widest">Handefa</button>
                        </div>
                    </div>
                </div>

                <!-- PARAMETRES -->
                <div x-show="tab === 'settings'" class="space-y-8">
                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-8">Paramètres</h2>
                    
                    <!-- Config Logo/Tongasoa -->
                    <div class="bg-white p-8 rounded-[2rem] border border-stone-200">
                        <h3 class="font-black text-xs uppercase tracking-widest text-amber-600 mb-6">Sary sy Logo Tongasoa</h3>
                        <div class="flex items-center gap-6">
                            <div class="w-32 h-32 bg-stone-100 rounded-3xl overflow-hidden border-2 border-stone-50 shrink-0">
                                <template x-if="settings.logo">
                                    <img :src="settings.logo" class="w-full h-full object-cover">
                                </template>
                            </div>
                            <div class="flex-1">
                                <p class="text-xs text-stone-500 mb-4 font-medium">Ity sary ity no hiseho eo amin'ny pejy fandraisana (Tongasoa).</p>
                                <input type="file" @change="handleImage($event, 'logo')" class="text-xs file:bg-stone-900 file:text-white file:border-none file:px-4 file:py-2 file:rounded-xl cursor-pointer">
                            </div>
                        </div>
                    </div>

                    <!-- Config News -->
                    <div class="bg-white p-8 rounded-[2rem] border border-stone-200">
                        <h3 class="font-black text-xs uppercase tracking-widest text-amber-600 mb-6">Hampiditra Vaovao</h3>
                        <div class="grid grid-cols-1 gap-4 mb-6">
                            <input type="text" x-model="formNews.title" placeholder="Lohahevitra vaovao" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold">
                            <input type="text" x-model="formNews.date" placeholder="Daty (Ohatra: 20 Mey)" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold">
                            <textarea x-model="formNews.desc" placeholder="Mombamomba ny vaovao..." rows="3" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold"></textarea>
                        </div>
                        <button @click="addNews()" class="bg-stone-900 text-white px-8 py-3 rounded-xl font-black uppercase text-[10px] tracking-widest">Hampiditra ny vaovao</button>
                    </div>

                    <!-- Config Group -->
                    <div class="bg-white p-8 rounded-[2rem] border border-stone-200">
                        <h3 class="font-black text-xs uppercase tracking-widest text-amber-600 mb-6">Mombamomba ny vondrona</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="text-[9px] font-black text-stone-400 uppercase ml-2">Anaran'ny Vondrona</label>
                                <input type="text" x-model="settings.groupName" class="w-full p-3 rounded-xl ring-1 ring-stone-100 outline-none font-bold text-sm">
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-stone-400 uppercase ml-2">Fivondronana</label>
                                <input type="text" x-model="settings.fivondronana" class="w-full p-3 rounded-xl ring-1 ring-stone-100 outline-none font-bold text-sm">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Les autres onglets existants (Members, Edu) restent inchangés mais utilisent maintenant les fonctions mises à jour -->
                <div x-show="tab === 'members'" class="space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Zatovo</h2>
                        <button @click="showForm = !showForm" class="bg-stone-900 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest" x-text="showForm ? '✕' : '+ Mpikambana Vaovao'"></button>
                    </div>

                    <div x-show="showForm" class="bg-white p-6 rounded-2xl border border-stone-200 mb-6 shadow-xl">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div class="md:col-span-2">
                                <label class="text-[10px] font-bold uppercase text-stone-400 block mb-2">Sarin'ilay zatovo</label>
                                <input type="file" @change="handleImage($event, 'scout')" class="text-xs file:bg-stone-100 file:border-none file:rounded-lg file:px-4 file:py-2">
                                <template x-if="formScout.image">
                                    <img :src="formScout.image" class="w-20 h-20 object-cover rounded-xl mt-2 border">
                                </template>
                            </div>
                            <input type="text" x-model="formScout.name" placeholder="Anarana" class="w-full p-3 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold text-sm">
                            <input type="text" x-model="formScout.firstname" placeholder="Fanampiny" class="w-full p-3 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold text-sm">
                            <input type="text" x-model="formScout.address" placeholder="Adiresy" class="w-full p-3 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold text-sm">
                            <input type="text" x-model="formScout.phone" placeholder="Telefaonina" class="w-full p-3 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold text-sm">
                            <div class="md:col-span-2">
                                <input type="text" x-model="formScout.facebook" placeholder="Lien Facebook na Anarana Facebook" class="w-full p-3 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold text-sm">
                            </div>
                        </div>
                        <button @click="addScout()" class="w-full bg-amber-600 text-white py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-amber-200">Tehirizina ny mpikambana</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <template x-for="s in scouts">
                            <div class="bg-white p-6 rounded-[2rem] border border-stone-200 flex gap-4 card-scout relative group">
                                <div class="w-24 h-24 bg-stone-100 rounded-2xl flex-shrink-0 overflow-hidden border">
                                    <template x-if="s.image">
                                        <img :src="s.image" class="w-full h-full object-cover">
                                    </template>
                                    <template x-if="!s.image">
                                        <div class="w-full h-full flex items-center justify-center text-stone-300 font-black text-3xl" x-text="s.name[0]"></div>
                                    </template>
                                </div>
                                <div class="flex-1">
                                    <h4 class="font-black text-stone-900 uppercase text-lg leading-tight" x-text="s.name + ' ' + s.firstname"></h4>
                                    <p class="text-[10px] font-bold text-amber-600 mb-2" x-text="s.phone"></p>
                                    <div class="text-[11px] text-stone-500 space-y-1">
                                        <p>📍 <span x-text="s.address"></span></p>
                                        <p>👤 <span x-text="s.facebook"></span></p>
                                    </div>
                                </div>
                                <button @click="scouts = scouts.filter(i => i.id !== s.id)" class="absolute top-4 right-4 text-stone-200 hover:text-red-500">✕</button>
                            </div>
                        </template>
                    </div>
                </div>

                <div x-show="tab === 'edu'" class="space-y-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Fiches Techniques</h2>
                        <button @click="showForm = !showForm" class="bg-stone-900 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest" x-text="showForm ? '✕' : '+ Fiche Vaovao'"></button>
                    </div>

                    <div x-show="showForm" class="bg-white p-8 rounded-[2rem] border border-stone-200 mb-10 shadow-xl">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                            <div class="md:col-span-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 mb-2 block">Lohahevitra</label>
                                <input type="text" x-model="formFiche.title" placeholder="Ohatra: Ny afo skoto" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-stone-400 mb-2 block">Sokajy</label>
                                <input type="text" x-model="formFiche.category" placeholder="Teknika, Lasy, sns" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold">
                            </div>
                            <div>
                                <label class="text-[10px] font-black uppercase text-stone-400 mb-2 block">Mpandray Anjara</label>
                                <input type="text" x-model="formFiche.participants" placeholder="Sokajin-taona na Sampana" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold">
                            </div>
                            <div class="md:col-span-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 mb-2 block">Vokatra ho tratrarina</label>
                                <input type="text" x-model="formFiche.objective" placeholder="Inona no tokony ho hainy?" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold">
                            </div>
                            <div class="md:col-span-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 mb-2 block">Fizotrany</label>
                                <textarea x-model="formFiche.content" rows="4" placeholder="Dingana arahina..." class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold"></textarea>
                            </div>
                            <div class="md:col-span-2">
                                <label class="text-[10px] font-black uppercase text-stone-400 mb-2 block">Remarque</label>
                                <input type="text" x-model="formFiche.remark" placeholder="Fanamarihana fanampiny..." class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none focus:ring-2 focus:ring-amber-600 font-bold">
                            </div>
                        </div>
                        <button @click="addFiche()" class="w-full bg-stone-900 text-white py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Tehirizina ny Fiche</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <template x-for="f in fiches">
                            <div class="bg-white p-8 rounded-[2rem] border border-stone-200 card-scout group relative">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[9px] font-black bg-amber-100 text-amber-700 px-3 py-1 rounded-full uppercase tracking-widest" x-text="f.category"></span>
                                    <div class="flex gap-2">
                                        <button @click="printFiche(f)" class="text-stone-400 hover:text-stone-900">🖨️</button>
                                        <button @click="fiches = fiches.filter(i => i.id !== f.id)" class="text-stone-200 hover:text-red-500">✕</button>
                                    </div>
                                </div>
                                <h4 class="text-2xl font-black text-stone-900 mb-2 leading-tight" x-text="f.title"></h4>
                                <p class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-4" x-text="'Anjara: ' + f.participants"></p>
                                <div class="space-y-4">
                                    <div class="bg-stone-50 p-4 rounded-xl border border-stone-100">
                                        <p class="text-[10px] font-black text-stone-400 uppercase mb-1">Vokatra:</p>
                                        <p class="text-xs font-bold text-stone-700" x-text="f.objective"></p>
                                    </div>
                                    <p class="text-stone-500 text-sm line-clamp-2 italic" x-text="f.content"></p>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- ZONE D'IMPRESSION -->
    <div id="print-section" class="hidden p-16 bg-white" x-show="currentFiche">
        <template x-if="currentFiche">
            <div class="max-w-3xl mx-auto">
                <div class="border-b-4 border-stone-900 pb-6 mb-8 flex justify-between items-end">
                    <div>
                        <h1 class="text-xl font-black uppercase" x-text="settings.groupName"></h1>
                        <p class="text-sm font-bold text-stone-500" x-text="settings.fivondronana"></p>
                    </div>
                </div>
                <h2 class="text-4xl font-black text-stone-900 mb-8" x-text="currentFiche.title"></h2>
                <div class="grid grid-cols-2 gap-8 mb-10">
                    <div class="border-l-4 border-amber-500 pl-4">
                        <p class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">Mpandray Anjara</p>
                        <p class="font-bold" x-text="currentFiche.participants"></p>
                    </div>
                    <div class="border-l-4 border-amber-500 pl-4">
                        <p class="text-[10px] font-black text-stone-400 uppercase tracking-widest mb-1">Vokatra ho tratrarina</p>
                        <p class="font-bold" x-text="currentFiche.objective"></p>
                    </div>
                </div>
                <div class="mb-10">
                    <h3 class="text-lg font-black uppercase mb-4 border-b pb-2">Fizotrany</h3>
                    <div class="text-base leading-relaxed whitespace-pre-wrap font-medium" x-text="currentFiche.content"></div>
                </div>
                <div class="p-6 bg-stone-50 rounded-2xl border border-stone-100">
                    <h3 class="text-[10px] font-black uppercase mb-2 text-stone-400">Remarque</h3>
                    <p class="text-sm italic font-bold text-stone-600" x-text="currentFiche.remark"></p>
                </div>
            </div>
        </template>
    </div>

</body>
</html>
