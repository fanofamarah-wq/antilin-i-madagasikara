<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Scoutisme - Antilin'i Madagasikara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f7f4; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .menu-bg { background-color: #2d1b15; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        // Export global pour Babel
        window.firebaseData = { auth, db, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, serverTimestamp };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { auth, db, appId, signInAnonymously, onAuthStateChanged, signInWithCustomToken, collection, doc, setDoc, addDoc, onSnapshot, query, deleteDoc, serverTimestamp } = window.firebaseData;

        // --- Kisary (Icons) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>,
                book: <><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></>,
                users: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></>,
                music: <><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></>,
                message: <><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>,
                menu: <><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>,
                x: <><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></>,
                plus: <><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></>,
                mapPin: <><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></>,
                info: <><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12" y1="8" y2="8.01"/></>,
                phone: <><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></>,
                facebook: <><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></>
            };

            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        // --- Singa UI ---
        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-stone-900/60 backdrop-blur-sm animate-fade-in">
                    <div className="bg-white rounded-[2rem] w-full max-w-xl max-h-[90vh] shadow-2xl overflow-hidden flex flex-col">
                        <div className="p-6 border-b flex justify-between items-center bg-stone-50">
                            <h3 className="font-extrabold text-stone-800 uppercase tracking-tight">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-stone-200 rounded-full transition-colors"><Icon name="x" size={20}/></button>
                        </div>
                        <div className="p-8 overflow-y-auto custom-scrollbar">{children}</div>
                    </div>
                </div>
            );
        };

        const InputField = ({ label, name, type = "text", placeholder, onChange, required = true, value }) => (
            <div className="space-y-1.5">
                <label className="text-[11px] font-black uppercase text-stone-400 ml-1">{label}</label>
                <input 
                    name={name} 
                    type={type} 
                    value={value}
                    required={required} 
                    placeholder={placeholder} 
                    onChange={onChange} 
                    className="w-full p-3.5 bg-stone-50 border border-stone-100 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all font-medium text-sm" 
                />
            </div>
        );

        const SelectField = ({ label, name, options, onChange, value }) => (
            <div className="space-y-1.5">
                <label className="text-[11px] font-black uppercase text-stone-400 ml-1">{label}</label>
                <select 
                    name={name} 
                    value={value}
                    onChange={onChange} 
                    className="w-full p-3.5 bg-stone-50 border border-stone-100 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all font-medium text-sm appearance-none"
                >
                    {options.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                </select>
            </div>
        );

        const TextAreaField = ({ label, name, placeholder, onChange, rows = 3, value }) => (
            <div className="space-y-1.5">
                <label className="text-[11px] font-black uppercase text-stone-400 ml-1">{label}</label>
                <textarea 
                    name={name} 
                    rows={rows} 
                    value={value}
                    placeholder={placeholder} 
                    onChange={onChange} 
                    className="w-full p-3.5 bg-stone-50 border border-stone-100 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500/20 focus:border-amber-500 transition-all font-medium text-sm"
                ></textarea>
            </div>
        );

        // --- APP ---
        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('accueil');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // Data storage
            const [scouts, setScouts] = useState([]);
            const [events, setEvents] = useState([]);
            const [fiches, setFiches] = useState([]);
            const [songs, setSongs] = useState([]);
            const [formData, setFormData] = useState({});

            // 1. Initialisation Auth
            useEffect(() => {
                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // 2. Data Fetching (Listeners)
            useEffect(() => {
                if (!user) return;

                const collections = ['scouts', 'events', 'fiches', 'songs'];
                const unsubscribers = collections.map(colName => {
                    const q = query(collection(db, 'artifacts', appId, 'public', 'data', colName));
                    return onSnapshot(q, (snapshot) => {
                        const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                        if (colName === 'scouts') setScouts(data);
                        if (colName === 'events') setEvents(data);
                        if (colName === 'fiches') setFiches(data);
                        if (colName === 'songs') setSongs(data);
                    }, (err) => console.error(`Error fetching ${colName}:`, err));
                });

                return () => unsubscribers.forEach(unsub => unsub());
            }, [user]);

            const handleInputChange = (e) => {
                setFormData({ ...formData, [e.target.name]: e.target.value });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user) return;

                const colName = activeTab === 'lisitry' ? 'scouts' : 
                                activeTab === 'programme' ? 'events' : 
                                activeTab === 'fanabeazana' ? 'fiches' : 
                                activeTab === 'hira' ? 'songs' : '';

                if (!colName) return;

                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', colName), {
                        ...formData,
                        createdAt: serverTimestamp()
                    });
                    setFormData({});
                    setIsModalOpen(false);
                } catch (err) {
                    console.error("Error adding document:", err);
                }
            };

            const deleteItem = async (colName, id) => {
                if (!user) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', colName, id));
                } catch (err) {
                    console.error("Error deleting:", err);
                }
            };

            const renderContent = () => {
                switch(activeTab) {
                    case 'accueil': return (
                        <div className="flex flex-col items-center justify-center py-24 text-center animate-slide-up">
                            <div className="w-56 h-56 bg-white rounded-[3rem] shadow-2xl border-[12px] border-amber-50 flex items-center justify-center mb-10 rotate-3">
                                <Icon name="users" size={80} className="text-amber-600 -rotate-3" />
                            </div>
                            <h2 className="text-5xl font-[900] text-stone-900 mb-6 uppercase tracking-tighter leading-none">Antilin'i<br/><span className="text-amber-600">Madagasikara</span></h2>
                            <div className="px-6 py-2 bg-amber-100 text-amber-800 rounded-full text-xs font-black uppercase tracking-[0.2em]">Fivondronana faha-17</div>
                        </div>
                    );
                    case 'programme': return (
                        <div className="space-y-6 animate-slide-up pb-20">
                            <h2 className="text-3xl font-black text-stone-900 uppercase">Programme</h2>
                            {events.length === 0 ? <p className="text-stone-400 italic">Tsy misy fandaharam-potoana voarakitra.</p> : 
                                events.map(e => (
                                    <div key={e.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-stone-100 space-y-4 relative group">
                                        <button onClick={() => deleteItem('events', e.id)} className="absolute top-4 right-4 text-stone-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="x" size={16}/></button>
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <span className="text-[10px] font-black bg-amber-100 text-amber-700 px-3 py-1 rounded-full uppercase mb-2 inline-block">{e.level || 'Sampana'}</span>
                                                <h3 className="text-xl font-extrabold text-stone-800">{e.title}</h3>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-lg font-black text-amber-600 leading-none">{e.date?.split('-')[2]}</p>
                                                <p className="text-[10px] font-bold text-stone-400 uppercase">{e.date ? new Date(e.date).toLocaleString('mg', {month: 'short'}) : '...'}</p>
                                            </div>
                                        </div>
                                        <div className="flex items-center gap-2 text-xs font-bold text-stone-500">
                                            <Icon name="mapPin" size={14} className="text-amber-500"/> {e.location}
                                        </div>
                                        <div className="pt-4 border-t border-dashed border-stone-100">
                                            <p className="text-sm text-stone-600 leading-relaxed">{e.content}</p>
                                        </div>
                                    </div>
                                ))
                            }
                        </div>
                    );
                    case 'fanabeazana': return (
                        <div className="space-y-6 animate-slide-up pb-20">
                            <h2 className="text-3xl font-black text-stone-900 uppercase">Fanabeazana</h2>
                            <div className="grid grid-cols-1 gap-4">
                                {fiches.length === 0 ? <p className="text-stone-400 italic">Tsy misy fampianarana voarakitra.</p> :
                                    fiches.map(f => (
                                        <div key={f.id} className="bg-white p-6 rounded-[2rem] shadow-sm border border-stone-100 relative group">
                                            <button onClick={() => deleteItem('fiches', f.id)} className="absolute top-4 right-4 text-stone-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="x" size={16}/></button>
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="bg-stone-100 text-stone-600 text-[10px] font-black px-3 py-1 rounded-full uppercase">{f.seha}</span>
                                                <span className="text-stone-400 text-xs font-bold">{f.duration}</span>
                                            </div>
                                            <h3 className="text-xl font-extrabold text-stone-800 mb-3">{f.title}</h3>
                                            <div className="p-4 bg-amber-50 rounded-2xl mb-4">
                                                <p className="text-[10px] font-black text-amber-700 uppercase mb-1">Vokatra ho tratrarina (VHT)</p>
                                                <p className="text-sm text-stone-700 font-medium italic">"{f.vht}"</p>
                                            </div>
                                            <div className="space-y-2">
                                                <p className="text-[10px] font-black text-stone-400 uppercase">Fizotrany</p>
                                                <p className="text-sm text-stone-600 whitespace-pre-wrap leading-relaxed">{f.steps}</p>
                                            </div>
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    );
                    case 'lisitry': return (
                        <div className="space-y-6 animate-slide-up pb-20">
                            <h2 className="text-3xl font-black text-stone-900 uppercase">Lisitry ny Zatovo</h2>
                            <div className="grid grid-cols-1 gap-4">
                                {scouts.length === 0 ? <p className="text-stone-400 italic">Tsy misy zatovo voasoratra anarana.</p> :
                                    scouts.map(s => (
                                        <div key={s.id} className="bg-white p-5 rounded-[2rem] shadow-sm border border-stone-100 flex items-center gap-5 relative group">
                                            <button onClick={() => deleteItem('scouts', s.id)} className="absolute top-4 right-4 text-stone-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all"><Icon name="x" size={16}/></button>
                                            <div className="w-16 h-16 bg-stone-100 rounded-2xl overflow-hidden flex-shrink-0 flex items-center justify-center border-2 border-white shadow-inner">
                                                {s.image ? <img src={s.image} className="w-full h-full object-cover"/> : <Icon name="users" size={24} className="text-stone-300"/>}
                                            </div>
                                            <div className="flex-1">
                                                <h3 className="font-extrabold text-stone-800">{s.name} {s.fname}</h3>
                                                <p className="text-[10px] font-bold text-stone-400 uppercase truncate max-w-[200px]">{s.address}</p>
                                                <div className="flex gap-3 mt-2">
                                                    {s.phone && <a href={`tel:${s.phone}`} className="text-amber-600 hover:scale-110 transition-transform"><Icon name="phone" size={16}/></a>}
                                                    {s.facebook && <a href={`https://fb.com/${s.facebook}`} target="_blank" className="text-blue-600 hover:scale-110 transition-transform"><Icon name="facebook" size={16}/></a>}
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                }
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div className="min-h-screen flex flex-col pb-24">
                    {/* Header */}
                    <header className="p-6 flex justify-between items-center sticky top-0 bg-white/70 backdrop-blur-lg z-50 border-b border-stone-100">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-amber-600 rounded-2xl flex items-center justify-center text-white font-black shadow-lg shadow-amber-200">A</div>
                            <span className="font-black text-stone-900 text-xs uppercase tracking-tight">Antilin'i Madagasikara</span>
                        </div>
                        <button onClick={() => setIsMenuOpen(true)} className="p-2.5 bg-stone-100 rounded-2xl text-stone-600 hover:bg-stone-200 transition-all active:scale-95">
                            <Icon name="menu" size={24} />
                        </button>
                    </header>

                    {/* Main */}
                    <main className="flex-1 px-6 py-8 max-w-2xl mx-auto w-full">
                        {renderContent()}
                    </main>

                    {/* Floating Button */}
                    {activeTab !== 'accueil' && (
                        <button 
                            onClick={() => setIsModalOpen(true)}
                            className="fixed bottom-10 right-8 w-16 h-16 bg-stone-900 text-white rounded-[2rem] flex items-center justify-center shadow-2xl hover:scale-110 active:scale-95 transition-all z-[60]"
                        >
                            <Icon name="plus" size={32} />
                        </button>
                    )}

                    {/* Side Menu */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[200] flex justify-end">
                            <div className="absolute inset-0 bg-stone-900/40 backdrop-blur-md transition-opacity" onClick={() => setIsMenuOpen(false)}></div>
                            <div className="relative w-[300px] menu-bg h-full p-8 shadow-2xl flex flex-col animate-in slide-in-from-right duration-500">
                                <div className="flex justify-between items-center mb-16">
                                    <div className="text-amber-500 font-black text-3xl tracking-tighter">VALIZY</div>
                                    <button onClick={() => setIsMenuOpen(false)} className="text-stone-400 p-2 hover:text-white transition-colors"><Icon name="x" size={28}/></button>
                                </div>
                                <nav className="space-y-4">
                                    {[
                                        {id: 'accueil', label: 'Tongasoa', icon: 'home'},
                                        {id: 'programme', label: 'Programme', icon: 'calendar'},
                                        {id: 'fanabeazana', label: 'Fanabeazana', icon: 'book'},
                                        {id: 'lisitry', label: 'Zatovo', icon: 'users'}
                                    ].map(item => (
                                        <button 
                                            key={item.id}
                                            onClick={() => {setActiveTab(item.id); setIsMenuOpen(false);}}
                                            className={`w-full flex items-center gap-4 px-6 py-4 rounded-3xl transition-all ${activeTab === item.id ? 'bg-amber-600 text-white font-extrabold shadow-lg shadow-amber-900/50' : 'text-stone-400 hover:bg-white/5 font-bold'}`}
                                        >
                                            <Icon name={item.icon} size={22} />
                                            <span className="text-sm uppercase tracking-wide">{item.label}</span>
                                        </button>
                                    ))}
                                </nav>
                                <div className="mt-auto pt-8 border-t border-white/5 opacity-50">
                                    <p className="text-[10px] font-black text-amber-500 uppercase mb-2">Mpikambana</p>
                                    <p className="text-white text-sm font-bold italic">Antily 17 - 2024</p>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Forms Modal */}
                    <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={`Ampidiro ny vaovao (${activeTab})`}>
                        <form onSubmit={handleSubmit} className="space-y-6">
                            {activeTab === 'programme' && (
                                <>
                                    <InputField label="Sonia / Titre" name="title" value={formData.title || ''} placeholder="Ohatra: Lasin'ny sampana" onChange={handleInputChange} />
                                    <InputField label="Daty" name="date" type="date" value={formData.date || ''} onChange={handleInputChange} />
                                    <InputField label="Toerana" name="location" value={formData.location || ''} placeholder="Toerana hanatanterahana azy" onChange={handleInputChange} />
                                    <SelectField 
                                        label="Ambaratonga (Niveau)" 
                                        name="level" 
                                        value={formData.level || 'Sampana'}
                                        options={["Sampana", "Fivondronana", "Fiangonana", "Faritra", "Diosezy"]} 
                                        onChange={handleInputChange} 
                                    />
                                    <TextAreaField label="Votoatiny (Détails)" name="content" value={formData.content || ''} placeholder="Inona no hatao?" onChange={handleInputChange} />
                                </>
                            )}
                            {activeTab === 'fanabeazana' && (
                                <>
                                    <InputField label="Lohahevitra" name="title" value={formData.title || ''} placeholder="Ohatra: Ny tadin-tsandry" onChange={handleInputChange} />
                                    <InputField label="Seha-pibeazana" name="seha" value={formData.seha || ''} placeholder="Ohatra: Teknika" onChange={handleInputChange} />
                                    <InputField label="Faharetany" name="duration" value={formData.duration || ''} placeholder="Ohatra: 45 minitra" onChange={handleInputChange} />
                                    <TextAreaField label="Vokatra ho tratrarina (VHT)" name="vht" value={formData.vht || ''} placeholder="Inona no tanjona?" onChange={handleInputChange} />
                                    <TextAreaField label="Fizotrany (Etape)" name="steps" value={formData.steps || ''} placeholder="Ireo dingana hatao..." onChange={handleInputChange} rows={6} />
                                </>
                            )}
                            {activeTab === 'lisitry' && (
                                <>
                                    <div className="grid grid-cols-2 gap-4">
                                        <InputField label="Anarana" name="name" value={formData.name || ''} placeholder="Anarana" onChange={handleInputChange} />
                                        <InputField label="Fanampiny" name="fname" value={formData.fname || ''} placeholder="Fanampiny" onChange={handleInputChange} />
                                    </div>
                                    <InputField label="Adiresy" name="address" value={formData.address || ''} placeholder="Lot..." onChange={handleInputChange} />
                                    <div className="grid grid-cols-2 gap-4">
                                        <InputField label="Facebook" name="facebook" value={formData.facebook || ''} placeholder="Username" required={false} onChange={handleInputChange} />
                                        <InputField label="Telefaonina" name="phone" value={formData.phone || ''} placeholder="03..." required={false} onChange={handleInputChange} />
                                    </div>
                                    <InputField label="URL ny sary" name="image" value={formData.image || ''} placeholder="https://..." required={false} onChange={handleInputChange} />
                                </>
                            )}
                            <button type="submit" className="w-full bg-stone-900 text-white py-5 rounded-3xl font-black uppercase tracking-widest text-xs hover:bg-amber-600 transition-colors shadow-xl">
                                Raketina izao
                            </button>
                        </form>
                    </Modal>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
