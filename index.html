<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valizy Scoutisme - Gestion de Groupe</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Logic Application -->
    <script>
        // Configuration Firebase
        const __firebase_config_user = {
            apiKey: "AIzaSyCWHPT2XDbpEA0Jw-t6IE0w6o6K5MkJz4Q",
            authDomain: "antilin-i-madagasikara.firebaseapp.com",
            projectId: "antilin-i-madagasikara",
            storageBucket: "antilin-i-madagasikara.firebasestorage.app",
            messagingSenderId: "881813118154",
            appId: "1:881813118154:web:1e4284b18f9440f004e833"
        };

        function scoutApp() {
            return {
                isMenuOpen: false,
                activeTab: 'accueil',
                showAddModal: false,
                user: null,
                appId: typeof __app_id !== 'undefined' ? __app_id : 'valizy-scout-v2-final',
                
                // Filtre pour l'onglet Tahiry
                archiveFilter: 'all',

                settings: {
                    groupName: "Antilin'i Madagasikara",
                    fivondronana: "Fivondronana faha-17",
                    dina: "Tsy misaraka mandrakizay",
                    logo: null,
                    news: "",
                    tetiandroTitle: "SEHA-PIBEAZANA ANTILY"
                },
                
                events: [],
                scouts: [],
                fiches: [],
                archives: [],
                plans: [
                    { trim: 1, label: 'Trimestre 1', content: '' },
                    { trim: 2, label: 'Trimestre 2', content: '' },
                    { trim: 3, label: 'Trimestre 3', content: '' }
                ],
                
                forms: {
                    event: { title: '', date: '', location: '' },
                    scout: { 
                        name: '', fname: '', phone: '', 
                        birth: '', address: '', facebook: '', 
                        note: '', photo: null 
                    },
                    fiche: { 
                        title: '', category: '', content: '',
                        theme: '', goals: '', duration: '',
                        participants: '', note: ''
                    },
                    archive: { title: '', category: 'Ho an\'ny rehetra', fileData: null, fileName: '' }
                },

                menuItems: [
                    { id: 'accueil', label: 'Tongasoa', icon: 'home' },
                    { id: 'programme', label: 'Programme', icon: 'calendar' },
                    { id: 'lisitra', label: 'Zatovo', icon: 'users' },
                    { id: 'fanabeazana', label: 'Fanabeazana', icon: 'book-open' },
                    { id: 'tetiandro', label: 'Tetiandro', icon: 'layout' },
                    { id: 'tahiry', label: 'Tahiry', icon: 'folder-open' },
                    { id: 'settings', label: 'Paramètre', icon: 'settings' }
                ],

                async initFirebase() {
                    try {
                        let config;
                        if (__firebase_config_user.apiKey !== "VOTRE_API_KEY") {
                            config = __firebase_config_user;
                        } else {
                            config = JSON.parse(__firebase_config);
                        }

                        if (!firebase.apps.length) {
                            firebase.initializeApp(config);
                        }
                        
                        const auth = firebase.auth();
                        const db = firebase.firestore();

                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }

                        auth.onAuthStateChanged((user) => {
                            this.user = user;
                            if (user) {
                                this.syncData(db);
                            }
                        });
                    } catch (e) {
                        console.error("Firebase init error:", e);
                    }
                    this.$nextTick(() => lucide.createIcons());
                },

                syncData(db) {
                    const base = db.collection('artifacts').doc(this.appId).collection('public').doc('data');

                    base.collection('settings').doc('global').onSnapshot(doc => {
                        if (doc.exists) this.settings = { ...this.settings, ...doc.data() };
                    }, err => console.error(err));

                    base.collection('events').onSnapshot(snap => {
                        this.events = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.$nextTick(() => lucide.createIcons());
                    }, err => console.error(err));

                    base.collection('scouts').onSnapshot(snap => {
                        this.scouts = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.$nextTick(() => lucide.createIcons());
                    }, err => console.error(err));

                    base.collection('fiches').onSnapshot(snap => {
                        this.fiches = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.$nextTick(() => lucide.createIcons());
                    }, err => console.error(err));

                    base.collection('archives').onSnapshot(snap => {
                        this.archives = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.$nextTick(() => lucide.createIcons());
                    }, err => console.error(err));

                    base.collection('plans').onSnapshot(snap => {
                        if (!snap.empty) {
                            const cloudPlans = snap.docs.map(d => d.data());
                            this.plans = this.plans.map(p => {
                                const match = cloudPlans.find(cp => cp.trim === p.trim);
                                return match ? match : p;
                            });
                        }
                    }, err => console.error(err));
                },

                handleFileUpload(event, target, key) {
                    const file = event.target.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        if (target === 'settings') {
                            this.settings[key] = e.target.result;
                        } else if (target === 'archive') {
                            this.forms.archive.fileData = e.target.result;
                            this.forms.archive.fileName = file.name;
                        } else {
                            this.forms[target][key] = e.target.result;
                        }
                    };
                    reader.readAsDataURL(file);
                },

                async saveItem(collectionName, dataKey) {
                    if (!this.user) return;
                    const db = firebase.firestore();
                    const data = { ...this.forms[dataKey] };
                    
                    await db.collection('artifacts').doc(this.appId).collection('public').doc('data')
                        .collection(collectionName).add({ ...data, createdAt: Date.now() });
                    
                    // Reset forms
                    if(dataKey === 'archive') {
                        this.forms.archive = { title: '', category: 'Ho an\'ny rehetra', fileData: null, fileName: '' };
                    } else {
                        Object.keys(this.forms[dataKey]).forEach(k => {
                            this.forms[dataKey][k] = (k === 'photo' || k === 'fileData') ? null : '';
                        });
                    }
                    this.showAddModal = false;
                },

                async deleteItem(collectionName, id) {
                    if (!this.user) return;
                    const db = firebase.firestore();
                    await db.collection('artifacts').doc(this.appId).collection('public').doc('data')
                        .collection(collectionName).doc(id).delete();
                },

                async saveSettings() {
                    if (!this.user) return;
                    const db = firebase.firestore();
                    await db.collection('artifacts').doc(this.appId).collection('public').doc('data')
                        .collection('settings').doc('global').set(this.settings);
                    
                    this.showNotification("Vita tehirizina ny fanovana!");
                },

                async savePlan(trim) {
                    if (!this.user) return;
                    const db = firebase.firestore();
                    const plan = this.plans.find(p => p.trim === trim);
                    await db.collection('artifacts').doc(this.appId).collection('public').doc('data')
                        .collection('plans').doc(`trim-${trim}`).set(plan);
                    this.showNotification(`Tehirizina ny Trimestre ${trim}`);
                },

                downloadFile(data, name) {
                    const link = document.createElement('a');
                    link.href = data;
                    link.download = name || 'document';
                    link.click();
                },

                showNotification(text) {
                    const notify = document.createElement('div');
                    notify.className = "fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-xl shadow-2xl z-[100] animate-bounce";
                    notify.innerText = text;
                    document.body.appendChild(notify);
                    setTimeout(() => notify.remove(), 3000);
                },

                get filteredArchives() {
                    if (this.archiveFilter === 'all') return this.archives;
                    return this.archives.filter(a => a.category === this.archiveFilter);
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        [x-cloak] { display: none !important; }
        .rotate-3 { transform: rotate(3deg); }
        .tab-content { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fdfcfb] text-stone-900 font-sans" x-data="scoutApp()" x-init="initFirebase()" x-cloak>

    <div class="min-h-screen flex flex-col lg:flex-row overflow-hidden">
        
        <!-- Sidebar -->
        <aside :class="isMenuOpen ? 'translate-x-0' : '-translate-x-full'" 
               class="fixed inset-y-0 left-0 bg-[#1e130f] text-white w-72 transform transition-transform duration-300 ease-in-out z-50 lg:relative lg:translate-x-0 no-print shadow-2xl">
            
            <div class="p-8 h-full flex flex-col">
                <div class="flex items-center gap-3 mb-12">
                    <template x-if="settings.logo">
                        <img :src="settings.logo" class="w-12 h-12 rounded-xl object-cover border-2 border-amber-400/20 rotate-3 shadow-lg">
                    </template>
                    <template x-if="!settings.logo">
                        <div class="w-12 h-12 bg-amber-600 rounded-2xl flex items-center justify-center font-black text-xl shadow-lg rotate-3 text-white border-2 border-amber-400/20">V</div>
                    </template>
                    <div>
                        <h2 class="font-black text-lg tracking-tighter leading-none">VALIZY</h2>
                        <p class="text-[10px] text-amber-500 font-bold uppercase tracking-widest">Scoutisme</p>
                    </div>
                </div>

                <nav class="space-y-1 flex-1 overflow-y-auto pr-2">
                    <template x-for="item in menuItems" :key="item.id">
                        <button @click="activeTab = item.id; isMenuOpen = false; showAddModal = false" 
                                :class="activeTab === item.id ? 'bg-amber-600 text-white shadow-lg scale-105' : 'hover:bg-white/5 text-stone-400'"
                                class="w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all font-bold uppercase text-[11px] tracking-wider text-left">
                            <i :data-lucide="item.icon" class="w-5 h-5"></i>
                            <span x-text="item.label"></span>
                        </button>
                    </template>
                </nav>

                <div class="mt-auto p-4 bg-white/5 rounded-2xl border border-white/10">
                    <p class="text-[10px] text-stone-500 uppercase font-bold text-center">Fahasalamana & Fanabeazana</p>
                </div>
            </div>
        </aside>

        <!-- Overlay Mobile -->
        <div x-show="isMenuOpen" @click="isMenuOpen = false" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 lg:hidden" x-transition.opacity></div>

        <!-- Main Content -->
        <main class="flex-1 h-screen overflow-y-auto p-6 lg:p-12 max-w-6xl mx-auto w-full">
            
            <header class="lg:hidden mb-8 flex justify-between items-center no-print">
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-amber-600 rounded-lg flex items-center justify-center font-black text-white text-xs">V</div>
                    <span class="font-black text-xs uppercase tracking-widest text-stone-400" x-text="settings.groupName"></span>
                </div>
                <button @click="isMenuOpen = true" class="p-3 bg-white rounded-xl shadow-sm border border-stone-200">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
            </header>

            <div class="tab-content">
                
                <!-- 1. TONGASOA -->
                <div x-show="activeTab === 'accueil'" class="space-y-12">
                    <div class="flex flex-col items-center lg:items-start lg:flex-row gap-12 py-8">
                        <div class="relative">
                            <div class="w-48 h-48 lg:w-72 lg:h-72 bg-stone-900 rounded-[3.5rem] border-8 border-white shadow-2xl flex items-center justify-center rotate-3 overflow-hidden">
                                <template x-if="settings.logo">
                                    <img :src="settings.logo" class="w-full h-full object-cover">
                                </template>
                                <template x-if="!settings.logo">
                                    <i data-lucide="shield" class="w-24 h-24 text-amber-600"></i>
                                </template>
                            </div>
                            <div class="absolute -bottom-4 -right-4 bg-amber-500 text-white p-4 rounded-2xl shadow-xl rotate-12 font-black text-sm uppercase">2024-2025</div>
                        </div>
                        <div class="text-center lg:text-left pt-6 flex-1">
                            <h1 class="text-5xl lg:text-7xl font-black text-stone-900 mb-4 uppercase tracking-tighter leading-[0.9]" x-text="settings.groupName"></h1>
                            <div class="flex flex-wrap justify-center lg:justify-start gap-4 mb-6">
                                <span class="bg-stone-900 text-amber-500 px-6 py-2 rounded-full font-black text-xs uppercase tracking-widest shadow-xl" x-text="settings.fivondronana"></span>
                            </div>
                            <p class="text-stone-400 font-serif italic text-xl lg:text-2xl mb-8" x-text="'&quot;' + settings.dina + '&quot;'"></p>
                            
                            <div x-show="settings.news" class="bg-amber-50 border-l-4 border-amber-500 p-6 rounded-r-2xl max-w-xl text-left">
                                <h4 class="text-[10px] font-black text-amber-700 uppercase tracking-widest mb-2">Hetsika farany & Vaovao</h4>
                                <p class="text-stone-700 text-sm whitespace-pre-line" x-text="settings.news"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 2. PROGRAMME -->
                <div x-show="activeTab === 'programme'" class="space-y-8">
                    <div class="flex justify-between items-end border-b-4 border-stone-900 pb-4">
                        <h2 class="text-5xl font-black text-stone-900 uppercase tracking-tighter">Programme</h2>
                        <button @click="showAddModal = !showAddModal" class="bg-stone-900 text-white px-6 py-3 rounded-2xl shadow-xl font-black text-xs uppercase tracking-widest flex items-center gap-2">
                            <i :data-lucide="showAddModal ? 'x' : 'plus'" class="w-4 h-4"></i>
                            <span x-text="showAddModal ? 'Hikatona' : 'Hampiditra'"></span>
                        </button>
                    </div>

                    <div x-show="showAddModal" class="bg-amber-50 p-8 rounded-[2rem] border-4 border-dashed border-amber-200 space-y-6" x-transition>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" x-model="forms.event.title" class="w-full p-4 rounded-2xl border-2 border-stone-200 outline-none" placeholder="Lohateny">
                            <input type="date" x-model="forms.event.date" class="w-full p-4 rounded-2xl border-2 border-stone-200 outline-none">
                            <input type="text" x-model="forms.event.location" class="w-full p-4 rounded-2xl border-2 border-stone-200 outline-none md:col-span-2" placeholder="Toerana">
                        </div>
                        <button @click="saveItem('events', 'event')" class="w-full bg-stone-900 text-white py-5 rounded-2xl font-black text-sm uppercase">Tehirizina</button>
                    </div>

                    <div class="grid grid-cols-1 gap-4">
                        <template x-for="event in events" :key="event.id">
                            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-stone-100 flex items-center justify-between">
                                <div class="flex items-center gap-8">
                                    <div class="bg-stone-900 text-white w-16 h-16 rounded-2xl flex flex-col items-center justify-center font-black">
                                        <span class="text-[10px] text-amber-500 uppercase" x-text="event.date ? event.date.split('-')[1] : '--'"></span>
                                        <span class="text-2xl" x-text="event.date ? event.date.split('-')[2] : '--'"></span>
                                    </div>
                                    <div>
                                        <h4 class="font-black text-xl text-stone-800 uppercase" x-text="event.title"></h4>
                                        <p class="text-[10px] text-stone-400 uppercase font-bold" x-text="event.location"></p>
                                    </div>
                                </div>
                                <button @click="deleteItem('events', event.id)" class="text-stone-200 hover:text-red-500 p-3"><i data-lucide="trash-2"></i></button>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- 3. ZATOVO -->
                <div x-show="activeTab === 'lisitra'" class="space-y-8">
                    <div class="flex justify-between items-end border-b-4 border-stone-900 pb-4">
                        <h2 class="text-5xl font-black text-stone-900 uppercase tracking-tighter">Zatovo</h2>
                        <button @click="showAddModal = !showAddModal" class="bg-stone-900 text-white px-6 py-3 rounded-2xl shadow-xl font-black text-xs uppercase tracking-widest flex items-center gap-2">
                            <i :data-lucide="showAddModal ? 'x' : 'user-plus'" class="w-4 h-4"></i>
                            <span x-text="showAddModal ? 'Hikatona' : 'Hampiditra'"></span>
                        </button>
                    </div>

                    <div x-show="showAddModal" class="bg-white p-10 rounded-[2.5rem] border-2 border-stone-100 shadow-xl space-y-6" x-transition>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2 flex flex-col items-center gap-4 mb-4">
                                <div class="w-32 h-32 bg-stone-100 rounded-3xl border-4 border-dashed border-stone-200 flex items-center justify-center overflow-hidden">
                                    <template x-if="forms.scout.photo">
                                        <img :src="forms.scout.photo" class="w-full h-full object-cover">
                                    </template>
                                    <template x-if="!forms.scout.photo">
                                        <i data-lucide="camera" class="text-stone-300 w-10 h-10"></i>
                                    </template>
                                </div>
                                <label class="bg-stone-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase cursor-pointer">
                                    Hampiditra sary
                                    <input type="file" class="hidden" @change="handleFileUpload($event, 'scout', 'photo')" accept="image/*">
                                </label>
                            </div>
                            <input type="text" placeholder="Anarana" x-model="forms.scout.name" class="w-full p-4 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500 bg-stone-50">
                            <input type="text" placeholder="Fanampiny" x-model="forms.scout.fname" class="w-full p-4 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500 bg-stone-50">
                            <input type="text" placeholder="Daty sy toerana nahaterahana" x-model="forms.scout.birth" class="w-full p-4 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500 bg-stone-50">
                            <input type="text" placeholder="Laharana finday" x-model="forms.scout.phone" class="w-full p-4 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500 bg-stone-50">
                            <input type="text" placeholder="Adiresy" x-model="forms.scout.address" class="w-full p-4 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500 bg-stone-50">
                            <input type="text" placeholder="Laharana Facebook" x-model="forms.scout.facebook" class="w-full p-4 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500 bg-stone-50">
                            <textarea placeholder="Fanamarihana hafa..." x-model="forms.scout.note" class="w-full p-4 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500 bg-stone-50 md:col-span-2"></textarea>
                        </div>
                        <button @click="saveItem('scouts', 'scout')" class="w-full bg-amber-700 text-white py-5 rounded-2xl font-black uppercase text-sm shadow-lg">Tehirizina ny zatovo</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <template x-for="scout in scouts" :key="scout.id">
                            <div class="bg-white p-6 rounded-3xl shadow-sm border border-stone-100 flex gap-6 group hover:shadow-md transition-all">
                                <div class="w-24 h-32 bg-stone-100 rounded-2xl flex-shrink-0 overflow-hidden border-2 border-stone-50">
                                    <template x-if="scout.photo">
                                        <img :src="scout.photo" class="w-full h-full object-cover">
                                    </template>
                                    <template x-if="!scout.photo">
                                        <div class="w-full h-full flex items-center justify-center bg-stone-200 text-white font-black text-4xl" x-text="scout.name[0]"></div>
                                    </template>
                                </div>
                                <div class="flex-1 space-y-1">
                                    <h4 class="font-black uppercase text-lg leading-none" x-text="scout.name + ' ' + scout.fname"></h4>
                                    <p class="text-[10px] font-bold text-amber-600" x-text="scout.birth"></p>
                                    <div class="grid grid-cols-1 text-[11px] text-stone-500 gap-y-0.5 pt-2">
                                        <div class="flex items-center gap-2"><i data-lucide="phone" class="w-3 h-3"></i> <span x-text="scout.phone"></span></div>
                                        <div class="flex items-center gap-2"><i data-lucide="map-pin" class="w-3 h-3"></i> <span x-text="scout.address"></span></div>
                                        <div class="flex items-center gap-2 text-blue-600"><i data-lucide="facebook" class="w-3 h-3"></i> <span x-text="scout.facebook"></span></div>
                                    </div>
                                    <div x-show="scout.note" class="mt-2 p-2 bg-stone-50 rounded-lg text-[10px] italic border-l-2 border-stone-200" x-text="scout.note"></div>
                                </div>
                                <button @click="deleteItem('scouts', scout.id)" class="text-stone-200 hover:text-red-500 self-start"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- 4. FANABEAZANA -->
                <div x-show="activeTab === 'fanabeazana'" class="space-y-8">
                    <div class="flex justify-between items-end border-b-4 border-stone-900 pb-4">
                        <h2 class="text-5xl font-black text-stone-900 uppercase tracking-tighter">Fanabeazana</h2>
                        <button @click="showAddModal = !showAddModal" class="bg-amber-600 text-white px-6 py-3 rounded-2xl shadow-xl font-black text-xs uppercase tracking-widest flex items-center gap-2">
                            <i :data-lucide="showAddModal ? 'x' : 'file-plus'" class="w-4 h-4"></i>
                            <span x-text="showAddModal ? 'Hikatona' : 'Fiche vaovao'"></span>
                        </button>
                    </div>

                    <div x-show="showAddModal" class="bg-stone-900 text-white p-10 rounded-[2.5rem] space-y-6" x-transition>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" placeholder="Lohatenin'ny Fiche" x-model="forms.fiche.title" class="w-full p-4 bg-white/10 border-2 border-white/10 rounded-2xl outline-none focus:border-amber-500">
                            <input type="text" placeholder="Lohahevitra (Thème)" x-model="forms.fiche.theme" class="w-full p-4 bg-white/10 border-2 border-white/10 rounded-2xl outline-none focus:border-amber-500">
                            <select x-model="forms.fiche.category" class="w-full p-4 bg-white/10 border-2 border-white/10 rounded-2xl outline-none focus:border-amber-500">
                                <option value="" class="text-stone-900">Karazany</option>
                                <option value="Teknika" class="text-stone-900">Teknika Skoto</option>
                                <option value="Lalao" class="text-stone-900">Lalao</option>
                                <option value="Hira" class="text-stone-900">Hira</option>
                            </select>
                            <input type="text" placeholder="Faharetany (Durée)" x-model="forms.fiche.duration" class="w-full p-4 bg-white/10 border-2 border-white/10 rounded-2xl outline-none focus:border-amber-500">
                            <input type="text" placeholder="Mpandray anjara" x-model="forms.fiche.participants" class="w-full p-4 bg-white/10 border-2 border-white/10 rounded-2xl outline-none focus:border-amber-500">
                            <input type="text" placeholder="Vokatra ho tratrarina (Objectifs)" x-model="forms.fiche.goals" class="w-full p-4 bg-white/10 border-2 border-white/10 rounded-2xl outline-none focus:border-amber-500">
                            <textarea placeholder="Andinindininy (Contenu / Déroulement)" x-model="forms.fiche.content" rows="4" class="w-full p-4 bg-white/10 border-2 border-white/10 rounded-2xl outline-none focus:border-amber-500 md:col-span-2"></textarea>
                            <textarea placeholder="Fanamarihana fanampiny" x-model="forms.fiche.note" rows="2" class="w-full p-4 bg-white/10 border-2 border-white/10 rounded-2xl outline-none focus:border-amber-500 md:col-span-2"></textarea>
                        </div>
                        <button @click="saveItem('fiches', 'fiche')" class="w-full bg-amber-600 text-white py-5 rounded-2xl font-black uppercase text-sm">Tehirizina ny Fiche</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <template x-for="fiche in fiches" :key="fiche.id">
                            <div class="bg-white border-2 border-stone-100 p-8 rounded-[2rem] shadow-sm relative group">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="bg-amber-100 text-amber-700 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest" x-text="fiche.category"></span>
                                    <span class="text-stone-400 text-[10px] font-bold" x-text="fiche.duration"></span>
                                </div>
                                <h3 class="text-2xl font-black text-stone-900 uppercase leading-none mb-1" x-text="fiche.title"></h3>
                                <p class="text-amber-600 text-[11px] font-black uppercase tracking-widest mb-4" x-text="fiche.theme"></p>
                                
                                <div class="space-y-3 mb-6">
                                    <div class="bg-stone-50 p-3 rounded-xl">
                                        <p class="text-[9px] font-black text-stone-400 uppercase">Vokatra ho tratrarina:</p>
                                        <p class="text-xs text-stone-700" x-text="fiche.goals"></p>
                                    </div>
                                    <p class="text-stone-500 text-sm whitespace-pre-wrap line-clamp-4" x-text="fiche.content"></p>
                                </div>

                                <div class="flex justify-between items-center border-t border-stone-50 pt-6">
                                    <button @click="deleteItem('fiches', fiche.id)" class="text-stone-200 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                                    <button class="bg-stone-900 text-white px-5 py-2 rounded-xl font-black text-[10px] uppercase">Hizaha ny antsipiriany</button>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- 6. TETIANDRO (NEW) -->
                <div x-show="activeTab === 'tetiandro'" class="space-y-8">
                    <div class="text-center py-10 bg-stone-900 rounded-[3rem] shadow-2xl relative overflow-hidden">
                        <div class="absolute inset-0 opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
                        <input type="text" x-model="settings.tetiandroTitle" @change="saveSettings()" 
                               class="relative z-10 bg-transparent text-center text-4xl lg:text-6xl font-black text-amber-500 uppercase tracking-tighter w-full outline-none focus:ring-2 ring-amber-500/20 rounded-xl">
                        <p class="relative z-10 text-[10px] text-stone-400 font-bold uppercase tracking-[0.3em] mt-2">Fandaharam-potoana sy Tombana</p>
                    </div>

                    <div class="grid grid-cols-1 gap-8">
                        <template x-for="plan in plans" :key="plan.trim">
                            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border-2 border-stone-100 flex flex-col md:flex-row gap-8">
                                <div class="md:w-48 flex-shrink-0">
                                    <div class="bg-amber-600 text-white p-6 rounded-3xl text-center shadow-lg rotate-[-2deg]">
                                        <h3 class="font-black text-2xl uppercase" x-text="'T' + plan.trim"></h3>
                                        <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Trimestrielle</p>
                                    </div>
                                </div>
                                <div class="flex-1 space-y-4">
                                    <label class="text-[10px] font-black text-stone-400 uppercase tracking-widest">Tombana sy Fandaharan'asa</label>
                                    <textarea x-model="plan.content" rows="4" 
                                              class="w-full p-5 bg-stone-50 border-2 border-stone-100 rounded-3xl outline-none focus:border-amber-500 text-sm leading-relaxed"
                                              placeholder="Inona no vita? Inona no mbola hatao?"></textarea>
                                    <div class="flex justify-end">
                                        <button @click="savePlan(plan.trim)" class="bg-stone-900 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-wider hover:bg-amber-600 transition-all">Tehirizina</button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- 7. TAHIRY (NEW) -->
                <div x-show="activeTab === 'tahiry'" class="space-y-8">
                    <div class="flex flex-col md:flex-row justify-between items-center gap-6 border-b-4 border-stone-900 pb-6">
                        <h2 class="text-5xl font-black text-stone-900 uppercase tracking-tighter">Tahiry</h2>
                        
                        <div class="flex items-center gap-3 bg-stone-100 p-2 rounded-2xl overflow-x-auto max-w-full">
                            <button @click="archiveFilter = 'all'" :class="archiveFilter === 'all' ? 'bg-stone-900 text-white' : 'text-stone-500'" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition-all">Rehetra</button>
                            <button @click="archiveFilter = 'Louvteaux'" :class="archiveFilter === 'Louvteaux' ? 'bg-amber-600 text-white' : 'text-stone-500'" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition-all">Louvteaux</button>
                            <button @click="archiveFilter = 'Mpianjoria'" :class="archiveFilter === 'Mpianjoria' ? 'bg-amber-600 text-white' : 'text-stone-500'" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition-all">Mpianjoria</button>
                            <button @click="archiveFilter = 'Mpamakilay'" :class="archiveFilter === 'Mpamakilay' ? 'bg-amber-600 text-white' : 'text-stone-500'" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition-all">Mpamakilay</button>
                            <button @click="archiveFilter = 'Mpiandalana'" :class="archiveFilter === 'Mpiandalana' ? 'bg-amber-600 text-white' : 'text-stone-500'" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition-all">Mpiandalana</button>
                            <button @click="archiveFilter = 'Ho an\'ny rehetra'" :class="archiveFilter === 'Ho an\'ny rehetra' ? 'bg-amber-600 text-white' : 'text-stone-500'" class="px-4 py-2 rounded-xl text-[10px] font-black uppercase whitespace-nowrap transition-all">Rehetra (Antily)</button>
                        </div>

                        <button @click="showAddModal = !showAddModal" class="bg-stone-900 text-white px-6 py-3 rounded-2xl shadow-xl font-black text-xs uppercase tracking-widest flex items-center gap-2 flex-shrink-0">
                            <i :data-lucide="showAddModal ? 'x' : 'upload-cloud'" class="w-4 h-4"></i>
                            <span x-text="showAddModal ? 'Hikatona' : 'Hampiditra'"></span>
                        </button>
                    </div>

                    <div x-show="showAddModal" class="bg-white p-8 rounded-[2rem] border-2 border-stone-100 shadow-xl space-y-6" x-transition>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <input type="text" placeholder="Lohatenin'ny Tahiry" x-model="forms.archive.title" class="w-full p-4 bg-stone-50 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500 font-bold">
                            <select x-model="forms.archive.category" class="w-full p-4 bg-stone-50 border-2 border-stone-100 rounded-2xl outline-none focus:border-amber-500">
                                <option value="Louvteaux">Louvteaux</option>
                                <option value="Mpianjoria">Mpianjoria</option>
                                <option value="Mpamakilay">Mpamakilay</option>
                                <option value="Mpiandalana">Mpiandalana</option>
                                <option value="Ho an'ny rehetra">Ho an'ny rehetra</option>
                            </select>
                            <div class="md:col-span-2">
                                <label class="flex flex-col items-center justify-center w-full h-32 bg-stone-50 border-2 border-dashed border-stone-200 rounded-2xl cursor-pointer hover:bg-stone-100 transition-all">
                                    <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                        <i data-lucide="file" class="w-8 h-8 text-stone-300 mb-2"></i>
                                        <p class="text-xs text-stone-500 font-bold uppercase tracking-wider" x-text="forms.archive.fileName || 'Safidio ny document (PDF, Image)'"></p>
                                    </div>
                                    <input type="file" class="hidden" @change="handleFileUpload($event, 'archive')">
                                </label>
                            </div>
                        </div>
                        <button @click="saveItem('archives', 'archive')" class="w-full bg-stone-900 text-white py-5 rounded-2xl font-black uppercase text-sm shadow-lg">Tehirizina ao amin'ny Tahiry</button>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <template x-for="item in filteredArchives" :key="item.id">
                            <div class="bg-white p-6 rounded-[2rem] border border-stone-100 shadow-sm flex flex-col group hover:shadow-md transition-all">
                                <div class="flex justify-between items-start mb-4">
                                    <div class="w-12 h-12 bg-amber-100 rounded-xl flex items-center justify-center text-amber-600">
                                        <i data-lucide="file-text" class="w-6 h-6"></i>
                                    </div>
                                    <button @click="deleteItem('archives', item.id)" class="text-stone-200 hover:text-red-500 p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                </div>
                                <h4 class="font-black text-lg text-stone-800 uppercase leading-tight mb-2 flex-1" x-text="item.title"></h4>
                                <div class="flex justify-between items-center mt-4">
                                    <span class="text-[9px] font-black text-stone-400 uppercase tracking-widest" x-text="item.category"></span>
                                    <button @click="downloadFile(item.fileData, item.fileName)" class="bg-stone-900 text-white p-2 rounded-lg hover:bg-amber-600 transition-colors">
                                        <i data-lucide="download" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        </template>
                    </div>

                    <div x-show="filteredArchives.length === 0" class="text-center py-20 text-stone-300">
                        <i data-lucide="inbox" class="w-16 h-16 mx-auto mb-4 opacity-20"></i>
                        <p class="font-bold uppercase text-xs tracking-widest">Tsy misy tahiry ato amin'ity sokajy ity</p>
                    </div>
                </div>

                <!-- 8. SETTINGS -->
                <div x-show="activeTab === 'settings'" class="space-y-8 pb-20">
                    <div class="flex justify-between items-end border-b-4 border-stone-900 pb-4">
                        <h2 class="text-5xl font-black text-stone-900 uppercase tracking-tighter">Paramètre</h2>
                    </div>
                    <div class="bg-white p-10 lg:p-16 rounded-[3rem] shadow-xl border border-stone-100 space-y-12">
                        <!-- Modification Logo -->
                        <div class="flex flex-col md:flex-row items-center gap-10 border-b border-stone-100 pb-10">
                            <div class="w-40 h-40 bg-stone-50 rounded-[2.5rem] border-4 border-dashed border-stone-200 flex items-center justify-center overflow-hidden relative shadow-inner">
                                <template x-if="settings.logo">
                                    <img :src="settings.logo" class="w-full h-full object-cover">
                                </template>
                                <template x-if="!settings.logo">
                                    <i data-lucide="image" class="text-stone-200 w-12 h-12"></i>
                                </template>
                            </div>
                            <div class="flex-1 space-y-4">
                                <h4 class="font-black text-xl uppercase tracking-tight">Logo-n'ny Vondrona</h4>
                                <p class="text-sm text-stone-400">Ity sary ity no hita eo amin'ny pejy fandraisana sy ny sisiny.</p>
                                <label class="inline-block bg-amber-600 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase cursor-pointer hover:bg-stone-900 transition-colors">
                                    Hanova sary
                                    <input type="file" class="hidden" @change="handleFileUpload($event, 'settings', 'logo')" accept="image/*">
                                </label>
                            </div>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                            <div class="space-y-4">
                                <div>
                                    <label class="text-[11px] font-black text-stone-400 uppercase tracking-widest ml-2">Anaran'ny Vondrona</label>
                                    <input type="text" x-model="settings.groupName" class="w-full p-5 border-2 border-stone-100 rounded-3xl outline-none focus:border-amber-500 font-black text-lg bg-stone-50">
                                </div>
                                <div>
                                    <label class="text-[11px] font-black text-stone-400 uppercase tracking-widest ml-2">Fivondronana</label>
                                    <input type="text" x-model="settings.fivondronana" class="w-full p-5 border-2 border-stone-100 rounded-3xl outline-none focus:border-amber-500 bg-stone-50">
                                </div>
                            </div>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-[11px] font-black text-stone-400 uppercase tracking-widest ml-2">Ny Dina (Devise)</label>
                                    <textarea x-model="settings.dina" rows="3" class="w-full p-5 border-2 border-stone-100 rounded-3xl outline-none focus:border-amber-500 bg-stone-50 font-serif italic text-lg"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4 pt-6 border-t border-stone-100">
                            <label class="text-[11px] font-black text-stone-400 uppercase tracking-widest ml-2">Vaovao farany na Daty tokony ho tadidina</label>
                            <textarea x-model="settings.news" rows="5" class="w-full p-5 border-2 border-stone-100 rounded-3xl outline-none focus:border-amber-500 bg-stone-50" placeholder="Ohatra: 15 Mey: Fivorian'ny mpiandraikitra..."></textarea>
                        </div>

                        <button @click="saveSettings()" class="w-full bg-stone-900 text-white py-6 rounded-[2rem] font-black text-lg uppercase tracking-widest shadow-2xl hover:bg-amber-600 transition-all">Tehirizina ny fanovana rehetra</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script>
        window.onload = () => { console.log("Valizy Scoutisme ready."); };
    </script>
</body>
</html>
