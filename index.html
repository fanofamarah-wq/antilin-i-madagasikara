<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VALIZY - Gestion Scoutisme</title>
    
    <!-- Scripts de base -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK (Version Compat pour plus de stabilité dans l'iframe) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        [x-cloak] { display: none !important; }
        .card-scout { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-scout:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05); }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        @media print {
            .no-print { display: none !important; }
            #print-section { display: block !important; }
        }
    </style>
</head>
<body x-data="scoutApp()" x-init="initApp()" x-cloak class="text-stone-900">

    <script>
        // On définit la fonction globalement AVANT Alpine
        window.scoutApp = function() {
            return {
                tab: 'home',
                showForm: false,
                currentFiche: null,
                user: null,
                currentUser: {
                    pseudo: localStorage.getItem('valizy_pseudo') || 'Skoto_' + Math.floor(Math.random() * 1000)
                },
                
                settings: {
                    groupName: "Antilin'i Madagasikara",
                    fivondronana: "Fivondronana faha-17",
                    sampana: "Mpamakilay",
                    dina: "Tsy misaraka mandrakizay",
                    aboutText: "Mpanabe ny tanora mba ho vanona sy mahay mandray andraikitra.",
                    logo: null
                },

                menu: [
                    { id: 'home', label: 'Tongasoa', icon: '🏠' },
                    { id: 'calendar', label: 'Programme', icon: '📅' },
                    { id: 'members', label: 'Zatovo', icon: '👥' },
                    { id: 'edu', label: 'Fiches', icon: '📚' },
                    { id: 'chat', label: 'Tapatapa-pira', icon: '💬' },
                    { id: 'settings', label: 'Paramètre', icon: '⚙️' }
                ],

                news: [],
                events: [],
                scouts: [],
                fiches: [],
                messages: [],

                formEvent: { title: '', date: '' },
                formScout: { name: '', firstname: '', address: '', phone: '', facebook: '', image: null },
                formFiche: { title: '', category: '', participants: '', objective: '', content: '', remark: '' },
                formNews: { title: '', desc: '', date: '' },
                chatInput: '',

                db: null,
                auth: null,
                appId: typeof __app_id !== 'undefined' ? __app_id : 'default-app-id',

                async initApp() {
                    // Protection contre les erreurs de config Firebase vides vues dans vos logs
                    let config;
                    try {
                        config = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
                    } catch(e) { config = null; }

                    if (config && config.apiKey && config.apiKey !== "preview") {
                        if (!firebase.apps.length) firebase.initializeApp(config);
                        this.auth = firebase.auth();
                        this.db = firebase.firestore();

                        // Auth
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await this.auth.signInWithCustomToken(__initial_auth_token);
                            } else {
                                await this.auth.signInAnonymously();
                            }
                            this.setupRealtimeSync();
                        } catch (e) { console.error("Erreur Auth:", e); }
                    } else {
                        console.warn("Firebase non configuré : Mode local activé.");
                    }
                },

                setupRealtimeSync() {
                    if (!this.db) return;
                    const publicPath = `artifacts/${this.appId}/public/data`;

                    this.db.doc(`${publicPath}/settings/global`).onSnapshot(doc => {
                        if (doc.exists) this.settings = doc.data();
                    }, err => console.log("Note: Document settings non trouvé"));

                    this.db.collection(`${publicPath}/news`).onSnapshot(s => this.news = s.docs.map(d => ({...d.data(), id: d.id})), e => {});
                    this.db.collection(`${publicPath}/events`).onSnapshot(s => this.events = s.docs.map(d => ({...d.data(), id: d.id})), e => {});
                    this.db.collection(`${publicPath}/scouts`).onSnapshot(s => this.scouts = s.docs.map(d => ({...d.data(), id: d.id})), e => {});
                    this.db.collection(`${publicPath}/fiches`).onSnapshot(s => this.fiches = s.docs.map(d => ({...d.data(), id: d.id})), e => {});
                    this.db.collection(`${publicPath}/chat`).onSnapshot(s => {
                        this.messages = s.docs.map(d => ({...d.data(), id: d.id})).sort((a,b) => a.timestamp - b.timestamp);
                        setTimeout(() => this.scrollToBottom(), 100);
                    }, e => {});
                },

                async saveSettings() {
                    if(!this.db) return;
                    await this.db.doc(`artifacts/${this.appId}/public/data/settings/global`).set(this.settings);
                },

                async sendMessage() {
                    if(!this.chatInput.trim() || !this.db) return;
                    await this.db.collection(`artifacts/${this.appId}/public/data/chat`).add({
                        user: this.currentUser.pseudo,
                        text: this.chatInput,
                        time: new Date().toLocaleTimeString('mg-MG', {hour: '2-digit', minute:'2-digit'}),
                        timestamp: Date.now()
                    });
                    this.chatInput = '';
                },

                async addNews() {
                    if(!this.formNews.title || !this.db) return;
                    await this.db.collection(`artifacts/${this.appId}/public/data/news`).add({ ...this.formNews, timestamp: Date.now() });
                    this.formNews = { title: '', desc: '', date: '' };
                },

                async addEvent() {
                    if(!this.formEvent.title || !this.db) return;
                    await this.db.collection(`artifacts/${this.appId}/public/data/events`).add({ ...this.formEvent, timestamp: Date.now() });
                    this.formEvent = { title: '', date: '' };
                    this.showForm = false;
                },

                async addScout() {
                    if(!this.formScout.name || !this.db) return;
                    await this.db.collection(`artifacts/${this.appId}/public/data/scouts`).add({ ...this.formScout, timestamp: Date.now() });
                    this.formScout = { name: '', firstname: '', address: '', phone: '', facebook: '', image: null };
                    this.showForm = false;
                },

                async addFiche() {
                    if(!this.formFiche.title || !this.db) return;
                    await this.db.collection(`artifacts/${this.appId}/public/data/fiches`).add({ ...this.formFiche, timestamp: Date.now() });
                    this.formFiche = { title: '', category: '', participants: '', objective: '', content: '', remark: '' };
                    this.showForm = false;
                },

                handleImage(e, type) {
                    const reader = new FileReader();
                    reader.onload = (f) => {
                        if(type === 'scout') this.formScout.image = f.target.result;
                        if(type === 'logo') { this.settings.logo = f.target.result; this.saveSettings(); }
                    };
                    if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
                },

                updatePseudo() { localStorage.setItem('valizy_pseudo', this.currentUser.pseudo); },
                scrollToBottom() { const el = document.getElementById('chat-box'); if (el) el.scrollTop = el.scrollHeight; },
                printFiche(f) { this.currentFiche = f; setTimeout(() => window.print(), 300); }
            }
        }
    </script>

    <!-- Alpine chargé en dernier -->
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>

    <div class="flex h-screen overflow-hidden no-print">
        
        <!-- SIDEBAR -->
        <aside class="w-64 bg-[#2d1b15] text-white flex-shrink-0 hidden lg:flex flex-col border-r border-white/5">
            <div class="p-6 h-full flex flex-col">
                <div class="flex items-center gap-3 mb-10">
                    <div class="w-10 h-10 bg-amber-600 rounded-xl flex items-center justify-center font-black text-white shadow-lg rotate-3 text-lg">V</div>
                    <div>
                        <h2 class="font-black text-lg leading-none tracking-tighter">VALIZY</h2>
                        <p class="text-[9px] text-amber-500 font-bold uppercase tracking-widest" x-text="settings.groupName"></p>
                    </div>
                </div>

                <nav class="space-y-1 flex-1">
                    <template x-for="item in menu">
                        <button @click="tab = item.id; showForm = false" 
                            :class="tab === item.id ? 'bg-amber-600 text-white shadow-lg' : 'text-stone-400 hover:bg-white/5'"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-[11px] font-black uppercase tracking-widest text-left">
                            <span x-text="item.icon"></span>
                            <span x-text="item.label"></span>
                        </button>
                    </template>
                </nav>

                <div class="mt-auto p-4 bg-white/5 rounded-2xl border border-white/10">
                    <p class="text-[8px] uppercase font-black text-amber-500 mb-1">Mombamomba anao</p>
                    <p class="text-xs font-bold truncate" x-text="currentUser.pseudo"></p>
                </div>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="flex-1 overflow-y-auto bg-stone-50">
            <div class="max-w-4xl mx-auto p-6 lg:p-12">

                <!-- HOME -->
                <div x-show="tab === 'home'" class="space-y-10">
                    <div class="bg-white p-8 rounded-[2.5rem] border border-stone-200 shadow-sm flex flex-col md:flex-row items-center gap-8">
                        <div class="w-48 h-48 bg-stone-900 rounded-[2.5rem] flex items-center justify-center text-amber-500 shadow-xl rotate-3 shrink-0 overflow-hidden border-4 border-white">
                            <template x-if="settings.logo">
                                <img :src="settings.logo" class="w-full h-full object-cover">
                            </template>
                            <template x-if="!settings.logo">
                                <span class="text-7xl font-black">V</span>
                            </template>
                        </div>
                        <div class="text-center md:text-left">
                            <h1 class="text-4xl lg:text-6xl font-black text-stone-900 uppercase tracking-tighter leading-none mb-4" x-text="settings.groupName"></h1>
                            <div class="inline-flex bg-amber-100 text-amber-900 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-4" x-text="settings.fivondronana"></div>
                            <p class="text-stone-400 font-bold uppercase tracking-widest text-[9px] block" x-text="settings.sampana + ' • ' + settings.dina"></p>
                        </div>
                    </div>

                    <!-- Grille News/About -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-8 rounded-[2.5rem] border border-stone-200">
                            <h3 class="font-black text-[9px] uppercase tracking-[0.2em] text-stone-400 mb-6">Vaovao sy ny ho avy</h3>
                            <div class="space-y-6">
                                <template x-for="n in news">
                                    <div class="border-b border-stone-50 pb-4 last:border-none">
                                        <p class="text-[9px] font-black text-amber-600 mb-1" x-text="n.date"></p>
                                        <h4 class="font-black text-stone-800 text-lg leading-tight" x-text="n.title"></h4>
                                        <p class="text-xs text-stone-500 mt-2 font-medium" x-text="n.desc"></p>
                                    </div>
                                </template>
                                <template x-if="news.length === 0">
                                    <p class="text-xs text-stone-400 italic">Tsy misy vaovao amin'izao fotoana izao.</p>
                                </template>
                            </div>
                        </div>

                        <div class="bg-stone-900 p-8 rounded-[2.5rem] text-white flex flex-col justify-between">
                            <div>
                                <h3 class="font-black text-[9px] uppercase tracking-[0.2em] text-amber-500 mb-6">Tanjona</h3>
                                <p class="text-2xl font-medium leading-relaxed italic text-stone-300" x-text="settings.aboutText"></p>
                            </div>
                            <div class="mt-12 pt-6 border-t border-white/10">
                                <p class="text-[10px] font-black uppercase tracking-widest text-amber-500">Filamatra</p>
                                <p class="text-sm font-bold italic" x-text="'« ' + settings.dina + ' »'"></p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- AUTRES ONGLETS (STRUCTURE GARDEE) -->
                <div x-show="tab === 'calendar'" class="space-y-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Programme</h2>
                        <button @click="showForm = !showForm" class="bg-stone-900 text-white px-5 py-2.5 rounded-xl text-[10px] font-black uppercase tracking-widest" x-text="showForm ? '✕' : '+ Programa'"></button>
                    </div>
                    <div x-show="showForm" class="bg-white p-6 rounded-2xl border border-stone-200 mb-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" x-model="formEvent.title" placeholder="Inona ny atao?" class="w-full p-3 rounded-xl ring-1 ring-stone-200 outline-none font-bold text-sm">
                            <input type="date" x-model="formEvent.date" class="w-full p-3 rounded-xl ring-1 ring-stone-200 outline-none font-bold text-sm">
                        </div>
                        <button @click="addEvent()" class="mt-4 w-full bg-amber-700 text-white py-3 rounded-xl font-black uppercase text-[10px]">Tehirizina</button>
                    </div>
                    <div class="space-y-3">
                        <template x-for="e in events">
                            <div class="bg-white p-4 rounded-2xl border border-stone-200 flex items-center justify-between card-scout">
                                <div class="flex items-center gap-4">
                                    <div class="w-14 h-14 bg-stone-100 rounded-xl flex flex-col items-center justify-center font-black">
                                        <span class="text-[8px] text-amber-600 uppercase" x-text="new Date(e.date).toLocaleString('mg', {month:'short'})"></span>
                                        <span class="text-xl text-stone-800" x-text="new Date(e.date).getDate() || '??'"></span>
                                    </div>
                                    <h4 class="font-black text-lg text-stone-800" x-text="e.title"></h4>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <!-- CHAT -->
                <div x-show="tab === 'chat'" class="h-[calc(100vh-12rem)] flex flex-col">
                    <div class="mb-6 flex justify-between items-center">
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Tapatapa-pira</h2>
                        <input type="text" x-model="currentUser.pseudo" @blur="updatePseudo" class="bg-white border px-3 py-1.5 rounded-lg text-xs font-bold w-32 focus:ring-2 focus:ring-amber-500 outline-none">
                    </div>
                    <div class="flex-1 bg-white rounded-[2rem] border border-stone-200 flex flex-col overflow-hidden shadow-sm">
                        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4">
                            <template x-for="m in messages">
                                <div :class="m.user === currentUser.pseudo ? 'items-end' : 'items-start'" class="flex flex-col">
                                    <div class="flex items-baseline gap-2 mb-1">
                                        <span class="text-[9px] font-black uppercase text-stone-400" x-text="m.user"></span>
                                        <span class="text-[8px] text-stone-300" x-text="m.time"></span>
                                    </div>
                                    <div :class="m.user === currentUser.pseudo ? 'bg-amber-600 text-white rounded-tr-none' : 'bg-stone-100 text-stone-800 rounded-tl-none'" 
                                         class="px-4 py-2 rounded-2xl max-w-[80%] text-sm font-medium shadow-sm" x-text="m.text"></div>
                                </div>
                            </template>
                        </div>
                        <div class="p-4 bg-stone-50 border-t flex gap-2">
                            <input type="text" x-model="chatInput" @keyup.enter="sendMessage" placeholder="Soraty eto ny hafatra..." class="flex-1 bg-white p-3 rounded-xl ring-1 ring-stone-200 outline-none font-medium text-sm">
                            <button @click="sendMessage" class="bg-amber-600 text-white px-6 rounded-xl font-black uppercase text-[10px]">Handefa</button>
                        </div>
                    </div>
                </div>

                <!-- PARAMETRES -->
                <div x-show="tab === 'settings'" class="space-y-8">
                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-8">Paramètres</h2>
                    <div class="bg-white p-8 rounded-[2rem] border border-stone-200">
                        <h3 class="font-black text-xs uppercase tracking-widest text-amber-600 mb-6">Configuration</h3>
                        <div class="grid grid-cols-1 gap-6">
                            <input type="text" x-model="settings.groupName" @blur="saveSettings" placeholder="Vondrona" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none font-bold">
                            <input type="text" x-model="settings.fivondronana" @blur="saveSettings" placeholder="Fivondronana" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none font-bold">
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[2rem] border border-stone-200">
                        <h3 class="font-black text-xs uppercase tracking-widest text-amber-600 mb-6">Nouvelle Actualité</h3>
                        <div class="space-y-4">
                            <input type="text" x-model="formNews.title" placeholder="Titre" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none font-bold">
                            <input type="text" x-model="formNews.date" placeholder="Date" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none font-bold">
                            <textarea x-model="formNews.desc" placeholder="Contenu" class="w-full p-4 rounded-xl ring-1 ring-stone-100 outline-none font-bold"></textarea>
                            <button @click="addNews()" class="bg-stone-900 text-white px-8 py-3 rounded-xl font-black uppercase text-[10px]">Ajouter</button>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- ZONE D'IMPRESSION -->
    <div id="print-section" class="hidden p-16 bg-white" x-show="currentFiche">
        <template x-if="currentFiche">
            <div class="max-w-3xl mx-auto">
                <div class="border-b-4 border-stone-900 pb-6 mb-8">
                    <h1 class="text-xl font-black uppercase" x-text="settings.groupName"></h1>
                </div>
                <h2 class="text-4xl font-black text-stone-900 mb-8" x-text="currentFiche.title"></h2>
                <div class="text-base leading-relaxed whitespace-pre-wrap font-medium" x-text="currentFiche.content"></div>
            </div>
        </template>
    </div>

</body>
</html>
