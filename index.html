<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Scoutisme - Antilin'i Madagasikara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- SDK Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.fb = { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, onSnapshot, collection, addDoc, query, serverTimestamp };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8f7f4; color: #1c1917; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e7e5e4; border-radius: 10px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out forwards; }
        .glow-ai { transition: all 0.3s ease; border: 1px solid rgba(245, 158, 11, 0.2); }
        .glow-ai:hover { box-shadow: 0 0 15px rgba(245, 158, 11, 0.3); border-color: rgba(245, 158, 11, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Configuration Globale Environnement
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'scout-management-v2';
        const apiKey = ""; // Automatique
        const GEMINI_MODEL = "gemini-2.5-flash-preview-09-2025";

        // --- Utilitaire Gemini API ---
        const callGemini = async (prompt, systemInstruction = "") => {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error('Erreur API Gemini');
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (i === 4) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        };

        // --- Icônes SVG ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                home: <><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
                calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>,
                message: <><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></>,
                settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>,
                send: <><line x1="22" x2="11" y1="2" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></>,
                menu: <><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></>,
                x: <><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></>,
                sparkles: <><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></>,
                loader: <><path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4m-17.07 7.07l2.83-2.83m8.48-8.48l2.83-2.83"/></>,
                plus: <><line x1="12" x2="12" y1="5" y2="19"/><line x1="5" x2="19" y1="12" y2="12"/></>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('accueil');
            const [isMenuOpen, setIsMenuOpen] = useState(false);
            const [aiLoading, setAiLoading] = useState(false);
            
            const [config, setConfig] = useState({
                logoUrl: '',
                orgName: "Antilin'i Madagasikara",
                subName: "Fivondronana faha-17"
            });

            const [pseudo, setPseudo] = useState(localStorage.getItem('scout_pseudo') || 'Mpanazava');
            const [chatMessages, setChatMessages] = useState([]);
            const [events, setEvents] = useState([]);
            const [newMessage, setNewMessage] = useState('');
            const chatEndRef = useRef(null);

            // --- Phase 1: Authentification ---
            useEffect(() => {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = fb.initializeApp(firebaseConfig);
                const auth = fb.getAuth(app);

                const initAuth = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await fb.signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await fb.signInAnonymously(auth);
                    }
                };
                initAuth();

                const unsubscribe = fb.onAuthStateChanged(auth, (u) => {
                    setUser(u);
                });
                return () => unsubscribe();
            }, []);

            // --- Phase 2: Synchronisation Firestore (Uniquement si Auth OK) ---
            useEffect(() => {
                if (!user) return;
                const db = fb.getFirestore();

                // 1. Config
                const unsubConfig = fb.onSnapshot(
                    fb.doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'),
                    (doc) => doc.exists() && setConfig(doc.data()),
                    (err) => console.error("Erreur Firestore Config:", err)
                );

                // 2. Chat
                const unsubChat = fb.onSnapshot(
                    fb.collection(db, 'artifacts', appId, 'public', 'data', 'messages'),
                    (snapshot) => {
                        const msgs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                            .sort((a, b) => (a.createdAt?.toMillis() || 0) - (b.createdAt?.toMillis() || 0));
                        setChatMessages(msgs);
                    },
                    (err) => console.error("Erreur Firestore Chat:", err)
                );

                // 3. Events
                const unsubEvents = fb.onSnapshot(
                    fb.collection(db, 'artifacts', appId, 'public', 'data', 'events'),
                    (snapshot) => {
                        const evs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }))
                            .sort((a, b) => (a.date?.toMillis() || 0) - (b.date?.toMillis() || 0));
                        setEvents(evs);
                    },
                    (err) => console.error("Erreur Firestore Events:", err)
                );

                return () => { unsubConfig(); unsubChat(); unsubEvents(); };
            }, [user]);

            useEffect(() => {
                if (activeTab === 'chat') chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [chatMessages, activeTab]);

            // --- Fonctions Firestore ---
            const saveEvent = async (eventData) => {
                if (!user) return;
                const db = fb.getFirestore();
                await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'events'), {
                    ...eventData,
                    createdBy: pseudo,
                    createdAt: fb.serverTimestamp(),
                    date: fb.serverTimestamp()
                });
            };

            const sendMessage = async (e) => {
                e.preventDefault();
                if (!newMessage.trim() || !user) return;
                const db = fb.getFirestore();
                await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    text: newMessage,
                    user: pseudo,
                    uid: user.uid,
                    createdAt: fb.serverTimestamp()
                });
                setNewMessage('');
            };

            const updateGlobalConfig = async (newVal) => {
                if (!user) return;
                const db = fb.getFirestore();
                await fb.setDoc(fb.doc(db, 'artifacts', appId, 'public', 'data', 'config', 'main'), newVal);
            };

            // --- Actions IA Gemini ---
            const handleGenerateProgramAI = async () => {
                setAiLoading(true);
                try {
                    const prompt = "Manolora hevitra momba ny fandaharam-potoana skoto iray andro (louveteaux) ahitana lohahevitra sy lalao ary fampianarana. Valio amin'ny teny malagasy madio.";
                    const system = "Mpitarika skoto mahay ianao ao amin'ny Antilin'i Madagasikara.";
                    const result = await callGemini(prompt, system);
                    if (result) {
                        await saveEvent({ title: "Soso-kevitra IA ✨", description: result });
                    }
                } finally {
                    setAiLoading(false);
                }
            };

            const handleAnalyzeChatAI = async () => {
                if (chatMessages.length < 3) return;
                setAiLoading(true);
                try {
                    const lastMsgs = chatMessages.slice(-15).map(m => `${m.user}: ${m.text}`).join('\n');
                    const prompt = `Fintino vetivety ireto resaka ireto ary omeo ny teboka lehibe nodinihina. Valio amin'ny teny malagasy:\n\n${lastMsgs}`;
                    const result = await callGemini(prompt);
                    if (result) {
                        const db = fb.getFirestore();
                        await fb.addDoc(fb.collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                            text: `🤖 FAMINTINANA IA ✨:\n\n${result}`,
                            user: "Assistant IA",
                            uid: "ai-system",
                            createdAt: fb.serverTimestamp()
                        });
                    }
                } finally {
                    setAiLoading(false);
                }
            };

            // --- Render Logic ---
            const renderTab = () => {
                switch(activeTab) {
                    case 'accueil':
                        return (
                            <div className="flex flex-col items-center justify-center py-10 text-center animate-slide-up">
                                {/* Taille de logo ajustée */}
                                <div className="w-32 h-32 bg-white rounded-3xl shadow-xl border-4 border-white flex items-center justify-center mb-6 overflow-hidden">
                                    {config.logoUrl ? (
                                        <img src={config.logoUrl} className="w-full h-full object-contain" />
                                    ) : (
                                        <div className="bg-amber-100 w-full h-full flex items-center justify-center text-amber-600">
                                            <Icon name="home" size={40} />
                                        </div>
                                    )}
                                </div>
                                <h1 className="text-2xl font-black text-stone-900 mb-1 uppercase tracking-tight px-4">
                                    {config.orgName}
                                </h1>
                                <div className="px-4 py-1 bg-amber-100 text-amber-800 rounded-full text-[8px] font-black uppercase tracking-widest mb-10">
                                    {config.subName}
                                </div>

                                <div className="grid grid-cols-2 gap-4 w-full max-w-[320px]">
                                    <div className="bg-white p-4 rounded-2xl border border-stone-100 shadow-sm">
                                        <div className="text-[9px] font-black text-stone-400 uppercase mb-1">Mpanatrika</div>
                                        <div className="text-xl font-black text-stone-800">Mavitrika</div>
                                    </div>
                                    <div className="bg-white p-4 rounded-2xl border border-stone-100 shadow-sm">
                                        <div className="text-[9px] font-black text-stone-400 uppercase mb-1">Fandaharana</div>
                                        <div className="text-xl font-black text-amber-600">{events.length}</div>
                                    </div>
                                </div>
                            </div>
                        );

                    case 'programme':
                        return (
                            <div className="space-y-6 animate-slide-up pb-28">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-xl font-black uppercase">Fandaharana</h2>
                                    <button 
                                        onClick={handleGenerateProgramAI}
                                        className="glow-ai flex items-center gap-2 bg-stone-900 text-white px-3 py-2 rounded-xl text-[9px] font-black uppercase"
                                    >
                                        {aiLoading ? <Icon name="loader" size={14} className="animate-spin" /> : <Icon name="sparkles" size={14} />}
                                        IA ✨
                                    </button>
                                </div>
                                <div className="space-y-4">
                                    {events.map(ev => (
                                        <div key={ev.id} className="bg-white p-4 rounded-2xl shadow-sm border border-stone-100">
                                            <h3 className="font-black text-stone-800 uppercase text-[10px] mb-2">{ev.title}</h3>
                                            <p className="text-stone-600 text-xs leading-relaxed whitespace-pre-wrap">{ev.description}</p>
                                            <div className="mt-3 text-[8px] text-stone-400 font-bold uppercase flex justify-between">
                                                <span>Nofaritan'i {ev.createdBy}</span>
                                                <span>{ev.date?.toDate().toLocaleDateString('mg-MG')}</span>
                                            </div>
                                        </div>
                                    ))}
                                    {events.length === 0 && <div className="py-10 text-center text-stone-400 text-xs">Tsy misy fandaharana voasoratra.</div>}
                                </div>
                            </div>
                        );

                    case 'chat':
                        return (
                            <div className="h-[calc(100vh-240px)] flex flex-col animate-slide-up">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-xl font-black uppercase">Tafasiry</h2>
                                    <button onClick={handleAnalyzeChatAI} className="bg-amber-100 text-amber-800 px-3 py-1.5 rounded-full text-[9px] font-black uppercase flex items-center gap-2">
                                        {aiLoading ? "Miandry..." : "Hamintina ✨"}
                                    </button>
                                </div>
                                <div className="flex-1 overflow-y-auto custom-scrollbar space-y-4 mb-4 pr-1">
                                    {chatMessages.map(m => (
                                        <div key={m.id} className={`flex flex-col ${m.uid === user?.uid ? 'items-end' : 'items-start'}`}>
                                            <span className="text-[8px] font-black text-stone-400 mb-1 px-1 uppercase">{m.user}</span>
                                            <div className={`max-w-[80%] p-3 rounded-2xl text-sm ${
                                                m.uid === 'ai-system' ? 'bg-stone-100 italic' :
                                                m.uid === user?.uid ? 'bg-amber-600 text-white' : 'bg-white border border-stone-100'
                                            }`}>
                                                {m.text}
                                            </div>
                                        </div>
                                    ))}
                                    <div ref={chatEndRef} />
                                </div>
                                <form onSubmit={sendMessage} className="flex gap-2">
                                    <input value={newMessage} onChange={(e)=>setNewMessage(e.target.value)} placeholder="Soraty eto..." className="flex-1 p-3.5 bg-white border border-stone-200 rounded-xl outline-none text-sm"/>
                                    <button type="submit" className="bg-stone-900 text-white p-3.5 rounded-xl"><Icon name="send" size={20}/></button>
                                </form>
                            </div>
                        );

                    case 'settings':
                        return (
                            <div className="space-y-6 animate-slide-up pb-24">
                                <h2 className="text-xl font-black uppercase">Fikirana</h2>
                                <div className="bg-white p-5 rounded-3xl border border-stone-100 space-y-6">
                                    <div>
                                        <label className="text-[9px] font-black uppercase text-stone-400 block mb-2 tracking-widest">Pseudo-nao</label>
                                        <input value={pseudo} onChange={(e)=>{setPseudo(e.target.value); localStorage.setItem('scout_pseudo', e.target.value);}} className="w-full p-3.5 bg-stone-50 border border-stone-100 rounded-xl outline-none font-bold text-stone-800"/>
                                    </div>
                                    <div className="border-t border-stone-50 pt-4 space-y-4">
                                        <label className="text-[9px] font-black uppercase text-stone-400 block tracking-widest">Fivondronana (Général)</label>
                                        <input value={config.orgName} onChange={(e)=>updateGlobalConfig({...config, orgName: e.target.value})} placeholder="Anaran'ny Fivondronana" className="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl outline-none text-xs"/>
                                        <input value={config.logoUrl} onChange={(e)=>updateGlobalConfig({...config, logoUrl: e.target.value})} placeholder="Lien-na Logo (URL)" className="w-full p-3 bg-stone-50 border border-stone-100 rounded-xl outline-none text-xs"/>
                                    </div>
                                </div>
                            </div>
                        );
                }
            };

            if (!user) return <div className="min-h-screen flex items-center justify-center font-black text-stone-300 uppercase tracking-widest animate-pulse">Mampifandray...</div>;

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto bg-[#f8f7f4] relative shadow-2xl border-x border-stone-100">
                    <header className="p-5 flex justify-between items-center bg-white/80 backdrop-blur-md sticky top-0 z-40 border-b border-stone-100/50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-amber-600 rounded-lg flex items-center justify-center text-white font-black text-xs shadow-md">A</div>
                            <span className="font-black text-[9px] uppercase tracking-tighter">Valizy <span className="text-amber-600">Scout</span></span>
                        </div>
                        <button onClick={()=>setIsMenuOpen(true)} className="p-2 bg-stone-50 rounded-lg border border-stone-100"><Icon name="menu" size={18}/></button>
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto">
                        {renderTab()}
                    </main>

                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[340px] bg-stone-900 p-1.5 rounded-3xl flex justify-between items-center shadow-2xl z-50">
                        {[
                            {id: 'accueil', icon: 'home'},
                            {id: 'programme', icon: 'calendar'},
                            {id: 'chat', icon: 'message'},
                            {id: 'settings', icon: 'settings'}
                        ].map(item => (
                            <button 
                                key={item.id}
                                onClick={() => setActiveTab(item.id)}
                                className={`p-4 rounded-2xl transition-all ${activeTab === item.id ? 'bg-amber-600 text-white' : 'text-stone-500'}`}
                            >
                                <Icon name={item.icon} size={20} />
                            </button>
                        ))}
                    </nav>

                    {/* Menu Mobile */}
                    {isMenuOpen && (
                        <div className="fixed inset-0 z-[100] flex justify-end">
                            <div className="absolute inset-0 bg-stone-900/40 backdrop-blur-sm" onClick={()=>setIsMenuOpen(false)}></div>
                            <div className="relative w-64 bg-white h-full p-6 shadow-2xl animate-in slide-in-from-right duration-200">
                                <div className="flex justify-between items-center mb-8">
                                    <span className="font-black uppercase text-xs">Fikarohana</span>
                                    <button onClick={()=>setIsMenuOpen(false)}><Icon name="x" size={20}/></button>
                                </div>
                                <div className="space-y-1">
                                    {['accueil', 'programme', 'chat', 'settings'].map(id => (
                                        <button key={id} onClick={()=>{setActiveTab(id); setIsMenuOpen(false);}} className={`w-full text-left p-4 rounded-xl font-black text-[10px] uppercase tracking-widest ${activeTab === id ? 'bg-amber-50 text-amber-600' : 'text-stone-400'}`}>
                                            {id}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
